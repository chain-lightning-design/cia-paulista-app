    panel('Unhandled promise rejection',(e.reason&&e.reason.stack)?e.reason.stack:String(e.reason));

// kv seam: writes go through CP.data.kv.set (localStorage synchronously + queued cloud write);
// without data.js they fall back to today's plain localStorage write. Reads stay plain (identical).
const kvSet=(key,val)=>{ try{ if(hasData()&&window.CP.data.kv) window.CP.data.kv.set(key,val); else localStorage.setItem(key,JSON.stringify(val)); }catch(e){} };
// Echo guard: kv.onChange also fires on our OWN kv.set (and on cloud reconciles). When a change
// arrives through onChange we apply it to state and flag the key so the persist effect doesn't
// write the very same value straight back (which would ping-pong between devices forever).
const __kvEcho={};
function useKvPersist(key,value){ const first=useRef(true);
  useEffect(()=>{
    if(first.current){ first.current=false; try{localStorage.setItem(key,JSON.stringify(value));}catch(e){} return; } // mount = the value we just read/seeded; local write only, no cloud queue churn
    if(__kvEcho[key]){ delete __kvEcho[key]; return; }   // this render came FROM onChange — don't echo it back
    kvSet(key,value);
  },[value]);
}
function useKvLive(key,apply){ useEffect(()=>{
  if(!hasData()||!window.CP.data.kv||!window.CP.data.kv.onChange) return;
  return window.CP.data.kv.onChange(key,v=>{ if(v==null)return; __kvEcho[key]=true; try{apply(v);}catch(e){delete __kvEcho[key];} });

function memberInsights(m,all){
  const a=m.att30||[]; const total=a.reduce((x,y)=>x+y,0);
  const daysTrained=a.filter(v=>v>0).length;
  const last7=a.slice(23).reduce((x,y)=>x+y,0);
  const firstHalf=a.slice(0,15).reduce((x,y)=>x+y,0), secondHalf=a.slice(15).reduce((x,y)=>x+y,0);
  const twos=a.filter(v=>v>=2).length;
  let streak=0,run=0; a.forEach(v=>{run=v>0?run+1:0; if(run>streak)streak=run;});
  // weekday tally — index 29 == today (Thursday=4)
  const wd=[0,0,0,0,0,0,0]; a.forEach((v,i)=>{ if(v>0){ const d=((i-25)%7+7)%7; wd[d]+=v; }});
  const ord=[0,1,2,3,4,5,6].sort((x,y)=>wd[y]-wd[x]);
  const topDays=ord.slice(0,2).filter(d=>wd[d]>0); const topShare=total?topDays.reduce((s,d)=>s+wd[d],0)/total:0;
  // percentile by training volume
  const totals=all.map(x=>(x.att30||[]).reduce((p,q)=>p+q,0));
  const better=totals.filter(t=>t>total).length; let topPct=Math.max(5,Math.ceil(better/Math.max(all.length,1)*100/5)*5);
  const out=[]; const push=(pr,level,text)=>out.push({pr,level,text});
  if(m.status==='Inactive') push(100,'warn','🚪 No longer attending — last seen '+m.last+'.');
  if(m.status!=='Inactive'&&m.status!=='On Hold'&&last7===0) push(95,'warn','⚠️ Hasn’t checked in (last seen '+m.last+') — worth a nudge.');
  if(m.status==='On Hold') push(70,'info','⏸️ Account on hold — expected back.');
  if(m.status!=='Inactive'&&m.status!=='On Hold'&&firstHalf>=4&&secondHalf<firstHalf*0.5&&last7>0) push(85,'warn','📉 Training has tapered off the last two weeks.');
  if(m.status==='Active'&&m.cur/m.req>=0.85) push(80,'good','🥋 Close to the next promotion — '+m.cur+'/'+m.req+' classes.');
  if(total>0&&better/Math.max(all.length,1)<=0.15) push(75,'good','🔥 Top '+topPct+'% of students by training this month.');
  if(streak>=5) push(65,'good','⚡ On a '+streak+'-day training streak.');
  if(secondHalf>firstHalf*1.6&&secondHalf>=3&&m.status!=='Inactive') push(60,'good','📈 Ramping up — training more than usual lately.');
  if(m.status==='Trial') push(55,'info','🎟️ On a trial — follow up to convert.');
  if(daysTrained>=16) push(50,'info','✅ Very consistent — trained '+daysTrained+' of the last 30 days.');
  if(topDays.length&&topShare>=0.45&&total>=5) push(45,'info','🗓️ Usually trains on '+topDays.map(d=>DOW_PL[DOW[d]]).join(' & ')+'.');
  if(twos>=2) push(30,'info','💪 Sometimes trains twice a day.');
  out.sort((x,y)=>y.pr-x.pr);
  return out.slice(0,3);
}

// Canonical field -> plain-language label for the Map-columns confirmations/dropdowns.

  first:'First name', last:'Last name', name:'Full name', email:'Email', phone:'Phone',
  dob:'Date of birth', program:'Program', belt:'Belt', stripes:'Stripes',
  plan_name:'Membership plan', join_date:'Join date', status:'Status',
  guardian_name:'Guardian name', guardian_phone:'Guardian phone', guardian_email:'Guardian email',
  notes:'Notes',

// n===1 -> singular; every other count (including 0) -> plural. Used everywhere a count is
// rendered in the wizard — the brief calls this out explicitly ("Found 1 row, 5 columns").
const importPlural = (n, one, many) => n + ' ' + (n === 1 ? one : (many || (one + 's')));
// null/'' -> '—' (absent); 0 stays '0' — stripes is int|null and 0 is a REAL value (a belt
// promotion resets stripes to zero), so this must never be a truthiness test.
const importFmtVal = v => (v == null || v === '') ? '—' : String(v);

// The writer the engine's applyBatch/undoBatch call into (prototypes/import-engine.js's frozen
// writer contract). Verified against the REAL prototypes/data.js (not the early sketch in the
// task brief) — see task-8-import-report.md for the full verification:
//   - listMembers: data.js has no members.list() at all (only all/upsert/refresh/remove/
//     onChange). In pilot/demo mode (no signed-in cloud user) this still reads the console's own
//     live `members` prop (mapped to canonical shape) — CP.data.members.all() is EMPTY until a
//     real cloud sync has happened there, out of sync with what's on screen. In CLOUD mode it
//     now attempts CP.data.members.refresh() first (a member added on another device since
//     sign-in has no realtime subscription to reveal it otherwise — see task-8-import-report.md,
//     IMPORTANT-1), falling back to the prop — never something smaller — when the refresh fails
//     or resolves empty, flagged via ._staleComparison so the preview can say the comparison may
//     be incomplete.
//   - upsertMember/saveBatch/lastBatch/markUndone match data.js verbatim.
//   - hasActivitySince used to trust CP.data.checkins.recent()'s return value directly, but that
//     function (prototypes/data.js:449-456) resolves [] both when there's no cloud client/user
//     AND on any fetch error — an empty result couldn't be told apart from "we couldn't check,"
//     and the old catch(e){return false} sent an UNKNOWN answer down undoBatch's removeMember
//     branch (prototypes/import-engine.js:206-208), which could delete a member who has
//     genuinely been training since the import. Fixed (see task-8-import-report.md, CRITICAL)
//     to check the local `cp_checkins` mirror first (data.js:391-403 — the same store the kiosk
//     writes to when it's offline; recent() never looks at it) for a real, always-available
//     local answer, then only trust an empty cloud result when status().online isn't explicitly
//     false; anything else (thrown exception, explicit online:false) fails SAFE — keeps the
//     member — tagged 'unverified' in activityNote so the undo result can say so honestly.
//   - remove: genuinely did not exist on any name (checked members.upsert/all/refresh/onChange —
//     no delete/remove/archive equivalent). Added CP.data.members.remove(id) additively to
//     data.js (same local-write-then-queue shape as upsert(), reusing the existing
//     enqueue/flushQueue/runJob machinery — no new sync mechanism) because undoBatch's
//     writer.removeMember(id) has no safe alternative: a real DELETE is what "this removes the
//     N members that import created" promises, and 0001_core.sql's existing "staff all members"
//     RLS policy already grants DELETE to any authenticated staff role for their tenant (the
//     same policy member_upsert already relies on), so no new migration was needed either.
// Same v4-shaped generator data.js's own (internal, unexported) uuidv4() uses for import batch
// ids. Needed here because toMember() (prototypes/import-engine.js) never assigns an id for a
// brand-new member — it leaves that to the writer, exactly like a real Postgres
// `default gen_random_uuid()` would (concierge_import.js's writer captures `saved.id` from the
// REST response the same way). CP.data.members.upsert() is a dumb local upsert that expects the
// CALLER to already supply an id (every other call site in this file — AddMemberDialog, guest/
// lead conversion — generates its own id before upserting); without this, two different
// id-less "create" rows in the same batch would BOTH match `findIndex(m => m.id === undefined)`
// and silently overwrite each other.
function importUuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
    var r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}
// After a write, the App-level CP.data.members.onChange subscription (owner-console.html's
// App()) intentionally no-ops when the canonical store resolves to an EMPTY array (`if(!rows||
// !rows.length) return;` — a guard against a spurious empty read blanking the screen). That
// guard means an import whose undo brings the canonical store from 1 member to 0 would leave a
// "ghost" row on screen. Rather than touch that existing guard (out of scope — surrounding code
// must stay untouched), the wizard/undo-bar resync the Members table THEMSELVES right after
// their own writes, the same way every other mutation path in this file already pairs a
// CP.data write with a direct setMembers call (AddMemberDialog's onAdd, onPromote, onHold,
// convertLead, ...). Non-canonical local-only rows (guests, demo seed) are preserved verbatim.
function importResyncMembers(setMembers) {
  try {
    if (!hasData()) return;
    const rows = window.CP.data.members.all() || [];
    const mapped = rows.map(fromCanonical);
    const ids = new Set(mapped.map(m => m.id));
    setMembers(prev => mapped.concat((prev || []).filter(m => !m._canon && !ids.has(m.id))));
  } catch (e) {}
}
// IMPORTANT-1 fix (task-8-import-report.md): listMembers() must never compare against a roster
// SMALLER than either list it's built from — a member on screen but missing from a successful-
// but-partial cloud refresh (e.g. a just-added member whose member_upsert queue job hasn't
// reached Supabase yet) must still be present, or a CSV row for them misreads as "create" and
// duplicates them. Union by member id — falling back to email, then phone, for a row that
// genuinely lacks one (a canonical member row always has an id; propRows freshly minted for a
// brand-new console-only row might not) — preferring `fresh`'s field values when both sides
// describe the same member (it's the more current source when it did land). Every row in EITHER
// input ends up in the result exactly once, so the result can never be shorter than either input.
function mergeMemberLists(fresh, propRows) {
  const freshArr = Array.isArray(fresh) ? fresh : [];
  const propArr = Array.isArray(propRows) ? propRows : [];
  const identity = r => {
    if (!r) return null;
    if (r.id != null && r.id !== '') return 'id:' + r.id;
    if (r.email) return 'e:' + String(r.email).trim().toLowerCase();
    const ph = String(r.phone || '').replace(/\D/g, '');
    if (ph.length >= 7) return 'p:' + ph;
    return null; // no usable identity — never dedup-collide two different unidentified rows
  };
  const merged = freshArr.slice();
  const freshKeys = new Set(freshArr.map(identity).filter(Boolean));
  propArr.forEach(r => {
    const key = identity(r);
    if (key && freshKeys.has(key)) return; // already represented by the fresher row
    merged.push(r); // on screen but absent from `fresh` — keep it, never let it disappear
  });
  return merged;
}
function cpImportWriter(consoleMembers) {
  // Wizard-only side channel: which kept id's activity was genuinely VERIFIED vs merely
  // UNVERIFIABLE. import-engine.js's undoBatch() only ever records a fixed reason string
  // ('has activity since the import') on kept[] — it has no notion of "we're not sure." This
  // object is populated by hasActivitySince below and read back by ImportUndoBar's doUndo()
  // (via writer._activityNote) purely to word the result honestly; import-engine.js never sees it.
  const activityNote = {};
  return {
    listMembers: async () => {
      const propRows = (consoleMembers || []).map(toCanonical);
      try {
        if (!hasData() || !window.CP.data.members || !window.CP.data.members.refresh) return propRows;
        const st0 = window.CP.data.status ? window.CP.data.status() : null;
        // Pilot/demo mode: CP.data.members.refresh() would just hand back the local canonical
        // cache (data.js:345-356's own !cl||!_user fallback), which can be smaller than what's
        // on screen (e.g. the pilot seed) without that meaning anything went wrong — trust the
        // prop directly, same as before this fix.
        if (!st0 || st0.mode !== 'cloud') return propRows;
        const fresh = await window.CP.data.members.refresh();
        const st1 = window.CP.data.status ? window.CP.data.status() : null;
        const failed = !!(st1 && st1.online === false);
        if (failed || !fresh) {
          const out = propRows.slice();
          out._staleComparison = true; // refresh failed outright — never let that SHRINK the comparison below what's on screen
          return out;
        }
        // IMPORTANT-1 fix: refresh() can SUCCEED and still legitimately lack a member that's on
        // screen (see mergeMemberLists' comment above) — don't choose between `fresh` and the
        // prop, merge them so the result is never smaller than either. `fresh` rows are already
        // canonical shape (cl.from('members').select('*')) — no toCanonical() needed on those.
        return mergeMemberLists(fresh, propRows);
      } catch (e) {
        const out = propRows.slice();
        out._staleComparison = true;
        return out;
      }
    },
    upsertMember: m => {
      try {
        const withId = (m && m.id) ? m : Object.assign({}, m, { id: importUuid() });
        return hasData() ? window.CP.data.members.upsert(withId) : Promise.resolve(withId);
      } catch (e) { return Promise.resolve(m); }
    },
    removeMember: id => { try { return hasData() ? window.CP.data.members.remove(id) : Promise.resolve(); } catch (e) { return Promise.resolve(); } },
    hasActivitySince: async (id, ts) => {
      const sinceMs = new Date(ts).getTime();
      // 1) Local mirror first — data.js's checkins.add() always writes `cp_checkins` (the same
      //    store the kiosk falls back to offline), and CP.data.checkins.recent() below never
      //    reads it. A hit here is a real, always-available answer in ANY mode — it wins outright.
      try {
        if (hasData() && window.CP.data.kv) {
          const local = window.CP.data.kv.get('cp_checkins', []) || [];
          const hit = local.some(c => c && c.memberId === id &&
            ((c.ts != null && c.ts >= sinceMs) || (c.ts == null && c.at && String(c.at) >= String(ts).slice(0, 10))));
          if (hit) { activityNote[id] = 'verified'; return true; }
        }
      } catch (e) {}
      // 2) Cloud query. checkins.recent() swallows every failure (no client, offline, RLS,
      //    thrown exception) into the SAME resolved [] — an empty result can't be trusted on its
      //    own. status().online used to be consulted here, but it's ONE module-level flag
      //    (data.js:73-75), last-write-wins across EVERY cloud op in the app (members.refresh,
      //    reconcileKv, the queue's runJob, ...) — it says nothing about whether THIS read
      //    happened, and can still read stale `true` from an earlier, unrelated success after the
      //    session's user goes away (token expired/revoked — an ordinary onAuthStateChange(null)
      //    event). checkins.recent() itself early-returns [] in exactly that state WITHOUT ever
      //    touching the flag (data.js:449-451: `if (!cl || !_user) return Promise.resolve([])`),
      //    so trusting online alone could read a leftover `true` as "the read succeeded" and treat
      //    the empty result as definitive "no activity" — see task-8-import-report.md, CRITICAL.
      //    Fixed to ask the same preconditions checkins.recent() itself requires, directly, for
      //    THIS call: is cloud configured, and is someone signed in RIGHT NOW (status().user is
      //    kept current on every auth change — data.js:685-693 — unlike the sticky online flag)?
      //    If cloud isn't configured at all we're in local/pilot mode, where recent() never talks
      //    to a server by design — an empty result there has always meant "no activity" (the
      //    hasData()/checkins.recent guard above already returns false for that case when the
      //    API doesn't even exist) and must keep meaning that here. If cloud IS configured but no
      //    user is signed in, the read simply never happened — protect. If status() itself is
      //    missing or returns nothing, there is no signal at all — protect (Minor, same family).
      try {
        if (!hasData() || !window.CP.data.checkins || !window.CP.data.checkins.recent) return false;
        const rows = await window.CP.data.checkins.recent(500);
        const st = window.CP.data.status ? window.CP.data.status() : null;
        if (!st) { activityNote[id] = 'unverified'; return true; }
        const cloudInPlay = !!st.configured;
        const signedIn = !!st.user;
        if (cloudInPlay && !signedIn) { activityNote[id] = 'unverified'; return true; }
        const hit = (rows || []).some(c => c && c.member_id === id && c.ts != null && new Date(c.ts).getTime() >= sinceMs);
        if (hit) activityNote[id] = 'verified';
        return hit;
      } catch (e) { activityNote[id] = 'unverified'; return true; } // an unknown answer must fail SAFE — keep, never guess "no activity"
    },
    saveBatch: b => { try { return hasData() ? window.CP.data.imports.saveBatch(b) : Promise.resolve({ batchId: null }); } catch (e) { return Promise.resolve({ batchId: null }); } },
    lastBatch: () => { try { return hasData() ? window.CP.data.imports.lastBatch() : Promise.resolve(null); } catch (e) { return Promise.resolve(null); } },
    markUndone: id => { try { return hasData() ? window.CP.data.imports.markUndone(id) : Promise.resolve(); } catch (e) { return Promise.resolve(); } },
    _activityNote: activityNote,
  };
}

const IMPORT_STEP_LABEL = { upload:'Step 1 · Upload', map:'Step 2 · Map columns',
  plans:'Step 3 · Plan names', preview:'Step 4 · Preview', applying:'Importing…', result:'Done' };
function importActionChip(action) {
  const M = { create:['New','bg-good/15 text-good'], update:['Update','bg-teal/15 text-teal'],
    skip:['Unchanged','bg-slate/15 text-slate'], error:['Needs attention','bg-crimson/15 text-crimson'] };
  const [label,cls] = M[action] || ['—','bg-slate/10 text-slate'];
  return <span className={"shrink-0 text-[11px] font-semibold px-2 py-0.5 rounded-full "+cls}>{label}</span>;
}

function ImportWizard({members,setMembers,onClose,onApplied}) {
  const [step,setStep]=useState('upload');
  const [fileName,setFileName]=useState('');
  const [parseState,setParseState]=useState(null);   // {loading}|{error}|{headers,rows}
  const [mapState,setMapState]=useState(null);       // {map,extras} from autoMap (owner-adjustable)
  const [plans,setPlans]=useState([]);
  const [report,setReport]=useState(null);            // ImportEngine.validate() result
  const [planMap,setPlanMap]=useState({});
  const [applyResult,setApplyResult]=useState(null);
  const [applyError,setApplyError]=useState(null);
  const [dragOver,setDragOver]=useState(false);
  // IMPORTANT-1 fix: true when cpImportWriter.listMembers() had to fall back to the on-screen
  // prop because a cloud-mode refresh() failed or came back empty — the preview then says so,
  // instead of silently comparing against a roster that might be missing a device's-worth of
  // members (see cpImportWriter's own comment above for the full reasoning).
  const [listStale,setListStale]=useState(false);
  const inp="rounded-lg border border-slate/30 px-2 py-1.5 text-sm";

  function handleFile(file){
    if(!file) return;
    setFileName(file.name);
    setParseState({loading:true});
    setMapState(null); setReport(null); setPlanMap({}); setApplyResult(null); setApplyError(null); setListStale(false);
    try{
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          const text=String(reader.result==null?'':reader.result);
          const parsed=window.ImportEngine.parseCsv(text);
          if(!parsed.headers||!parsed.headers.length){
            setParseState({error:"That file doesn't look like a CSV — no columns were found. Try exporting again, or pick a different file."});
            return;
          }
          setParseState({headers:parsed.headers, rows:parsed.rows||[]});
          setMapState(window.ImportEngine.autoMap(parsed.headers));
        }catch(err){
          setParseState({error:"We couldn't read that file. Make sure it's a CSV export and try again."});
        }
      };
      reader.onerror=()=>setParseState({error:"We couldn't read that file — try picking it again."});
      reader.readAsText(file);
    }catch(err){
      setParseState({error:"We couldn't read that file. Make sure it's a CSV export and try again."});
    }
  }

  async function goFromMap(){
    try{
      const writer=cpImportWriter(members);
      const existing=await writer.listMembers();
      setListStale(!!existing._staleComparison);
      const planSet=new Set();
      (members||[]).forEach(m=>{ if(m&&m.plan&&m.plan!=='—') planSet.add(m.plan); });
      const planList=Array.from(planSet).sort();
      const rep=window.ImportEngine.validate({rows:parseState.rows, map:mapState.map, existing, plans:planList});
      setPlans(planList); setReport(rep);
      // CRITICAL-2 fix: pre-seed planMap so every unknown plan name defaults to the SAME value
      // ('') the "Leave unassigned (—)" option itself carries — an untouched dropdown must
      // behave identically to an explicit "Leave unassigned" pick. Without this, the select's
      // shown default ("Leave unassigned (—)") lies: toMember() only blanks the plan when the
      // name is a KEY in planMap (`r.plan_name in planMap`), so an untouched name (absent from
      // planMap) fell through to the raw, unrecognized CSV string — writing exactly the
      // invented pricing the on-screen copy promises never happens. Object.assign only fills in
      // names not already present, so it never clobbers a choice the owner already made (e.g.
      // navigating back to this step).
      if(rep.planNames.unknown.length){
        setPlanMap(pm=>{
          const next=Object.assign({},pm);
          rep.planNames.unknown.forEach(name=>{ if(!(name in next)) next[name]=''; });
          return next;
        });
      }
      setStep(rep.planNames.unknown.length ? 'plans' : 'preview');
    }catch(e){
      setParseState(s=>Object.assign({},s,{error:"We couldn't check this file against your roster. Try again, and if it keeps happening, send us the file."}));
    }
  }

  async function doApply(){
    setStep('applying');
    try{
      const writer=cpImportWriter(members);
      const res=await window.ImportEngine.applyBatch({report, planMap, writer, source:fileName||'import.csv'});
      importResyncMembers(setMembers);
      setApplyResult(res); setStep('result');
      if(onApplied) try{ onApplied(); }catch(e){}
    }catch(e){
      setApplyError((e&&e.message)||"The import couldn't finish. Nothing extra was changed — check the file and try again.");
      setStep('result');
    }
  }

  const mappedKeys = mapState ? (window.ImportEngine.CANON||[]).filter(k=>mapState.map[k]) : [];
  const unmappedKeys = mapState ? (window.ImportEngine.CANON||[]).filter(k=>!mapState.map[k]) : [];

  return <div className="fixed inset-0 bg-black/60 grid place-items-center z-40 p-4" {...bgClose(step==='applying'?(()=>{}):onClose)}>
    <div className="bg-white rounded-2xl p-6 w-[640px] max-w-full max-h-[92vh] overflow-y-auto" onClick={e=>e.stopPropagation()}>
      <div className="flex justify-between items-start mb-4">
        <div><h2 className="text-xl font-bold">Import members</h2>
          <div className="text-[11px] text-slate uppercase tracking-wide mt-0.5">{IMPORT_STEP_LABEL[step]}</div></div>
        {step!=='applying' && <button onClick={onClose} data-testid="import-cancel" className="text-slate text-xl">✕</button>}
      </div>

      {/* IMPORTANT-2 fix: the writer's upsertMember/saveBatch are silent no-ops without CP.data
          (hasData()===false) — the page's own fatal-panel safety net (top of <head>) only checks
          React/ReactDOM/Babel, never this, so it would NOT have caught that case. Block entry
          instead of ever reaching the result step with a fabricated "N added" that wrote nothing. */}
      {!hasData() ? <div>
        <p data-testid="import-nodata" className="text-sm text-navy mb-4">We can't import right now — the shared data connection isn't available on this device, so nothing would actually be saved. Nothing has changed. Try reloading the page, or try again in a moment.</p>
        <button data-testid="import-nodata-close" onClick={onClose} className="w-full border border-slate/30 rounded-lg py-2.5 text-sm font-semibold">Close</button>
      </div> : <>

      {step==='upload' && <div>
        <div onDragOver={e=>{e.preventDefault(); setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
          onDrop={e=>{e.preventDefault(); setDragOver(false); const f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0]; if(f) handleFile(f);}}
          className={"relative rounded-xl border-2 border-dashed p-8 text-center transition "+(dragOver?'border-crimson bg-crimson/5':'border-slate/25 hover:border-slate/40')}>
          <input type="file" accept=".csv" data-testid="import-file" onChange={e=>{const f=e.target.files&&e.target.files[0]; if(f) handleFile(f); e.target.value='';}} className="absolute inset-0 opacity-0 cursor-pointer w-full h-full"/>
          <div className="text-3xl mb-2">📄</div>
          <div className="font-semibold">Drag &amp; drop a CSV here, or click to browse</div>
          <div className="text-xs text-slate mt-1">Exported from ZenPlanner, Excel, Google Sheets — any spreadsheet export works.</div>
        </div>
        {parseState&&parseState.loading && <div data-testid="import-loading" className="text-sm text-slate mt-3">Reading the file…</div>}
        {parseState&&parseState.error && <div data-testid="import-error" className="text-sm text-crimson mt-3">{parseState.error}</div>}
        {parseState&&parseState.headers && <div data-testid="import-found" className="text-sm mt-4">
          Found <b>{importPlural(parseState.rows.length,'row')}</b>, <b>{importPlural(parseState.headers.length,'column')}</b> in {fileName}.
        </div>}
        {parseState&&parseState.headers && <button data-testid="import-upload-continue" onClick={()=>setStep('map')} className="mt-4 bg-crimson text-white rounded-lg px-4 py-2 text-sm font-semibold">Continue</button>}
      </div>}

      {step==='map' && mapState && <div>
        <p className="text-sm text-slate mb-3">We matched these columns automatically — just confirm they look right.</p>
        <div className="space-y-1.5 mb-4">
          {mappedKeys.length===0 && <div className="text-sm text-slate/60 italic">No columns matched automatically.</div>}
          {mappedKeys.map(key=><div key={key} className="flex items-center justify-between text-sm bg-mist/40 rounded-lg px-3 py-2">
            <span>{mapState.map[key]} → {IMPORT_CANON_LABELS[key]||key}</span><span className="text-good font-semibold">✓</span>
          </div>)}
        </div>
        {unmappedKeys.length>0 && <>
          <p className="text-sm text-slate mb-2">We didn't find a column for these — pick one if your file has it, otherwise leave it as-is:</p>
          <div className="space-y-1.5 mb-4">
            {unmappedKeys.map(key=>{
              const used=new Set(Object.keys(mapState.map).filter(k=>k!==key).map(k=>mapState.map[k]).filter(Boolean));
              const avail=(parseState.headers||[]).filter(h=>!used.has(h));
              return <div key={key} className="flex items-center justify-between gap-2 text-sm">
                <span className="text-slate">{IMPORT_CANON_LABELS[key]||key}</span>
                <select data-testid={'import-map-'+key} value={mapState.map[key]||''} onChange={e=>{const v=e.target.value||null; setMapState(s=>Object.assign({},s,{map:Object.assign({},s.map,{[key]:v})}));}} className={inp}>
                  <option value="">Not in this file</option>
                  {avail.map(h=><option key={h} value={h}>{h}</option>)}
                </select>
              </div>;
            })}
          </div>
        </>}
        <button data-testid="import-map-continue" onClick={goFromMap} className="bg-crimson text-white rounded-lg px-4 py-2 text-sm font-semibold">Continue</button>
      </div>}

      {step==='plans' && report && <div>
        <p className="text-sm text-slate mb-4">We don't know these plan names yet — pick what they should become. We never invent pricing.</p>
        <div className="space-y-2 mb-4">
          {report.planNames.unknown.map((name,idx)=><div key={name} className="flex items-center justify-between gap-2 text-sm bg-mist/40 rounded-lg px-3 py-2">
            <span className="font-medium truncate">"{name}"</span>
            <select data-testid={'import-plan-select-'+idx} value={planMap[name]||''} onChange={e=>{const v=e.target.value; setPlanMap(pm=>Object.assign({},pm,{[name]:v}));}} className={inp}>
              <option value="">Leave unassigned (—)</option>
              {plans.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
          </div>)}
        </div>
        <button data-testid="import-plans-continue" onClick={()=>setStep('preview')} className="bg-crimson text-white rounded-lg px-4 py-2 text-sm font-semibold">Continue</button>
      </div>}

      {step==='preview' && report && (()=>{
        const c=report.counts.create, u=report.counts.update, s=report.counts.skip, e=report.counts.error;
        const headline = c+' new member'+(c===1?'':'s')+' · '+u+' update'+(u===1?'':'s')+' · '+s+' unchanged · '+e+' need'+(e===1?'s':'')+' attention';
        const cta = 'Import '+importPlural(c+u,'row')+' (skip '+e+')';
        return <div>
          {listStale && <div data-testid="import-stale-note" className="text-xs text-gold bg-gold/10 rounded-lg px-3 py-2 mb-3">We couldn't refresh your latest roster before comparing — if someone was added on another device recently, they might show up here as new.</div>}
          <div data-testid="import-headline" className="text-base font-semibold mb-3">{headline}</div>
          <div className="max-h-[320px] overflow-y-auto space-y-1 mb-4 border border-slate/15 rounded-lg p-2">
            {report.items.map((it,i)=><div key={i} data-testid="import-row" className="text-sm flex items-start justify-between gap-2 py-1.5 border-b border-slate/10 last:border-0">
              <div className="min-w-0">
                <div className="font-medium truncate">{it.row.name || ('Row '+(it.rowIndex+2))}</div>
                {it.action==='update' && it.diff && <div className="text-[12px] text-slate">
                  {Object.keys(it.diff).map(f=><div key={f}>{f}: {importFmtVal(it.diff[f].from)} → {importFmtVal(it.diff[f].to)}</div>)}
                </div>}
                {it.reason && <div className="text-[12px] text-slate">{it.reason}</div>}
                {it.warn && <div className="text-[12px] text-gold">{it.warn}</div>}
              </div>
              {importActionChip(it.action)}
            </div>)}
          </div>
          <div className="flex gap-2">
            <button onClick={onClose} className="flex-1 border border-slate/30 rounded-lg py-2.5 text-sm font-semibold">Cancel</button>
            <button data-testid="import-apply" disabled={(c+u)===0} onClick={doApply} className="flex-1 bg-crimson text-white rounded-lg py-2.5 text-sm font-semibold disabled:opacity-40">{cta}</button>
          </div>
        </div>;
      })()}

      {step==='applying' && <div className="py-10 text-center">
        <div className="w-8 h-8 mx-auto border-4 border-slate/20 border-t-crimson rounded-full animate-spin"></div>
        <div className="mt-4 text-sm text-slate" data-testid="import-applying">Importing…</div>
      </div>}

      {step==='result' && applyResult && (()=>{
        // CRITICAL-1 fix: applyResult.skipped is import-engine.js's report.counts.skip — ONLY
        // duplicate/unchanged rows, NEVER error rows (applyBatch never returns an error count at
        // all). The Preview CTA's "(skip N)" actually refers to the ERROR count (report.counts
        // .error) — a different number than "skipped" means here. Showing applyResult.skipped
        // alone under the word "skipped" silently contradicted the Preview and dropped the error
        // row's fate entirely. Report both, honestly and distinctly, using the `report` the
        // wizard already validated against (still in scope) — never fabricate: the needs-
        // attention clause only appears when there actually were error rows.
        const errN=(report&&report.counts&&report.counts.error)||0;
        return <div>
          <div data-testid="import-result" className="text-sm mb-4">
            {applyResult.created} new member{applyResult.created===1?'':'s'} added · {applyResult.updated} member{applyResult.updated===1?'':'s'} updated · {applyResult.skipped} unchanged{errN>0?(' · '+errN+' need'+(errN===1?'s':'')+' attention (not imported — check the file)'):''}.
          </div>
          <button data-testid="import-done" onClick={onClose} className="w-full bg-crimson text-white rounded-lg py-2.5 text-sm font-semibold">Done</button>
        </div>;
      })()}
      {step==='result' && applyError && <div>
        <div className="text-sm text-crimson mb-4">{applyError}</div>
        <button data-testid="import-done" onClick={onClose} className="w-full border border-slate/30 rounded-lg py-2.5 text-sm font-semibold">Close</button>
      </div>}
      </>}
    </div>
  </div>;
}

// Persistent "Undo this import" affordance for the Members screen. Hidden when there is no
// un-undone batch. `bump` (from ImportWizard's onApplied) re-triggers the lastBatch() read.
function ImportUndoBar({members,setMembers,bump}) {
  const [batch,setBatch]=useState(null);
  const [confirmOpen,setConfirmOpen]=useState(false);
  const [busy,setBusy]=useState(false);
  const [result,setResult]=useState(null);
  const [tick,setTick]=useState(0);
  useEffect(()=>{
    let alive=true;
    (async()=>{
      try{
        if(!hasData()||!window.CP.data.imports){ if(alive) setBatch(null); return; }
        const b=await window.CP.data.imports.lastBatch();
        if(alive) setBatch(b||null);
      }catch(e){ if(alive) setBatch(null); }
    })();
    return ()=>{alive=false;};
  },[bump,tick]);

  if(!batch && !result) return null;   // nothing to undo and nothing to report — stay hidden
  const nCreate=(batch&&batch.rows||[]).filter(r=>r.action==='create').length;
  const nUpdate=(batch&&batch.rows||[]).filter(r=>r.action==='update').length;

  async function doUndo(){
    setBusy(true);
    try{
      const writer=cpImportWriter(members);
      const res=await window.ImportEngine.undoBatch({writer});
      // import-engine.js's kept[].reason is a fixed string ('has activity since the import') —
      // it has no notion of "we're not sure." writer._activityNote (this wizard's own side
      // channel, set by hasActivitySince above) is what actually distinguishes a verified
      // check-in from a member kept only because we couldn't confirm one way or the other —
      // the owner should never be told "she checked in" when we really mean "we couldn't check."
      const named=(res.kept||[]).map(k=>{
        const m=(members||[]).find(x=>x.id===k.member_id);
        const note=writer._activityNote?writer._activityNote[k.member_id]:null;
        return {name:m?m.n:'that member', reason:k.reason, unverified:note==='unverified'};
      });
      importResyncMembers(setMembers);
      setResult({reverted:res.reverted, removed:res.removed, kept:named});
      setConfirmOpen(false);
    }catch(e){
      setResult({error:"Undo didn't finish — nothing else was changed. Try again in a moment."});
    }finally{
      setBusy(false);
    }
  }

  return <div className="mb-4">
    {!result && <>
      <button data-testid="import-undo-open" onClick={()=>setConfirmOpen(true)} className="text-sm font-medium border border-slate/30 rounded-lg px-3 py-2 bg-white">↩ Undo this import</button>
      {confirmOpen && <div className="fixed inset-0 bg-black/60 grid place-items-center z-40 p-4" {...bgClose(busy?(()=>{}):(()=>setConfirmOpen(false)))}>
        <div className="bg-white rounded-2xl p-6 w-[440px] max-w-full" onClick={e=>e.stopPropagation()}>
          <h2 className="text-xl font-bold mb-3">Undo this import?</h2>
          <p className="text-sm text-navy mb-5">This removes the {nCreate} member{nCreate===1?'':'s'} that import created and restores the {nUpdate} it changed. Members who've checked in since stay.</p>
          <div className="flex gap-2">
            {/* IMPORTANT-3 fix: doUndo() only clears confirmOpen AFTER the async work resolves —
                while "Undoing…" shows, an un-disabled Cancel would dismiss this dialog while the
                undo keeps running in the background, and its result would then pop up with no
                context. Disabled to match the confirm button; the onClick guard is a second,
                redundant line of defense against any programmatic click while busy. */}
            <button data-testid="import-undo-cancel" disabled={busy} onClick={()=>{ if(busy) return; setConfirmOpen(false); }} className="flex-1 border border-slate/30 rounded-lg py-2.5 text-sm font-semibold disabled:opacity-40">Cancel</button>
            <button data-testid="import-undo-confirm" disabled={busy} onClick={doUndo} className="flex-1 bg-crimson text-white rounded-lg py-2.5 text-sm font-semibold disabled:opacity-40">{busy?'Undoing…':'Undo import'}</button>
          </div>
        </div>
      </div>}
    </>}
    {result && !result.error && <div data-testid="import-undo-result" className="text-sm bg-mist/40 rounded-lg p-3">
      <div>Reverted {importPlural(result.reverted,'update')}. Removed {importPlural(result.removed,'member')}.</div>
      {result.kept.length>0 && <ul className="mt-1.5 space-y-0.5">{result.kept.map((k,i)=><li key={i}>Kept {k.name} — {k.unverified?"we couldn't check whether they've been active, so we kept them just in case.":'checked in since the import.'}</li>)}</ul>}
      <button data-testid="import-undo-dismiss" onClick={()=>{setResult(null); setTick(t=>t+1);}} className="mt-2 text-xs font-semibold text-navy underline">Close</button>
    </div>}
    {result && result.error && <div className="text-sm text-crimson">{result.error}
      <button data-testid="import-undo-dismiss" onClick={()=>{setResult(null); setTick(t=>t+1);}} className="ml-2 text-xs font-semibold underline">Close</button>
    </div>}
  </div>;
}

// Promotion timeline: days at each rank before the next promotion is due. Steps 0–3 = next stripe,
// step 4 = 4 stripes → next belt color. The final belt of a program keeps only its stripe/degree steps.
const PROMO_STEP_LABELS=['→ 1st stripe','→ 2nd stripe','→ 3rd stripe','→ 4th stripe','→ next belt'];
function promoTimelineSeed(){const mk=d=>[d,d,d,d,d];return {
  Adults:{White:mk(40),Blue:mk(45),Purple:mk(50),Brown:mk(55),Black:mk(60)},
  Kids:{White:mk(30),'Gray-white':mk(30),Gray:mk(30),'Gray-black':mk(30),Yellow:mk(35),Orange:mk(35),Green:mk(35)}};}
function fmtDur(d){return d>=365?((d/365).toFixed(1).replace(/\.0$/,''))+' yrs':d>=90?Math.round(d/30.4)+' mo':d+' days';}
function DayCell({value,onChange}){
  return <input type="number" min="0" value={value===0?'':value} placeholder="—"
    onChange={e=>{const v=parseInt(e.target.value,10);onChange(isNaN(v)||v<0?0:v);}}
    className="w-16 rounded-lg border border-slate/30 px-1.5 py-1 text-sm text-center"/>;}
function BulkDays({onApply}){const [v,setV]=useState(''); const ok=parseInt(v,10)>0;
  const go=()=>{onApply(parseInt(v,10)); setV('');};
  return <span className="inline-flex items-center gap-1.5">
    <input type="number" min="1" placeholder="days" value={v} onChange={e=>setV(e.target.value)}
      onKeyDown={e=>{if(e.key==='Enter'&&ok)go();}}
      className="w-16 rounded-lg border border-slate/30 px-1.5 py-1 text-sm text-center"/>
    <button type="button" disabled={!ok} onClick={go}
      className="text-xs font-semibold text-navy hover:underline disabled:opacity-40 whitespace-nowrap">Apply row</button></span>;}
function PromoTimeline(){
  const [prog,setProg]=useState('Adults');
  const [tl,setTl]=useState(()=>{const seed=promoTimelineSeed();
    // Merge any saved values onto the current ladders — belts that no longer exist (e.g. kid Blue) drop away.
    try{const s=localStorage.getItem('cp_belt_timeline'); if(s){const p=JSON.parse(s)||{};
      ['Adults','Kids'].forEach(g=>Object.keys(seed[g]).forEach(b=>{ if(p[g]&&Array.isArray(p[g][b])&&p[g][b].length===5) seed[g][b]=p[g][b]; }));}}catch(e){}
    return seed;});
  useKvPersist('cp_belt_timeline',tl);
  const belts=prog==='Kids'?BELTS_KIDS:BELTS_ADULT;
  const rows=tl[prog];
  const isLast=b=>b===belts[belts.length-1];
  const setStep=(b,i,v)=>setTl(t=>Object.assign({},t,{[prog]:Object.assign({},t[prog],{[b]:t[prog][b].map((d,j)=>j===i?v:d)})}));
  const setRow=(b,v)=>setTl(t=>Object.assign({},t,{[prog]:Object.assign({},t[prog],{[b]:t[prog][b].map(()=>v)})}));
  const reset=()=>setTl(t=>Object.assign({},t,{[prog]:promoTimelineSeed()[prog]}));
  const rowTotal=b=>(rows[b]||[]).slice(0,isLast(b)?4:5).reduce((s,d)=>s+d,0);
  const journey=belts.slice(0,-1).reduce((s,b)=>s+(rows[b]||[]).reduce((x,d)=>x+d,0),0);
  return <Card title="Promotion timeline" action={<div className="flex items-center gap-3">
      <div className="flex gap-1 bg-mist rounded-lg p-1">{['Adults','Kids'].map(p=><button key={p} type="button" onClick={()=>setProg(p)} className={"text-sm px-3 py-1 rounded-md font-medium transition "+(prog===p?'bg-white shadow-card text-navy':'text-slate')}>{p==='Kids'?('Kids (under '+ADULT_MIN_AGE+')'):p}</button>)}</div>
      <button onClick={reset} className="text-sm text-slate hover:text-navy">Reset defaults</button></div>}>
    <div className="text-sm text-slate mb-3">Days at each rank before the next promotion is due. Edit any single step, or type a number once and <span className="font-semibold">Apply row</span> to set every step for that belt (e.g. all White-belt promotions every 40 days).</div>
    {prog==='Kids' && <div className="text-[12px] text-slate/70 mb-3 -mt-1">Built-in IBJJF rule: this ladder applies to students under {ADULT_MIN_AGE} only. At {ADULT_MIN_AGE} they move onto the adult ladder (White → Blue) and are flagged automatically under “Moving to the adult ladder”.</div>}
    <div className="overflow-x-auto"><table className="w-full text-sm">
      <thead><tr className="text-[11px] uppercase tracking-wide text-slate/70 text-left">
        <th className="py-2 pr-3 font-medium">Belt</th>
        {PROMO_STEP_LABELS.map(l=><th key={l} className="py-2 px-1.5 font-medium text-center whitespace-nowrap">{l}</th>)}
        <th className="py-2 px-1.5 font-medium text-center whitespace-nowrap">Time at belt</th>
        <th className="py-2 pl-3 font-medium whitespace-nowrap">Set whole row</th></tr></thead>
      <tbody className="divide-y divide-slate/10">{belts.map(b=><tr key={b}>
        <td className="py-2.5 pr-3 whitespace-nowrap"><BeltChip belt={b}/></td>
        {[0,1,2,3,4].map(i=><td key={i} className="py-2.5 px-1.5 text-center">
          {i===4&&isLast(b)?<span className="text-slate/40" title="Top rank — stripe/degree steps only">—</span>:<DayCell value={rows[b][i]} onChange={v=>setStep(b,i,v)}/>}</td>)}
        <td className="py-2.5 px-1.5 text-center whitespace-nowrap"><span className="font-semibold">{rowTotal(b).toLocaleString()}d</span><span className="text-[11px] text-slate/70 block">{fmtDur(rowTotal(b))}</span></td>
        <td className="py-2.5 pl-3"><BulkDays onApply={v=>setRow(b,v)}/></td></tr>)}</tbody>
    </table></div>
    <div className="text-sm text-slate mt-3 pt-3 border-t border-slate/10">Full journey {belts[0]} → {belts[belts.length-1]}: <span className="font-semibold text-navy">{fmtDur(journey)}</span> <span className="text-slate/70">({journey.toLocaleString()} days of time-in-rank at the pace above — students surface in “Ready for promotion” as they hit each step)</span></div>
  </Card>;
}

function Belts({members,setMembers,acts,setActs}){
  const [promo,setPromo]=useState(null);
  const aging=members.filter(m=>agedUp(m) && m.status!=='Inactive');
  const ready=members.filter(m=>m.status==='Active' && m.req && m.cur/m.req>=0.85 && !agedUp(m));
  const counts={}; members.forEach(m=>{counts[m.belt]=(counts[m.belt]||0)+1;});
  const dist=beltOrder.filter(b=>counts[b]).map(b=>({l:b,v:counts[b],c:BELT[b]}));
  const mx=Math.max.apply(null,dist.map(d=>d.v).concat([1]));
  const recent=Object.keys(acts).reduce((out,id)=>out.concat((acts[id]||[]).filter(e=>e.t==='promotion').map(e=>({d:e.d,label:e.label,name:(members.find(m=>m.id===id)||{}).n||''}))),[]).sort((a,b)=>b.d.localeCompare(a.d)).slice(0,8);
  return <div className="space-y-4">
    {aging.length>0 && <Card title="Moving to the adult ladder" action={<span className="text-sm text-slate">built-in rule — kids belts end at {ADULT_MIN_AGE}</span>}>
      <ul className="divide-y divide-slate/10">{aging.map(m=><li key={m.id} className="py-3 flex items-center gap-4">
        <div className="w-44 font-semibold flex items-center gap-2 min-w-0"><BeltChip belt={m.belt} str={m.str}/> <span className="truncate">{m.n}</span></div>
        <div className="flex-1 text-sm text-slate">Now {m.age} — {m.belt==='Green'?'graduates to Blue':'restarts at White'} on the adult ladder</div>
        <button onClick={()=>setPromo(m)} className="bg-crimson text-white text-sm font-semibold px-4 py-1.5 rounded-lg shrink-0">Award adult belt</button></li>)}</ul>
    </Card>}
    <Card title="Ready for promotion" action={<span className="text-sm text-slate">{ready.length} students</span>}>
      {ready.length===0?<div className="text-sm text-slate/60 py-2">No one’s due right now.</div>:
      <ul className="divide-y divide-slate/10">{ready.map(m=><li key={m.id} className="py-3 flex items-center gap-4">
        <div className="w-44 font-semibold flex items-center gap-2 min-w-0"><BeltChip belt={m.belt} str={m.str}/> <span className="truncate">{m.n}</span></div>
        <div className="flex-1"><Pbar cur={m.cur} req={m.req}/></div>
        <button onClick={()=>setPromo(m)} className="bg-crimson text-white text-sm font-semibold px-4 py-1.5 rounded-lg shrink-0">Promote</button></li>)}</ul>}
    </Card>
    <div className="grid grid-cols-2 gap-4">
      <Card title="Belt distribution"><div className="space-y-2 mt-1">{dist.map((d,i)=><div key={i} className="flex items-center gap-3"><span className="w-24 text-sm">{d.l}</span><div className="flex-1 h-4 bg-slate/10 rounded"><div className="h-full rounded" style={{width:Math.round(d.v/mx*100)+'%',background:d.c}}></div></div><span className="text-sm font-semibold w-6 text-right">{d.v}</span></div>)}</div></Card>
      <Card title="Recent promotions">{recent.length===0?<div className="text-sm text-slate/60">None yet.</div>:<ul className="divide-y divide-slate/10">{recent.map((p,i)=><li key={i} className="py-2.5 flex justify-between gap-2"><span className="font-semibold truncate">{p.name}</span><span className="text-sm text-slate shrink-0">{p.label.replace(/^Promoted to /,'')} · {shortDate(p.d)}</span></li>)}</ul>}</Card>
    </div>
    <PromoTimeline/>
    {promo && <PromoteModal member={promo} onClose={()=>setPromo(null)} onSave={(belt,str,date)=>{setMembers(ms=>ms.map(m=>m.id===promo.id?Object.assign({},m,{belt,str,cur:0}):m)); setActs(a=>Object.assign({},a,{[promo.id]:[{d:date||TODAY_ISO,t:'promotion',label:'Promoted to '+rankLabel(belt,str)}].concat(a[promo.id]||[])})); setPromo(null);}}/>}
  </div>;
}

      <div className="space-y-4">{Object.keys(groups).map(cat=><div key={cat}>

      </div>)}</div>

    </Card>

}

const FD_NOW_MIN=18*60+45, FD_NOW_LABEL='6:45 PM';   // mock "now" — Thursday, Jun 4
function fdParseT(s){const m=(s||'').match(/(\d+):(\d+)([ap])/); if(!m)return 0; let h=(+m[1])%12; if(m[3]==='p')h+=12; return h*60+(+m[2]);}
function fdStatus(start){const end=start+60;
  if(FD_NOW_MIN<start) return {k:'upcoming',label:(start-FD_NOW_MIN<=90?('in '+(start-FD_NOW_MIN)+' min'):'later today'),cls:'bg-navy/10 text-navy'};
  if(FD_NOW_MIN<=end){const d=FD_NOW_MIN-start; return {k:'now',label:d<=5?'on now':'on now · '+d+'m in',cls:'bg-good/10 text-good'};}
  return {k:'done',label:'done',cls:'bg-slate/15 text-slate'};}

        : <button onClick={()=>checkIn(m)} className="shrink-0 bg-crimson text-white rounded-lg px-3.5 py-1.5 text-sm font-semibold">Check in</button>}
    </div>;}):<div className="text-slate/60 text-sm py-3">No member matches “{q.trim()}”.</div>}

/* ===================== INSIGHTS (trends & composition — the analytical surface) =====================

const INS_RANGES=[['7d','This week'],['30d','This month'],['90d','3 months'],['12m','12 months']];

function insSeries(range,base,slope,shift){const labels=INS_LABELS[range];return labels.map((l,i)=>({l,v:Math.max(0,Math.round(base+slope*i+6*Math.sin((i+shift)*1.3)))}));}

    <Bars data={data}/>

}

/* ✏️ Prompt edits — deterministic vocabulary. Returns {v} on success, null on miss.
   Every utterance (hit or miss) is logged to cp_mkt_edits: the corpus that scopes the
   real LLM edit endpoint at M1 (same philosophy as the assistant's WoZ capture). */
const MKT_EDIT_HINTS='Try: “bigger headline” · “gold accent” · “darker” · “centered” · headline "Your text" · cta Join now · “different photo” · “remove date” · “serif”';
function applyAdEdit(promptRaw,v){
  const p=(promptRaw||'').trim();const low=p.toLowerCase();if(!p)return null;
  const ed={...(v.edits||{})};let hit=false;const out={...v};
  let m=p.match(/headline\s*[:=]?\s*["“']([^"”']+)["”']/i)||p.match(/(?:headline|title)\s+says\s+(.+)$/i);
  if(m){out.head=m[1].trim();hit=true;}
  m=p.match(/(?:cta|button)\s*[:=]?\s*["“']([^"”']+)["”']/i)||p.match(/(?:cta|button)(?:\s+says)?\s+(.+)$/i);
  if(m&&!/^(bigger|smaller|gold|red)/i.test(m[1])){out.cta=m[1].trim();hit=true;}
  m=p.match(/(?:subtitle|subline|sub)\s*[:=]?\s*["“']([^"”']+)["”']/i);
  if(m){out.sub=m[1].trim();hit=true;}
  if(/\b(bigger|larger|huge)\b/.test(low)&&!/\bimage|photo\b/.test(low)){ed.headScale=Math.min(1.6,(ed.headScale||1)+0.15);hit=true;}
  if(/\bsmaller\b/.test(low)&&!/\bimage|photo\b/.test(low)){ed.headScale=Math.max(0.7,(ed.headScale||1)-0.15);hit=true;}
  if(/\b(gold|yellow)\b/.test(low)){ed.accent='#E8B53A';hit=true;}
  else if(/\b(red|crimson)\b/.test(low)){ed.accent='#E11D2A';hit=true;}
  else if(/\bwhite\b/.test(low)){ed.accent='#F3F3F5';hit=true;}
  else if(/\b(teal|blue)\b/.test(low)){ed.accent='#38BDF8';hit=true;}
  if(/\bdarker\b/.test(low)){ed.scrimBoost=Math.min(3,(ed.scrimBoost||0)+1);hit=true;}
  if(/\b(lighter|brighter)\b/.test(low)){ed.scrimBoost=Math.max(-2,(ed.scrimBoost||0)-1);hit=true;}
  if(/\bcenter|centred|centered\b/.test(low)){ed.align='center';hit=true;}
  else if(/\bleft\b/.test(low)){ed.align='left';hit=true;}
  else if(/\bright\b/.test(low)&&!/copyright/.test(low)){ed.align='right';hit=true;}
  if(/\b(remove|hide|no)\s+(the\s+)?date\b/.test(low)){ed.hideWhen=true;hit=true;}
  if(/\bshow\s+(the\s+)?date\b/.test(low)){ed.hideWhen=false;hit=true;}
  if(/\bserif|elegant\b/.test(low)){ed.font='serif';hit=true;}
  if(/\bsans|clean font\b/.test(low)){ed.font='sans';hit=true;}
  if(/\b(uppercase|all caps)\b/.test(low)){ed.caseMode='upper';hit=true;}
  if(/\b(lowercase|title case|normal case)\b/.test(low)){ed.caseMode='title';hit=true;}
  if(/\bcrop\s+(up|top|higher)|show\s+the\s+top\b/.test(low)){ed.imgPos='top';hit=true;}
  if(/\bcrop\s+(down|bottom|lower)\b/.test(low)){ed.imgPos='bottom';hit=true;}
  if(/\b(different|another|new|next)\s+(image|photo|picture|background)\b/.test(low)){ed.imgShift=((ed.imgShift||0)+1)%MKT_THEMES.length;hit=true;}
  try{const log=JSON.parse(localStorage.getItem('cp_mkt_edits')||'[]');
    log.push({ts:Date.now(),style:v.styleKey,layout:v.layout,prompt:p,matched:hit});
    localStorage.setItem('cp_mkt_edits',JSON.stringify(log.slice(-400)));}catch(e){}
  if(!hit)return null;
  out.edits=ed;return out;
}

const mktAgo=ts=>{const m=Math.max(1,Math.round((Date.now()-ts)/60000));return m<60?m+'m ago':m<1440?Math.round(m/60)+'h ago':Math.round(m/1440)+'d ago';};
// Deterministic fake metrics from post age (boost multiplies while running).
function mktMetrics(post){const hrs=Math.max(.2,(Date.now()-post.ts)/36e5);const boostOn=post.boost&&(Date.now()-post.boost.ts)<post.boost.days*864e5;
  const reach=Math.round(Math.pow(hrs,.65)*95*(boostOn?1+post.boost.budget/6:1));return {reach,likes:Math.round(reach*.072),boostOn};}

function parseInventoryAdd(q){

// ===== Day-zero guided quests: action-gated tours that sequence drill → pricing → round-trip =====
// Runs in BOTH standalone and inside assistant-home's iframe. onboarding.js renders/positions; Guide
// owns quest state + telemetry; this block is the console-side orchestrator (one tour at a time, no dead-ends).
(function(){
  if(!(window.Guide && window.Onboarding)) return;
  var pageSkipped=false, tourInFlight=false, roundtripAttempted=false, activeTourCleanup=null, evalTimer=null;

  function tourActive(){ return !!document.getElementById('cp-onb-tip'); }

  // Used to bridge React re-renders: we only fire it once the not-yet-rendered target actually appears.

  }
  function clearNavLock(){

  }

      var toast=document.createElement('div'); toast.id='cp-navlock-toast'; toast.className='cp-navlock-toast';

      if(anyVisible(navSel)) return null;                                                   // nav already on screen (drawer open)
      var toggle=document.querySelector('.js-nav-toggle');
      if(!toggle || toggle.offsetParent===null) return null;                                // ☰ not actually on screen → skip
      return {sel:'.js-nav-toggle', place:'bottom', title:'Open the menu', body:"Your gym's sections live behind this button.", advanceOn:{event:'click', target:'.js-nav-toggle'}, action:'Tap ☰'};
    }catch(e){ return null; }
  }

  // The old "Set up your gym" checklist is on-demand only; endTour('done') auto-opens it, so we remove it after a quest tour.
  function suppressChecklistPop(){
    var kill=function(){ var c=document.getElementById('cp-onb-check'); if(c&&c.parentNode) c.parentNode.removeChild(c); };
    kill(); setTimeout(kill,0); setTimeout(kill,80);
  }

  // The drill's "click a name" opens the invoice drawer (a full-screen overlay). Close it on completion so the
  // next tour's sidebar spotlight isn't obstructed. Scoped to #root and the drawer's ✕ — never touches the tour DOM.
  function closeBillingOverlay(){
    try{
      var root=document.getElementById('root'); if(!root) return;
      var overlays=root.querySelectorAll('.fixed.inset-0');
      for(var i=overlays.length-1;i>=0;i--){
        var btns=overlays[i].querySelectorAll('button');
        for(var j=0;j<btns.length;j++){ if((btns[j].textContent||'').trim()==='✕'){ btns[j].click(); return; } }
      }
    }catch(e){}
  }

  // Mirror the pricing quest into the setup-checklist store (cp_onb_owner_ck) via the shared helper — same
  // key-based index write + cp:onb-refresh the Settings sub-tab effect uses, so the two paths stay consistent.
  function markPricingChecklistDone(){ try{ markOwnerChecklist('pricing'); }catch(e){} }

  function scheduleEval(){ if(evalTimer) clearTimeout(evalTimer); evalTimer=setTimeout(function(){ evalTimer=null; evaluateQuests(); }, 450); }

  // Run one gated quest tour. opts: { steps, doneLabel?, gates?[{selector,questId}], gateClick?{selector,cb}, onDone? }
  function runQuestTour(opts){
    tourInFlight=true;
    var cleanups=[];
    function cleanup(){ if(activeTourCleanup===cleanup) activeTourCleanup=null; while(cleanups.length){ try{cleanups.pop()();}catch(e){} } tourInFlight=false; }
    activeTourCleanup=cleanup;

    // Nav-lock: dim locked nav (the current step's target stays live) and keep it in sync with React
    // re-renders + step advances. Cleared on cleanup — which fires on done, skip, Esc and the watchdog.
    injectNavLockStyles(); refreshNavLock();
    var lockIv=setInterval(refreshNavLock, 200);
    cleanups.push(function(){ clearInterval(lockIv); clearNavLock(); });

    try{ Onboarding.startTour(opts.steps); }catch(e){}

    // Relabel the final "Done" button to the quest's confirm label (e.g. "Got it ✓").
    if(opts.doneLabel){
      var relObs=null;
      try{
        relObs=new MutationObserver(function(){
          var tip=document.getElementById('cp-onb-tip'); if(!tip) return;
          var b=tip.querySelector('.cp-onb-next'); if(b && b.textContent.trim()==='Done') b.textContent=opts.doneLabel;
        });
        relObs.observe(document.body,{childList:true,subtree:true});
      }catch(e){}
      cleanups.push(function(){ if(relObs){try{relObs.disconnect();}catch(e){}} });
    }

    // Appearance-based advance gates: bridge a React nav→content re-render without a dead-end race.
    (opts.gates||[]).forEach(function(g){ cleanups.push(whenPresent(g.selector, function(){ fireQuestAdvance(g.questId); })); });

    // Drawer explainer (drill): the "click a failed payment" step is gated on the DRAWER appearing (not the
    // raw click), so the drawer step never gets skipped by the async React render. When #billing-drawer shows
    // up we personalize its copy with the real member name (read live), then fire the advance — mutation first,
    // so onboarding paints the interpolated body. The drawer step itself closes via its advanceOn.gone gate.
    if(opts.drawerStep){
      var dstep=opts.drawerStep;
      cleanups.push(whenPresent('#billing-drawer', function(){
        try{
          var h=document.querySelector('#billing-drawer h2');
          var name=(h && (h.textContent||'').trim());
          if(name) dstep.body='This is '+name+'’s failed payment — the plan, the amount, and why it failed. From right here you can retry the charge, send them a link to update their card, or mark it paid.';
        }catch(e){}
        fireQuestAdvance('cpq-drill-open');
      }));
    }

    // Side-effect on the gate click (e.g. mark the round-trip as attempted so it won't re-offer this session).
    if(opts.gateClick){
      var gc=function(e){ try{ if(e.target && e.target.closest && e.target.closest(opts.gateClick.selector)){ document.removeEventListener('click', gc, true); opts.gateClick.cb(); } }catch(err){} };
      document.addEventListener('click', gc, true);
      cleanups.push(function(){ document.removeEventListener('click', gc, true); });
    }

    // Completion: the closer's confirm button is the only .cp-onb-next in a gated tour (steps 1-2 are gated).
    if(opts.onDone){
      var fin=function(e){ try{ if(e.target && e.target.closest && e.target.closest('.cp-onb-next')){ document.removeEventListener('click', fin, true); suppressChecklistPop(); try{opts.onDone();}catch(err){} cleanup(); scheduleEval(); } }catch(err){} };
      document.addEventListener('click', fin, true);
      cleanups.push(function(){ document.removeEventListener('click', fin, true); });
    }

    // Watchdog: however the tour ends (Done, Esc, Skip tour, nav click), reclaim state + re-evaluate the next quest.
    var t0=Date.now(), seenTip=false;
    var watch=setInterval(function(){
      if(document.getElementById('cp-onb-tip')){ seenTip=true; return; }
      if(!seenTip && Date.now()-t0<2000) return;            // still waiting for the first paint
      clearInterval(watch); suppressChecklistPop();
      if(activeTourCleanup===cleanup) cleanup();
      scheduleEval();
    }, 200);
    cleanups.push(function(){ clearInterval(watch); });
  }

  function startDrillTour(){
    var onBilling=!!document.getElementById('billing-failed');   // already on Billing → skip the "click Billing" step
    // sel is a list so qVis can anchor the visible copy (rail on desktop, drawer on phone).
    var stepNav={sel:'#nav-billing, .js-nav-billing', place:'right', title:"Find out who hasn't paid this month.", body:'Click Billing — money questions live here.', advanceOn:{event:'click'}, questId:'cpq-drill-nav', action:'Click Billing'};
    // Gated on the DRAWER opening (questId 'cpq-drill-open' fired from runQuestTour's whenPresent), NOT the
    // raw click — otherwise the drawer step would be skipped before React renders #billing-drawer.
    var stepFailed={sel:'#billing-failed', place:'right', title:'There they are.', body:'Click any name to see the full story.', advanceOn:{event:'click'}, questId:'cpq-drill-open', action:'Click a failed payment'};
    // Anchored ON the open drawer; copy is personalized with the member name at launch (see runQuestTour).
    // Gated on the drawer CLOSING (advanceOn.gone) so ✕, backdrop-dismiss, or an action button all advance it.
    var stepDrawer={sel:'#billing-drawer', place:'left', title:'One member, the whole story.', body:'This is the member’s failed payment — the plan, the amount, and why it failed. From right here you can retry the charge, send them a link to update their card, or mark it paid.', advanceOn:{gone:'#billing-drawer'}, action:"Close it (✕) when you've had a look"};
    var stepClose={title:'Two ways to the same answer', body:"That's the browse way: overview → drill down. The assistant gets you the same answer in one line — you'll feel when to use which."};
    var steps= onBilling?[stepFailed,stepDrawer,stepClose]:[stepNav,stepFailed,stepDrawer,stepClose];
    if(!onBilling){ var ds=drawerToggleStep('#nav-billing, .js-nav-billing'); if(ds) steps=[ds].concat(steps); }
    runQuestTour({ steps: steps, doneLabel:'Got it ✓', drawerStep: stepDrawer,
      gates: onBilling?[]:[{selector:'#billing-failed', questId:'cpq-drill-nav'}],
      onDone:function(){ closeBillingOverlay(); try{Guide.completeQuest('drill');}catch(e){} } });
  }

  function startPricingTour(){
    var onPricing=!!document.getElementById('settings-pricing-tab');   // already in Settings → skip the "click Settings" step
    var stepNav={sel:'#nav-settings, .js-nav-settings', place:'right', title:'One piece of homework: make the pricing yours.', body:'Open Settings — your plans live here.', advanceOn:{event:'click'}, questId:'cpq-pricing-nav', action:'Click Settings'};
    var stepTab={sel:'#settings-pricing-tab', place:'bottom', title:'This is where your plans live.', body:'Open Classes & Pricing to review them.', advanceOn:{event:'click', target:'#settings-pricing-tab'}, action:'Open Classes & Pricing'};
    var stepClose={title:'Make it yours', body:'Look right? Change anything later — or just tell the assistant.'};
    var steps= onPricing?[stepTab,stepClose]:[stepNav,stepTab,stepClose];
    if(!onPricing){ var ds=drawerToggleStep('#nav-settings, .js-nav-settings'); if(ds) steps=[ds].concat(steps); }
    runQuestTour({ steps: steps, doneLabel:'Looks right ✓',
      gates: onPricing?[]:[{selector:'#settings-pricing-tab', questId:'cpq-pricing-nav'}],
      onDone:function(){ try{Guide.completeQuest('pricing');}catch(e){} markPricingChecklistDone(); } });
  }

  function startRoundtripTour(){
    // Spotlight the sidebar Assistant view button; the click itself fires goAssistant(). The round-trip quest is
    // completed on the ASSISTANT side (its 'ah:go-assistant' listener), never here — we only mark it attempted.
    runQuestTour({
      // .js-assistant-view matches BOTH the desktop-rail and the phone-drawer Assistant-View copies, so the
      // spotlight resolves to a control that's actually on screen (the rail is display:none below lg).
      steps:[
        // Show where the (deliberately discreet) Learn hub lives before the final gated step — Pat:
        // the onboarding must reveal its location in both views since the icon itself is subtle.
        {sel:'.js-learn-hub', place:'top', title:'Worth knowing: the Learn hub.', body:'Step-by-step guides and videos live behind this little 🎓 — for whenever you want the full walkthrough of anything.'},
        {sel:'.js-assistant-view', place:'right', title:'Last one: the round trip.', body:'One tap back to conversation — you never lose your place.', advanceOn:{event:'click', target:'.js-assistant-view'}, action:'Tap Assistant view'}],
      gateClick:{selector:'.js-assistant-view', cb:function(){ roundtripAttempted=true; }}
    });
  }

  function evaluateQuests(){
    try{
      if(!(window.Guide && window.Onboarding)) return;
      if(!Guide.active()) return;               // not a day-zero owner (or journey already done/skipped)
      if(pageSkipped) return;                   // user closed a tour this page session — re-offered on the next page load (the resume HUD lives in the assistant view, not here)
      if(tourActive() || tourInFlight) return;  // at most one tour at a time
      if(!consoleReady()){ scheduleEval(); return; }   // wait for React to paint the console
      var q=(Guide.state().quests)||{};
      if(!q.drill){ startDrillTour(); return; }
      if(!q.pricing){ startPricingTour(); return; }
      if(!q.roundtrip && !roundtripAttempted){ startRoundtripTour(); return; }
    }catch(e){}
  }

  // A tour the user Esc/Skips must not relaunch this page session (re-offered on the next page load instead).
  // Gate Escape on our own in-flight flag, NOT tourActive(): onboarding's window-capture onKey tears down the
  // tip before this document listener runs, so the tip would already be gone by the time we checked the DOM.
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && (tourInFlight || tourActive())) pageSkipped=true; }, true);
  // Same gate as Escape: only a real in-flight/active tour dismissal suppresses re-offers. The manual ❓ Tour
  // (OWNER_TOUR) is not a gated tour (tourInFlight stays false), so skipping IT must not block gated re-offers.
  document.addEventListener('click', function(e){ try{ if(e.target && e.target.closest && e.target.closest('.cp-onb-skip') && (tourInFlight || tourActive())) pageSkipped=true; }catch(err){} }, true);

  // Exposed for the header ❓ Tour handler: before it starts the manual OWNER_TOUR, tear down any in-flight
  // gated day-zero tour. This block arms a document-level 'fin' listener that fires on ANY .cp-onb-next click,
  // so the manual tour's Done button would otherwise call the gated tour's onDone and falsely complete
  // drill/pricing. We disarm our own gate/completion listeners (activeTourCleanup) and set the no-relaunch
  // flag so gated quests re-offer on the NEXT page load (not this session). Onboarding's own teardown is
  // covered by the startTour() call that follows in the ❓ handler (it repaints + clears the gated step gate).
  window.__cpEndGatedTour=function(){ pageSkipped=true; try{ if(activeTourCleanup) activeTourCleanup(); }catch(e){} clearNavLock(); };

  // Nav-lock click interceptor — registered ONCE, before onboarding's per-step listeners, so it can
  // stopImmediatePropagation a locked click (nothing else, incl. React's onClick, ever sees it). Inert
  // unless a gated tour is in flight. The lock lifts via each tour's cleanup (done/skip/Esc/watchdog).
  document.addEventListener('click', onNavGuardClick, true);

  // Re-evaluate whenever quest state changes in this frame (guide:quest / guide:change) or another frame (storage).
  window.addEventListener('guide:quest', scheduleEval);
  window.addEventListener('guide:change', scheduleEval);
  window.addEventListener('storage', function(e){ if(!e || !e.key || e.key==='cp_day0') scheduleEval(); });

  // First offer — after ~800ms, once the console has actually painted.
  setTimeout(function boot(){ if(consoleReady()) scheduleEval(); else setTimeout(boot,120); }, 800);
})();
</script>
</body>
</html>
