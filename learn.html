<!-- ===== Safety net: never show a silent blank page again ===== -->
<script>
(function(){
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function panel(title,detail){
    var r=document.getElementById('root'); if(!r) return;
    r.innerHTML='<div style="max-width:780px;margin:7vh auto;padding:28px 32px;font:14px/1.6 ui-sans-serif,system-ui,sans-serif;'
      +'background:#151517;color:#f3f3f5;border:1px solid rgba(225,29,42,.45);border-radius:16px;box-shadow:0 20px 60px -20px #000">'
      +'<div style="font-weight:800;font-size:18px;color:#ff5a5f;margin-bottom:6px">⚠ '+esc(title)+'</div>'
      +'<div style="color:#9a9aa2;margin-bottom:14px">The Learn hub hit a problem while loading — it caught it instead of going blank. Send me this text and I’ll fix it.</div>'
      +'<pre style="white-space:pre-wrap;background:#0b0b0d;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;color:#e8e8ec;overflow:auto;max-height:55vh">'+esc(detail)+'</pre></div>';
  }
  window.__showFatal=panel;
  window.addEventListener('error',function(e){
    if(e&&e.message&&/^Script error/i.test(e.message))return;
    panel('JavaScript error',(e.error&&e.error.stack)?e.error.stack:(e.message+'\n'+(e.filename||'')+':'+(e.lineno||'')));
  });
  window.addEventListener('unhandledrejection',function(e){
    panel('Unhandled promise rejection',(e.reason&&e.reason.stack)?e.reason.stack:String(e.reason));
  });
  window.addEventListener('DOMContentLoaded',function(){
    var miss=[];
    if(typeof React==='undefined')miss.push('React  — vendor/react.production.min.js');
    if(typeof ReactDOM==='undefined')miss.push('ReactDOM  — vendor/react-dom.production.min.js');
    if(typeof Babel==='undefined')miss.push('Babel  — vendor/babel.min.js');
    if(miss.length)panel('A required library failed to load','Missing:\n  • '+miss.join('\n  • ')+'\n\nMake sure the "vendor" folder is next to this HTML file.');
  });
  setTimeout(function(){
    if(document.getElementById('__boot')) panel('The page did not start',
      'Scripts loaded but React never mounted within 10s.\nThis is almost always a JSX syntax error in the page script.\nOpen DevTools (F12) → Console for the exact red error, or send me your last edit.');
  },10000);
})();
</script>

        <div className="space-y-1">{m.card.lines.map((l,j)=><div key={j} className="text-slate">{l}</div>)}</div>
      </div>;
      if(m.typing) return <div key={i} className="self-start bg-white/8 rounded-xl rounded-tl-sm px-3 py-2"><span className="replay-typing">•••</span></div>;
      const user=m.who==='user';
      return <div key={i} className={(user?'self-end bg-crimson text-white rounded-tr-sm':'self-start bg-white/8 text-white rounded-tl-sm')+' rounded-xl px-3 py-2'} style={{maxWidth:'88%'}}>{m.text}</div>;
    })}
  </div>;
}
function ReplayPlayer({frames}){
  const [idx,setIdx]=useState(0);
  const [playing,setPlaying]=useState(true);
  useEffect(()=>{ setIdx(0); setPlaying(true); },[frames]);
  useEffect(()=>{
    if(!playing) return;
    const t=setInterval(()=>setIdx(i=>(i+1)%frames.length),1700);
    return ()=>clearInterval(t);
  },[playing,frames]);
  const f=frames[idx]||frames[0];
  const isChat=f.ui==='chat';
  return <figure className="shadow-card rounded-2xl overflow-hidden bg-surface">
    <div className="flex items-center gap-1.5 px-3 py-2 bg-ink/70 border-b border-white/8">
      <span className="w-2.5 h-2.5 rounded-full bg-white/15"></span><span className="w-2.5 h-2.5 rounded-full bg-white/15"></span><span className="w-2.5 h-2.5 rounded-full bg-white/15"></span>
      <span className="text-[11px] text-slate ml-2">Replay · {isChat?'Assistant':'Console'}</span>
      <span className="ml-auto text-[10px] text-slate/60 uppercase tracking-wide">screen replay</span>
    </div>
    <div className="replay-screen relative bg-ink" data-frame={idx} style={{height:'224px'}}>
      <div key={idx} className="absolute inset-0 replay-fade">{isChat?<ChatMock f={f}/>:<ConsoleMock f={f}/>}</div>
      {f.cursor && <Cursor pos={f.cursor} click={!!f.click} idx={idx}/>}
    </div>
    <figcaption className="px-3 py-2 bg-surface border-t border-white/8 flex items-center gap-3">
      <button onClick={()=>{setIdx(0);setPlaying(true);}} title="Restart" aria-label="Restart" className="min-h-[44px] min-w-[44px] grid place-items-center text-slate hover:text-white">⏮</button>
      <button onClick={()=>setPlaying(p=>!p)} title={playing?'Pause':'Play'} aria-label={playing?'Pause':'Play'} className="min-h-[44px] min-w-[44px] grid place-items-center text-slate hover:text-white">{playing?'⏸':'▶'}</button>
      <div className="text-[12px] text-white flex-1 truncate">{f.cap}</div>
      <div className="flex gap-1" aria-hidden="true">{frames.map((_,i)=><span key={i} className={"w-1.5 h-1.5 rounded-full "+(i===idx?'bg-crimson':'bg-white/20')}></span>)}</div>
    </figcaption>
  </figure>;
}

function VideoHero({src,caption}){
  const [ok,setOk]=useState(true);
  if(!ok) return <div className="bg-surface rounded-2xl shadow-card p-4 text-sm text-slate">Video unavailable — the two ways below are the real thing.</div>;
  return <figure className="rounded-2xl overflow-hidden shadow-card bg-black">
    <video src={src} controls muted playsInline preload="metadata" poster="media/learn-hero.jpg" onError={()=>setOk(false)}
      className="w-full block" style={{maxHeight:'420px'}}></video>
    <figcaption className="px-4 py-2 text-[12px] text-slate bg-surface">{caption} <span className="text-slate/60">· a mood clip, not the app — the two ways are below.</span></figcaption>
  </figure>;
}

function Media({a}){
  if(a.video) return <VideoHero src={a.video} caption={a.videoCaption}/>;
  if(a.replayFrames) return <ReplayPlayer frames={a.replayFrames}/>;
  return null;
}

/* ============================================================ THE TWO WAYS (framed as equals) ============================================================ */
function FastWay({a}){
  const href='assistant-home.html?ask='+encodeURIComponent(a.ask.phrase);
  return <div className="bg-surface rounded-2xl p-5 shadow-card flex flex-col">
    <div className="flex items-center gap-2 text-good text-xs font-bold uppercase tracking-wide"><span aria-hidden="true">⚡</span> The fast way</div>
    <p className="text-slate text-sm mt-1">Tell the assistant, in your own words.</p>
    <div className="mt-3 self-start bg-crimson/12 border border-crimson/30 rounded-2xl rounded-tl-sm px-4 py-3" style={{maxWidth:'100%'}}>
      <span className="text-[15px] font-semibold">“{a.ask.phrase}”</span>
    </div>
    <a href={href} className="mt-4 inline-flex items-center justify-center gap-1.5 bg-crimson text-white font-semibold rounded-xl px-4 min-h-[44px] hover:brightness-95 transition">Try it →</a>
    <div className="text-[11px] text-slate mt-2">Opens the assistant and sends it for you.</div>
  </div>;
}
function BrowseWay({a}){
  const href='owner-console.html?goto='+encodeURIComponent(a.goto);
  return <div className="bg-surface rounded-2xl p-5 shadow-card flex flex-col">
    <div className="flex items-center gap-2 text-teal text-xs font-bold uppercase tracking-wide"><span aria-hidden="true">📊</span> The browse way</div>
    <p className="text-slate text-sm mt-1">Click through the dashboard.</p>
    <ol className="mt-3 space-y-2.5 flex-1">
      {a.dash.map((d,i)=><li key={i} className="flex gap-3">
        <span className="shrink-0 w-6 h-6 rounded-full bg-white/8 text-slate grid place-items-center text-xs font-bold">{i+1}</span>
        <span className="text-sm"><span className="text-white">{d.do}</span>{d.hint && <span className="block text-[12px] text-slate mt-0.5">{d.hint}</span>}</span>
      </li>)}
    </ol>
    <a href={href} className="mt-4 inline-flex items-center justify-center gap-1.5 border border-white/15 text-white font-semibold rounded-xl px-4 min-h-[44px] hover:bg-white/5 transition">Walk me there →</a>
    <div className="text-[11px] text-slate mt-2">Opens the console at {a.goto}.</div>
  </div>;
}

function Detail({a,onBack}){
  return <div className="max-w-[1100px] mx-auto px-4 py-6 fadeup">
    <button onClick={onBack} className="text-sm text-slate hover:text-white min-h-[44px] inline-flex items-center gap-1">← All guides</button>
    <div className="flex items-start gap-3 mt-1" data-detail={a.id}>
      <span className="text-3xl leading-none" aria-hidden="true">{a.icon}</span>
      <h1 className="text-xl sm:text-2xl font-extrabold leading-tight">{a.q}</h1>
    </div>
    <p className="text-slate text-sm mt-2" style={{maxWidth:'62ch'}}>Two ways to the same answer — the one-line ask, or the click-path. Use whichever fits the moment; you'll end up knowing both.</p>
    <div className="mt-4">{<Media a={a}/>}</div>
    <div className="grid md:grid-cols-2 gap-3 mt-4"><FastWay a={a}/><BrowseWay a={a}/></div>
    <div className="text-center text-[12px] text-slate/70 mt-5">Same data behind both. The assistant and the console are two doors into the one gym.</div>
  </div>;
}

/* ============================================================ DAY-ZERO FINALE (when 'learn' is the 6th quest) ============================================================
   Same overlay as assistant-home's QuestHUD celebration — this is where it fires if the owner peeked at
   the Learn hub last. celebrated (saved on show) is the shared guard, so it renders on exactly one page. */
function Celebration({gymName,onClose}){
  return <div className="fixed inset-0 z-[80] bg-black/85 grid place-items-center p-6 fadeup">
    <div className="max-w-md w-full text-center">
      <img src="media/gs-complete.jpg" alt="" className="w-full max-h-64 object-cover rounded-2xl mb-6 shadow-card" onError={e=>{e.target.style.display='none';}}/>
      <div className="text-2xl font-extrabold mb-2">That's the whole system. 🥋</div>
      <div className="text-sm text-slate mb-6">You've earned your white belt in {gymName} ops — everything else is just reps.</div>
      <a href="assistant-home.html" className="block w-full bg-crimson text-white rounded-xl px-4 py-3 text-sm font-bold mb-3">Back to my assistant</a>
      <button onClick={onClose} className="text-[13px] text-slate/70 hover:text-slate underline min-h-[44px]">Keep exploring the Learn hub</button>
    </div>
  </div>;
}

/* ============================================================ APP ============================================================ */
function App(){
  const [q,setQ]=useState('');
  const [cat,setCat]=useState(null);
  const [openId,setOpenId]=useState(()=>validId(location.hash));
  const [celebrate,setCelebrate]=useState(false);

  // First load: mark the Learn quest done + log the session. If 'learn' was the SIXTH quest, the finale
  // fires HERE (the celebration overlay otherwise only lives in assistant-home). celebrated is the shared
  // guard, saved the moment we show it, so it never double-fires across the two pages.
  useEffect(()=>{
    try{
      if(!G) return;
      G.init({app:'learn'});
      G.completeQuest('learn');
      const st=G.state();
      if(st.completedAt && !st.celebrated){ setCelebrate(true); try{ G.save({celebrated:true}); }catch(e){} }
    }catch(e){}
  },[]);

  // Hash routing: learn.html#paid-this-month deep-links straight to an article; back button supported.
  useEffect(()=>{
    const onHash=()=>setOpenId(validId(location.hash));
    window.addEventListener('hashchange',onHash);
    return ()=>window.removeEventListener('hashchange',onHash);
  },[]);

  // Telemetry: opening an article.
  useEffect(()=>{
    if(openId){ try{ if(G) G.track('view',{article:openId}); }catch(e){} try{ window.scrollTo(0,0); }catch(e){} }
  },[openId]);

  // Telemetry: search queries (debounced so we don't log every keystroke).
  useEffect(()=>{
    if(!q || q.trim().length<2) return;
    const t=setTimeout(()=>{ try{ if(G) G.track('view',{search:q.trim().slice(0,40)}); }catch(e){} },600);
    return ()=>clearTimeout(t);
  },[q]);

  const results=useMemo(()=>{
    const needle=q.trim().toLowerCase();
    return KC_ARTICLES.filter(a=>{
      if(cat && (a.cat||[]).indexOf(cat)===-1) return false;
      if(needle && searchText(a).indexOf(needle)===-1) return false;
      return true;
    });
  },[q,cat]);

  const open=useCallback((id)=>{
    setOpenId(id);
    if(validId(location.hash)!==id){ try{ location.hash=id; }catch(e){} }
  },[]);
  const back=useCallback(()=>{
    setOpenId(null);
    try{ history.replaceState(null,'',location.pathname+location.search); }
    catch(e){ try{ location.hash=''; }catch(e2){} }
  },[]);

  const art=openId?KC_ARTICLES.filter(a=>a.id===openId)[0]:null;

  return <div className="min-h-screen flex flex-col">
    <Header onHome={back}/>
    <div className="flex-1">
      {art
        ? <Detail a={art} onBack={back}/>
        : <React.Fragment>
            <Hero/>
            <Toolbar q={q} setQ={setQ} cat={cat} setCat={setCat} count={results.length}/>
            <div className="max-w-[1100px] mx-auto px-4 py-6">
              {results.length
                ? <div className="grid gap-3 sm:grid-cols-2 lg:grid-cols-3">{results.map(a=><ArticleCard key={a.id} a={a} onOpen={open}/>)}</div>
                : <div className="text-center text-slate py-16">No guides match “{q}”. <button onClick={()=>{setQ('');setCat(null);}} className="text-crimson underline min-h-[44px]">Clear filters</button></div>}
            </div>
          </React.Fragment>}
    </div>
    <footer className="max-w-[1100px] mx-auto w-full px-4 py-8 text-[12px] text-slate/70 border-t border-white/8 mt-6 safe-b">
      Cia Paulista · Learn — every answer, both ways. Nothing you do here is sent to a server.
    </footer>
    {celebrate && <Celebration gymName={(G&&G.state().gymName)||'Cia Paulista'} onClose={()=>setCelebrate(false)}/>}
  </div>;
}

// Light test/debug hook (mirrors the house pattern of exposing a window handle).
window.__learn = { count: KC_ARTICLES.length, ids: KC_ARTICLES.map(a=>a.id) };

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err){if(window.__showFatal)window.__showFatal('The page crashed',(err&&err.stack)||String(err));}
  render(){return this.state.err?null:this.props.children;}
}
try{ ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>); }
catch(e){ if(window.__showFatal) window.__showFatal('Failed to start',(e&&e.stack)||String(e)); else throw e; }
</script>
</body>
