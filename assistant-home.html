<script>
(function(){
  function esc(s){return String(s).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
  function panel(title,detail){
    var r=document.getElementById('root'); if(!r) return;
    r.innerHTML='<div style="max-width:780px;margin:7vh auto;padding:28px 32px;font:14px/1.6 ui-sans-serif,system-ui,sans-serif;'
      +'background:#151517;color:#f3f3f5;border:1px solid rgba(225,29,42,.45);border-radius:16px;box-shadow:0 20px 60px -20px #000">'
      +'<div style="font-weight:800;font-size:18px;color:#ff5a5f;margin-bottom:6px">⚠ '+esc(title)+'</div>'
      +'<div style="color:#9a9aa2;margin-bottom:14px">The assistant hit a problem while loading — it caught it instead of going blank. Send me this text and I’ll fix it.</div>'
      +'<pre style="white-space:pre-wrap;background:#0b0b0d;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;color:#e8e8ec;overflow:auto;max-height:55vh">'+esc(detail)+'</pre></div>';
  }
  window.__showFatal=panel;
  window.addEventListener('error',function(e){
    if(e&&e.message&&/^Script error/i.test(e.message))return;
    panel('JavaScript error',(e.error&&e.error.stack)?e.error.stack:(e.message+'\n'+(e.filename||'')+':'+(e.lineno||'')));
  });
  window.addEventListener('unhandledrejection',function(e){
    panel('Unhandled promise rejection',(e.reason&&e.reason.stack)?e.reason.stack:String(e.reason));
  });
  window.addEventListener('DOMContentLoaded',function(){
    var miss=[];
    if(typeof React==='undefined')miss.push('React  — vendor/react.production.min.js');
    if(typeof ReactDOM==='undefined')miss.push('ReactDOM  — vendor/react-dom.production.min.js');
    if(typeof Babel==='undefined')miss.push('Babel  — vendor/babel.min.js');
    if(miss.length)panel('A required library failed to load','Missing:\n  • '+miss.join('\n  • ')+'\n\nMake sure the "vendor" folder is next to this HTML file.');
  });
  setTimeout(function(){
    if(document.getElementById('__boot')) panel('The app did not start',
      'Scripts loaded but React never mounted within 10s.\nThis is almost always a JSX syntax error in the page script.\nOpen DevTools (F12) → Console for the exact red error, or send me your last edit.');
  },10000);
})();
</script>

  if(card.type==='members'){

  if(card.type==='attendance'){
    return <Card title="Attendance — weekly check-ins, last 8 weeks" className="mt-1"><Bars data={ATT8}/>

  if(card.type==='mix'){
    return <Card title="Membership mix" className="mt-1"><Donut data={MIX}/></Card>;

  if(card.type==='marketplace'){return <MarketCard card={card} onAct={onAct}/>;}

        <div className="text-right"><div className="text-sm font-bold">{money(t.monthly)}<span className="text-[11px] text-slate font-medium">/mo</span></div><div className="text-[11px] text-slate">{money(t.quarterly)}/qtr · {money(t.annual)}/yr</div></div>
      </div>)}</div>
    </Card>;

  if(card.type==='schedule'){
    return <Card title="Today's classes" className="mt-1">
      <div className="divide-y divide-white/5">{card.rows.map((c,i)=><div key={i} className="flex items-center gap-3 py-2">
        <div className="text-sm font-bold w-20 shrink-0">{c.t}</div>
        <div className="min-w-0 flex-1 font-semibold text-sm truncate">{c.n}</div>
        <div className="text-[12px] text-slate shrink-0">{c.who}</div>
      </div>)}</div>
    </Card>;
  }
  if(card.type==='goto'){
    return <Card className="mt-1">
      <div className="text-sm text-slate mb-3">Detailed setup and editing screens live in the full console — same data, more knobs.</div>
      <button onClick={()=>onAct('open',{view:'dashboard'})} className="w-full bg-crimson text-white rounded-lg px-3 py-2.5 text-sm font-semibold">Open the console →</button>
    </Card>;
  }
  if(card.type==='profile'){
    const m=card.m;
    return <Card title={m.n} className="mt-1">
      <div className="flex items-center gap-3 mb-3"><BeltGraphic belt={m.belt} str={m.str}/><div className="text-sm text-slate">{rankLabel(m.belt,m.str)} · {m.prog}</div></div>
      <div className="grid grid-cols-2 gap-2 text-sm">
        <Stat k="Status" v={m.status}/><Stat k="Plan" v={m.plan}/>
        <Stat k="Last check-in" v={m.last}/><Stat k="Next payment" v={m.due}/>
        <Stat k="Toward promotion" v={m.cur+' / '+m.req+' classes'}/><Stat k="30-day check-ins" v={m.att.reduce((a,b)=>a+b,0)}/>
      </div>
      {m.note && <div className="mt-3 text-[13px] text-slate border-t border-white/5 pt-2">📝 {m.note}</div>}
      <div className="mt-3 flex gap-2"><button onClick={()=>onAct('message',{member:m})} className="flex-1 bg-navy rounded-lg px-3 py-2 text-sm font-semibold hover:bg-crimson transition">Message</button><button onClick={()=>onAct('open',{view:'members'})} className="flex-1 border border-white/15 rounded-lg px-3 py-2 text-sm font-semibold">Open full profile</button></div>
    </Card>;
  }
  if(card.type==='gym'){
    // School profile — answered from data (cp_gym / Settings › Gym profile), never trained per-phrase.
    const g=card.g;
    return <Card title={g.name} className="mt-1">
      <div className="text-[12px] text-slate -mt-1 mb-3">Your school, as saved in Settings › Gym profile.</div>
      <div className="space-y-2 text-sm">
        <div className="flex items-start gap-2.5"><span className="w-6 text-center shrink-0">📍</span><span>{g.address}</span></div>
        <div className="flex items-start gap-2.5"><span className="w-6 text-center shrink-0">📞</span><span>{g.phone}</span></div>
        <div className="flex items-start gap-2.5"><span className="w-6 text-center shrink-0">✉️</span><span>{g.email}</span></div>
        <div className="flex items-start gap-2.5"><span className="w-6 text-center shrink-0">🥋</span><span>{AGG.active} active members · {SCHED_TODAY.length} classes today</span></div>
      </div>
      <div className="mt-3 flex gap-2"><button onClick={()=>onAct('open',{view:'settings'})} className="flex-1 border border-white/15 rounded-lg px-3 py-2 text-sm font-semibold">Edit in Settings</button></div>
    </Card>;
  }
  if(card.type==='instructors'){
    const max=Math.max(...INSTR.map(i=>i.v));
    return <Card title="Your instructors" className="mt-1">
      <div className="text-[12px] text-slate -mt-1 mb-3">{INSTR.length} teaching this month — classes taught:</div>
      <div className="space-y-2">{INSTR.map((i,ix)=><div key={ix} className="flex items-center gap-3">
        <Initials n={i.n}/><div className="font-semibold text-sm w-20 shrink-0 truncate">{i.n}</div>
        <div className="flex-1 h-2 rounded-full bg-white/5 overflow-hidden"><div className="h-full bg-crimson/80 rounded-full" style={{width:(i.v/max*100)+'%'}}></div></div>
        <div className="text-sm font-bold w-8 text-right shrink-0">{i.v}</div>
      </div>)}</div>
    </Card>;
  }
  if(card.type==='howto'){
    // Knowledge-center answer: the fast ask (a tappable chip) + the console click-path + the full guide.
    const a=card.article;
    return <Card title={a.icon+'  '+a.q} className="mt-1">
      <div className="bg-mist rounded-xl p-3 mb-3">
        <div className="text-[11px] text-slate uppercase tracking-wide mb-1.5">The fast way — just ask</div>
        <button onClick={()=>onAct('ask',{q:a.ask.phrase})} className="text-[13px] bg-crimson/12 text-crimson border border-crimson/30 rounded-full px-3.5 py-2 font-semibold hover:bg-crimson/20">💬 “{a.ask.phrase}”</button>
      </div>
      <div className="text-[11px] text-slate uppercase tracking-wide mb-1.5">Or do it in the console</div>
      <div className="space-y-2 mb-3">{a.dash.map((s,i)=><div key={i} className="flex items-start gap-2.5">
        <span className="w-5 h-5 shrink-0 rounded-full bg-white/8 grid place-items-center text-[11px] font-bold mt-0.5">{i+1}</span>
        <div className="min-w-0"><div className="text-sm font-semibold">{s.do}</div>{s.hint && <div className="text-[12px] text-slate">{s.hint}</div>}</div>
      </div>)}</div>
      <a href={"learn.html#"+a.id} target="_blank" rel="noopener" className="inline-block text-[13px] text-teal hover:underline font-semibold">📖 Full guide →</a>
    </Card>;
  }
  if(card.type==='goto-learn'){
    return <Card className="mt-1">
      <div className="text-sm text-slate mb-3">Every "how do I…" lives in the Learn hub — short guides, screen by screen, each with the one-line way to just ask me.</div>
      <a href="learn.html" target="_blank" rel="noopener" className="block text-center w-full bg-crimson text-white rounded-lg px-3 py-2.5 text-sm font-semibold">Open the Learn hub →</a>
    </Card>;
  }
  return null;
}
function Stat({k,v}){return <div><div className="text-[11px] text-slate">{k}</div><div className="font-semibold">{v}</div></div>;}

/* ============================================================ WORKFLOW WIZARD CARDS (Pat's ask: marketing / inventory / marketplace as guided flows in chat) ============================================================ */
// A branded creative preview tile (MktCreative-lite, uses the real mkt/ imagery).
function CreativeTile({draft,styleKey,label,active,onClick,format,max=210}){
  return <button onClick={onClick} className={"relative overflow-hidden rounded-xl text-left w-full transition "+(active?'ring-2 ring-crimson':'ring-1 ring-white/10 opacity-75 hover:opacity-100')} style={{aspectRatio:format==='story'?'9/16':'1/1',maxHeight:max}}>
    <img src={'mkt/'+draft.theme+'-'+styleKey+'.jpg'} alt="" className="absolute inset-0 w-full h-full object-cover" onError={e=>{e.target.style.display='none';}}/>
    <div className="absolute inset-0" style={{background:'linear-gradient(180deg,rgba(0,0,0,.08) 30%,rgba(0,0,0,.8))'}}></div>
    <div className="absolute left-2.5 right-2.5 bottom-2">
      <div className="text-[8px] font-bold tracking-widest text-white/70 uppercase">Cia Paulista</div>
      <div className="text-[15px] font-black text-white leading-tight">{draft.head}</div>
      {draft.evt && <div className="mt-0.5 inline-block text-[8.5px] font-bold bg-crimson text-white rounded px-1.5 py-0.5 uppercase">{draft.evt}</div>}
    </div>
    {label && <div className="absolute top-1.5 left-1.5 text-[9px] bg-black/65 text-white rounded-full px-2 py-0.5">{label}</div>}
  </button>;
}
// The marketing wizard: ① pick a generated creative ② edit the caption ③ platform settings ④ preview → send.
function PostWizard({draft,onAct}){
  const [step,setStep]=useState(1);
  const [pick,setPick]=useState(0);
  const [caption,setCaption]=useState(draft.caption);
  const [plats,setPlats]=useState(draft.platforms&&draft.platforms.length?draft.platforms:['ig','fb']);
  const [format,setFormat]=useState(draft.format||'feed');
  const [posted,setPosted]=useState(false);
  const chans=extStore('cp_mkt_channels',{ig:true,fb:true,tt:false});
  const toggle=k=>setPlats(ps=>ps.includes(k)?ps.filter(x=>x!==k):ps.concat([k]));
  const doPost=()=>{if(posted||!plats.length)return;const rec=publishPost(draft,MKT_STYLES_LITE[pick].k,caption,plats,format);setPosted(true);onAct('receipt',{text:rec,label:'Marketing post'});};
  const StepDot=({n,label})=><span className={"flex items-center gap-1 "+(step===n?'text-white font-bold':'text-slate')}><span className={"w-4 h-4 rounded-full grid place-items-center text-[9px] font-bold "+(step>n?'bg-good/25 text-good':step===n?'bg-crimson text-white':'bg-white/10')}>{step>n?'✓':n}</span>{label}</span>;
  return <Card title="New post — quick wizard" className="mt-1">
    <div className="flex items-center gap-3 text-[10.5px] mb-3 flex-wrap"><StepDot n={1} label="Creative"/><StepDot n={2} label="Caption"/><StepDot n={3} label="Platforms"/><StepDot n={4} label="Send"/></div>
    {step===1 && <div>
      <div className="text-[12px] text-slate mb-2">Three looks, generated from your prompt — tap one:</div>
      <div className="grid grid-cols-3 gap-2">{MKT_STYLES_LITE.map((s,i)=><div key={s.k}>
        <CreativeTile draft={draft} styleKey={s.k} label={s.label} active={pick===i} onClick={()=>setPick(i)} format={format} max={170}/>
      </div>)}</div>
      <button onClick={()=>setStep(2)} className="mt-3 w-full bg-crimson text-white rounded-lg px-3 py-2 text-sm font-semibold">Use this look →</button>
    </div>}
    {step===2 && <div>
      <div className="flex gap-3">
        <div className="w-24 shrink-0"><CreativeTile draft={draft} styleKey={MKT_STYLES_LITE[pick].k} format={format} max={96}/></div>
        <div className="flex-1 min-w-0">
          <div className="text-[12px] text-slate mb-1">Caption — I drafted it; edit anything:</div>
          <textarea value={caption} onChange={e=>setCaption(e.target.value)} rows={4} className="w-full rounded-lg border border-white/15 px-3 py-2 text-[13px] resize-y"/>
        </div>
      </div>
      <div className="mt-2 flex gap-2"><button onClick={()=>setStep(3)} className="flex-1 bg-crimson text-white rounded-lg px-3 py-2 text-sm font-semibold">Looks good →</button><button onClick={()=>setStep(1)} className="border border-white/15 rounded-lg px-3 py-2 text-sm">‹ Back</button></div>
    </div>}
    {step===3 && <div>
      <div className="text-[12px] text-slate mb-1.5">Where should it go?</div>
      <div className="flex flex-wrap gap-2 mb-3">{Object.keys(PLAT_NAMES).map(k=>{const on=plats.includes(k);const conn=chans[k]!==false;
        return <button key={k} onClick={()=>conn&&toggle(k)} disabled={!conn} className={"text-[13px] rounded-full px-3.5 py-2 border font-semibold transition "+(on?'border-crimson bg-crimson/15 text-crimson':'border-white/15 text-white/70 hover:border-white/40')+(conn?'':' opacity-40')}>{PLAT_NAMES[k]}{conn?'':' · not connected'}</button>;})}</div>
      <div className="text-[12px] text-slate mb-1.5">Format</div>
      <div className="flex gap-2 mb-3">{[['feed','Feed · 1:1'],['story','Story · 9:16']].map(([k,l])=><button key={k} onClick={()=>setFormat(k)} className={"text-[13px] rounded-lg px-3.5 py-2 border font-semibold "+(format===k?'border-crimson bg-crimson/15 text-crimson':'border-white/15 text-white/70')}>{l}</button>)}</div>
      <div className="flex gap-2"><button onClick={()=>setStep(4)} disabled={!plats.length} className="flex-1 bg-crimson text-white rounded-lg px-3 py-2 text-sm font-semibold disabled:opacity-30">Preview →</button><button onClick={()=>setStep(2)} className="border border-white/15 rounded-lg px-3 py-2 text-sm">‹ Back</button></div>
    </div>}
    {step===4 && <div>
      <div className="flex gap-3 mb-2">
        <div className="w-32 shrink-0"><CreativeTile draft={draft} styleKey={MKT_STYLES_LITE[pick].k} format={format} max={150}/></div>
        <div className="flex-1 min-w-0">
          <div className="text-[13px] whitespace-pre-wrap bg-mist rounded-lg p-2.5 border border-white/10">{caption}</div>
          <div className="text-[12px] text-slate mt-1.5">To: <span className="text-white/80 font-semibold">{plats.map(k=>PLAT_NAMES[k]).join(' + ')}</span> · {format==='story'?'Story 9:16':'Feed 1:1'}</div>
        </div>
      </div>
      {!posted ? <div>
        <div className="text-[11px] text-gold mb-2">⚠ Posts immediately when you tap — this is the confirm.</div>
        <div className="flex gap-2"><button onClick={doPost} className="flex-1 bg-crimson text-white rounded-lg px-3 py-2.5 text-sm font-bold">🚀 Post now</button><button onClick={()=>setStep(3)} className="border border-white/15 rounded-lg px-3 py-2 text-sm">‹ Back</button></div>
      </div> : <div>
        <div className="text-sm text-good font-semibold">Posted ✓ — it's in Marketing › Recent posts.</div>
        <button onClick={()=>{setPosted(false);setStep(1);}} className="mt-2 w-full border border-white/15 rounded-lg px-3 py-2 text-sm font-semibold hover:border-white/40 transition">🔄 Make another post</button>
      </div>}
    </div>}
  </Card>;
}
// Inventory card + inline "log a delivery" flow. Writes the console's cp_inventory directly.
// Rows live in state so the card refreshes its numbers after each add — it's reusable, not one-shot.
function InvCard({card,onAct}){

/* ============================================================ CHAT ENGINE ============================================================
   respond(q, ctx) → { text, card, follow, action, guesses, clarify, soft }
   - card: a bounded visual result (read)
   - action: a proposed consequential action classified by tier (read | reversible | commit)
   - clarify: we understood the intent but need one thing (a person, an amount) → targeted question, not a shrug
   - guesses: tappable chips shown when we didn't understand (failure → never dead-end)
   - ctx: conversation context {lastMember, lastMiss} — pronouns ("message him too") + rephrase mining
================================================================================================================================ */
/* ===================== BRAIN v2 — parse, don't string-match =====================
   Word-boundary phrase matching only (the "this week matched hi" landmine is dead),
   entity extraction (members incl. fuzzy/typo, unknown people, time, class type),
   compound decomposition (the "Johnny" case), a per-owner PHRASEBOOK it learns into,
   and clarify-instead-of-guess when confidence is low. Pure JS — no JSX — so the
   headless test can drive it via window.__ah. */
const rxEsc=s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
function norm(s){return (s||'').toLowerCase().replace(/[’‘]/g,"'").replace(/[^a-z0-9$'\s-]/g,' ').replace(/-/g,' ').replace(/\s+/g,' ').trim();}
const P=(nq,arr)=>arr.some(p=>new RegExp('\\b'+rxEsc(p).replace(/ /g,'\\s+')+'\\b').test(nq));
function lev(a,b){if(Math.abs(a.length-b.length)>2)return 9;const m=[];for(let i=0;i<=a.length;i++)m[i]=[i];for(let j=0;j<=b.length;j++)m[0][j]=j;
  for(let i=1;i<=a.length;i++)for(let j=1;j<=b.length;j++)m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return m[a.length][b.length];}

// ---- phrasebook: how THIS owner talks. Learned via grooming + mined rephrases. ----
function loadPB(){try{return Object.assign({aliases:[],overrides:[],candidates:[]},JSON.parse(localStorage.getItem('ah_phrasebook')||'{}'));}catch(e){return {aliases:[],overrides:[],candidates:[]};}}
function savePB(pb){try{localStorage.setItem('ah_phrasebook',JSON.stringify(pb));}catch(e){}pushLabState();}
// Built-in seed aliases (part of the brain); pb.aliases are the LEARNED ones on top.
const SEED_ALIASES=[['atrisk','at risk'],['drop ins','drop in list'],['dropins','drop in list'],['$$$','money'],['who owes me money','failed payments'],
  ['open map','open mat'],['openmap','open mat'],['insta','instagram'],['ig','instagram'],['fb','facebook'],['tik tok','tiktok']]; // "open map" = how STT hears "open mat"
const LEX=['members','member','payments','payment','promote','promotion','attendance','message','training','revenue','students','failed','stripe','belt','check','breakdown','risk'];
function canonicalize(nqIn,pb){
  let nq=nqIn;
  SEED_ALIASES.concat((pb.aliases||[]).map(a=>[a.from,a.to])).forEach(([f,t])=>{nq=nq.replace(new RegExp('\\b'+rxEsc(f).replace(/ /g,'\\s+')+'\\b','g'),t);});
  // typo repair: unknown tokens within edit-distance 1 of a core lexicon word ("membrs" → "members")
  nq=nq.split(' ').map(w=>{if(w.length<5||LEX.includes(w))return w;const hit=LEX.find(x=>lev(w,x)<=1);return hit||w;}).join(' ');
  return nq.replace(/\s+/g,' ').trim();
}
function pbAddOverride(u,key,extra){const pb=loadPB();pb.overrides=(pb.overrides||[]).filter(o=>o.u!==u);pb.overrides.push(Object.assign({u,key,ts:new Date().toISOString()},extra||null));savePB(pb);syncEvent('phrasebook_override',Object.assign({u,key},extra||null));}
function pbAddCandidate(missText,hitText,key){
  const pb=loadPB();pb.candidates=pb.candidates||[];
  if(pb.candidates.some(c=>c.miss===missText))return;
  pb.candidates.push({miss:missText,hit:hitText,key,ts:new Date().toISOString()});pb.candidates=pb.candidates.slice(-50);savePB(pb);
  syncEvent('phrasebook_candidate',{miss:missText,hit:hitText,key});
}

// ---- entity extraction ----
function findMemberSmart(nq){
  const MS=memberList();
  for(const m of MS){if(nq.includes(m.n.toLowerCase()))return {m,conf:'exact'};}
  for(const m of MS){const f=m.n.split(' ')[0].toLowerCase();if(f.length>2&&new RegExp('\\b'+f+'\\b').test(nq))return {m,conf:'first'};}
  // last-name match ("Miguel Silva" → Marcus Silva; Pat's live report 2026-07-17). ALWAYS confirm —
  // last names collide (two Reyes on the roster) and the first name may genuinely be someone else.
  for(const m of MS){const ln=m.n.split(' ').slice(-1)[0].toLowerCase();
    if(ln.length>2&&new RegExp('\\b'+ln+'\\b').test(nq))return {m,conf:'fuzzy',heard:(nq.match(new RegExp('\\b[a-z\']+\\s+'+ln+'\\b'))||[ln])[0]};}
  // fuzzy: a token within a small edit distance of a first name (voice/typo: "sara" → Sarah).
  // NEVER act on this without confirming. Common words are excluded so "list" can't become Liam.
  for(const w of nq.split(' ')){
    if(w.length<4||NAME_STOP.has(w)||LEX.includes(w))continue;
    const maxD=w.length<=5?1:2;
    for(const m of MS){const f=m.n.split(' ')[0].toLowerCase();const d=lev(w,f);if(d>0&&d<=maxD&&Math.min(w.length,f.length)>=4)return {m,conf:'fuzzy',heard:w};}}
  return null;
}
const findMember=lc=>{const r=findMemberSmart(norm(lc));return r&&r.conf!=='fuzzy'?r.m:null;}; // legacy shim (exact/first only)
const TIME_RX=/\b((last|this|past)\s+(week|month|monday|tuesday|wednesday|thursday|friday|saturday|sunday)|yesterday|today|(a\s+few|\d+)\s+(day|days|week|weeks)\s+ago)\b/;
const CLASSES=['open mat','no gi','nogi','fundamentals','advanced class','kids class','competition class','morning class','drop in class'];
function extractTime(nq){const m=nq.match(TIME_RX);return m?m[0]:null;}
function extractClass(nq){return CLASSES.find(c=>P(nq,[c]))||null;}
const NAME_STOP=new Set(['the','a','an','to','of','for','in','on','at','our','my','me','we','can','you','please','and','is','was','it','that','this','with','him','her','them','he','she','they','i','list','funnel','week','month','last','new','guy','girl','one','mat','open','class','add','put','came','come','stopped','dropped','by','here','did','who','so','get','also','too','yes','no']);
function extractUnknownName(nq){
  // a token that isn't a stopword, keyword, class/time word, or roster member → probably a person we don't know yet
  const MS=memberList();
  for(const w of nq.split(' ')){
    if(w.length<3||NAME_STOP.has(w)||LEX.includes(w))continue;
    if(/\d|\$/.test(w))continue;
    if(MS.some(m=>m.n.toLowerCase().split(' ').includes(w)))continue;
    if(CLASSES.some(c=>c.split(' ').includes(w)))continue;
    return w.charAt(0).toUpperCase()+w.slice(1);
  }
  return null;
}
const PRONOUN_RX=/\b(him|her|them|he|she|they|that guy|that girl)\b/;
// Event time for posts/announcements ("this friday at seven pm" — voice dictation says numbers as words)
const TOD_RX=/\b(\d{1,2}(:\d{2})?|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve)\s*(am|pm)\b/;
function extractEventTime(nq){
  const day=(nq.match(/\b(this |next |on )?(monday|tuesday|wednesday|thursday|friday|saturday|sunday|tomorrow|tonight|today|this weekend)\b/)||[])[0]||null;
  const tod=(nq.match(TOD_RX)||[])[0]||null;
  if(day&&tod) return day+' at '+tod;
  return day||tod||null;
}
function extractTopic(nq){
  let t=(nq.match(/\babout\s+(.{3,60})/)||[])[1]||'';
  if(!t){for(const k of ['open mat','kids class','free trial','belt ceremony','seminar','gear']){if(P(nq,[k])){t=k;break;}}}
  t=t.replace(/\b(this|next|on)\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday|weekend)\b/g,'')
     .replace(/\b(tomorrow|tonight|today)\b/g,'')
     .replace(/\b(at\s+)?(\d{1,2}(:\d{2})?|one|two|three|four|five|six|seven|eight|nine|ten|eleven|twelve)\s*(am|pm)\b/g,'')
     .replace(/\b(for|on|to)\s+(instagram|facebook|tiktok)\b/g,'')
     .replace(/\s+/g,' ').trim();
  return t||null;
}
// Same copy logic as the console's mktCopy — keeps chat-made posts on-brand and theme-mapped to real mkt/ imagery.
function postCopy(topic,evt){

  let theme='training',head=(topic||'Train with us').toUpperCase().slice(0,26),sub='At Cia Paulista Monrovia';
  if(/open mat/.test(t)){theme='openmat';head='OPEN MAT';sub='All levels · all gyms welcome';}
  else if(/kid|youth|children/.test(t)){theme='kids';head='KIDS BJJ';sub='Confidence starts on the mats';}
  else if(/trial|first class|free week/.test(t)){theme='trial';head='FREE TRIAL WEEK';sub='Try every class on us';}
  else if(/belt|ceremony|promotion|graduation/.test(t)){theme='belt';head='BELT CEREMONY';sub='Come celebrate our team';}
  else if(/seminar|workshop|guest/.test(t)){theme='seminar';head='SPECIAL SEMINAR';sub='One session. Level up.';}
  else if(/gear|gi\b|shirt|merch/.test(t)){theme='gear';head='NEW GEAR DROP';sub='Rep the team';}
  const caption=head.charAt(0)+head.slice(1).toLowerCase()+(evt?(' — '+evt):'')+'. '+sub+'.\n📍 Cia Paulista Monrovia · DM us to join\n#CiaPaulista #BJJ #Monrovia';
  return {theme,head,sub,caption};
}

const MKT_STYLES_LITE=[{k:'photo',label:'📷 Real people',hint:'editorial photo'},{k:'illo',label:'🎨 Illustrated',hint:'poster art'},{k:'place',label:'🏟️ Your gym',hint:'the space itself'}];
const PLAT_NAMES={ig:'Instagram',fb:'Facebook',tt:'TikTok'};
function publishPost(draft,styleKey,caption,platforms,format){
  const s=MKT_STYLES_LITE.find(x=>x.k===styleKey)||MKT_STYLES_LITE[0];
  const plats=(platforms&&platforms.length)?platforms:['ig'];
  try{
    const posts=JSON.parse(localStorage.getItem('cp_mkt_posts')||'[]');
    posts.unshift({id:'mk'+Date.now(),ts:Date.now(),v:{theme:draft.theme,head:draft.head,sub:draft.sub,when:draft.evt||null,cta:'Save your spot',styleKey:s.k,styleLabel:s.label,styleHint:s.hint,img:'mkt/'+draft.theme+'-'+s.k+'.jpg',accent:'#E11D2A'},format:format||'feed',caption:caption||draft.caption,platforms:plats,boost:null});

  }catch(e){}
  syncEvent('post_published',{theme:draft.theme,styleKey:(s&&s.k)||'photo',platforms:plats,format:format||'feed'});
  return 'Posted ✓ — live on '+plats.map(k=>PLAT_NAMES[k]).join(' + ')+'. It\'s in Marketing › Recent posts if you want to tweak or ⚡ boost it.';
}
// Cross-surface data: the console persists its stores to localStorage on the SAME origin, so the
// assistant reads them live (and for posts, writes). Fallback seeds keep the Lab replay deterministic.
// MVP seam: reads go through the shared data layer (CP.data.kv.get — synchronous localStorage,
// cloud-reconciled in the background) and writes through extWrite → CP.data.kv.set (localStorage
// synchronously + a queued cloud write). No data layer ⇒ plain localStorage, exactly the pilot.
function extStore(k,fb){
  try{
    const v=(window.CP&&window.CP.data&&window.CP.data.kv)?window.CP.data.kv.get(k,null):JSON.parse(localStorage.getItem(k));
    if(Array.isArray(v)?v.length:v)return v;
  }catch(e){}
  return fb;
}
function extWrite(k,v){
  try{if(window.CP&&window.CP.data&&window.CP.data.kv){window.CP.data.kv.set(k,v);return;}}catch(e){}
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
}

/* ---- buildSnapshot(): the compact live-data payload for the Edge brain (supabase/functions/brain).
   Everything Claude needs to answer what the parser missed — gym profile, trimmed roster, today's
   schedule, pricing, stock, recent posts, today's check-ins. Hard-capped to stay well under ~15KB
   serialized (members trimmed first). Never throws — a broken snapshot must never block the ask. ---- */
function buildSnapshot(){
  try{
    const members=memberList().slice(0,150).map(m=>{
      const o={name:m.n,belt:m.belt,stripes:m.str,program:m.prog,plan:m.plan,status:m.status};
      if(m.due&&m.due!=='—')o.due=m.due;
      if(Array.isArray(m.att))o.att30=m.att.reduce((x,y)=>x+y,0);
      return o;
    });
    const snap={
      gym:extStore('cp_gym',GYM_FALLBACK),
      members,
      schedule:SCHED_TODAY,
      memberships:extStore('cp_memberships',PRICING_FALLBACK),
      inventory:invRowsLive().map(r=>{const o={n:r.n,units:r.units};if(r.low)o.low=true;return o;}),
      recentPosts:extStore('cp_mkt_posts',[]).slice(0,3).map(p=>String((p&&p.caption)||'').slice(0,120)),
      checkinsToday:memberList().filter(m=>m.last==='today').length+(extStore('cp_checkins',[])||[]).length,
    };
    try{
      let s=JSON.stringify(snap);
      while(s.length>15000&&snap.members.length>20){snap.members=snap.members.slice(0,Math.floor(snap.members.length*0.7));s=JSON.stringify(snap);}
    }catch(e){}
    return snap;
  }catch(e){return {};}
}

/* ---- clause parser: one utterance-piece → {intent, entities}. Ordered, guarded, word-boundary. ---- */
function parseClause(nq,ctx){
  ctx=ctx||{};
  const mem=findMemberSmart(nq);
  const exactMem=mem&&mem.conf!=='fuzzy'?mem.m:null;
  const pron=PRONOUN_RX.test(nq)?(ctx.lastMember||null):null;
  const time=extractTime(nq),cls=extractClass(nq);

  // -- add to drop-in list / funnel / leads (checked BEFORE the visit claim so a one-sentence
  //    "add johnny to the drop in list, he came by for open mat" keeps the visit details) --
  if(P(nq,['add','put','register','sign up','include','get'])&&P(nq,['drop in list','drop in leads','drop in funnel','drop ins list','leads list','marketing funnel','marketing list','the funnel','our list','drop in'])&&!P(nq,['drop in class'])){
    const person=exactMem?exactMem.n:(pron?pron.n:extractUnknownName(nq));
    return {intent:'add_to_dropins',person:person||null,known:exactMem||pron||null,time,cls};
  }
  // -- past-visit claim: "Johnny came in for open mat last week" (statements only — questions like
  //    "when did Marcus last come in" fall through to the data-brain attribute answer) --
  if(P(nq,['came in','came by','come in','stopped by','dropped in','dropped by','was here','was in','showed up','visited','did open mat','trained with us'])&&!P(nq,['who','how many'])&&!/^(when|did|has|have|how|what|is|was)\b/.test(nq)){
    const person=exactMem?exactMem.n:(pron?pron.n:extractUnknownName(nq));
    if(person) return {intent:'attendance_claim',person,known:exactMem||pron||null,time,cls};
  }
  // -- marketing: create a social post (drives the console's 📣 Marketing from chat) --
  const POSTY=['make a post','create a post','post about','make an ad','new post','put up a post','make a story','post something','share a post','make a flyer','promote on','announce on'];
  if((P(nq,POSTY)||(P(nq,['post','story'])&&P(nq,['instagram','facebook','tiktok'])&&!P(nq,['boost'])))&&!P(nq,['recent posts'])){
    const platforms=[];if(P(nq,['instagram']))platforms.push('ig');if(P(nq,['facebook']))platforms.push('fb');if(P(nq,['tiktok']))platforms.push('tt');
    return {intent:'createPost',platforms:platforms.length?platforms:['ig','fb'],format:P(nq,['story'])?'story':'feed',evt:extractEventTime(nq),topic:extractTopic(nq)};
  }
  // -- marketing: boost the latest post (spends money → its own confirm) --
  if(P(nq,['boost'])&&!P(nq,POSTY)){
    const amt=(nq.match(/\$?\b(10|25|50)\b/)||[])[1];
    return {intent:'boostPost',budget:amt?parseInt(amt):25};
  }
  // -- promote / stripe --
  if((P(nq,['promote'])||(P(nq,['stripe','belt'])&&P(nq,['give','award','grade','next','bump'])))&&!P(nq,['who','due','ready','list','show','close'])){
    if(exactMem) return {intent:'promote',member:exactMem};
    if(mem&&mem.conf==='fuzzy') return {intent:'confirm_person',member:mem.m,heard:mem.heard,then:'Promote'};
    if(pron) return {intent:'promote',member:pron};
    return {intent:'promote',member:null};
  }
  // -- update a member's payment method: "update payment information for Marcus Silva",
  //    "marcus has a new credit card". Data-schema operation (member.billing), NOT a trained phrase —
  //    resolves for any member + any payment-info noun. Sends a secure card-update link (commit tier).
  if((P(nq,['update','change','replace','fix','swap','edit'])&&P(nq,['payment','payments','card','billing','payment information','payment info','payment method','payment details','card on file','credit card','card info','card number','billing info','billing information','billing details'])&&!P(nq,['failed','overdue']))
     ||P(nq,['new credit card','new card','new debit card','new payment method','new form of payment'])){
    if(P(nq,['everyone','all members','everybody'])) return {intent:'read',key:'billing'}; // bulk = the billing card's send-all flow
    if(exactMem) return {intent:'updatePayment',member:exactMem};
    if(mem&&mem.conf==='fuzzy') return {intent:'confirm_person',member:mem.m,heard:mem.heard,then:'Update payment info for'};
    if(pron) return {intent:'updatePayment',member:pron};
    return {intent:'updatePayment',member:null};
  }
  // -- record a payment: "marcus paid me 165 cash" --
  if(P(nq,['paid','payment of','record a payment','record payment','log a payment','gave me'])&&!P(nq,['who','coming','upcoming','due'])){
    const amt=(nq.match(/\$?(\d{2,5})\b/)||[])[1];
    const method=P(nq,['cash'])?'cash':P(nq,['card','credit'])?'card':P(nq,['venmo'])?'Venmo':P(nq,['zelle'])?'Zelle':'cash';
    if(exactMem&&amt) return {intent:'recordPayment',member:exactMem,amt:parseInt(amt),method};
    if(mem&&mem.conf==='fuzzy'&&amt) return {intent:'confirm_person',member:mem.m,heard:mem.heard,then:amt+' '+method+' payment from'};
    return {intent:'recordPayment',member:exactMem,amt:amt?parseInt(amt):null,method};
  }
  // -- message a segment --
  if(P(nq,['message','text','notify','remind','email','announce','blast','tell'])&&P(nq,['all','everyone','everybody','group','at risk','failed','overdue','trial','members','upcoming','renewing','behind on'])){
    let seg='all members',count=AGG.active;
    if(P(nq,['at risk','quiet','quitting'])){seg='at-risk';count=atRiskMembers().length;}
    else if(P(nq,['failed','overdue','behind on','payment','payments'])){seg='failed-payment';count=FAILED_PAY.length;}
    else if(P(nq,['upcoming','renew','renewing','due'])){seg='upcoming-renewal';count=upcomingRenewals().length;}
    return {intent:'message_all',seg,count};
  }
  // -- message one person --
  if(P(nq,['message','text','remind','email'])&&(exactMem||pron||PRONOUN_RX.test(nq)||(mem&&mem.conf==='fuzzy'))){
    if(exactMem||pron) return {intent:'message',member:exactMem||pron};
    if(mem&&mem.conf==='fuzzy') return {intent:'confirm_person',member:mem.m,heard:mem.heard,then:'Message'};
    return {intent:'message',member:null}; // "message him too" with no context → ask who
  }
  // -- check in (imperative, not a stat question, not a past claim) --
  if((P(nq,['check in','checkin'])||/\bcheck\b.*\bin\b/.test(nq))&&!P(nq,['who','how many','busy','checked in','attendance','payments'])){
    if(exactMem) return {intent:'checkin',member:exactMem};
    if(mem&&mem.conf==='fuzzy') return {intent:'confirm_person',member:mem.m,heard:mem.heard,then:'Check in'};
    return {intent:'checkin',member:null};
  }
  // -- add member (full signup, not drop-in) --
  if(P(nq,['add','register','sign up','enrol','enroll','new member'])&&P(nq,['member','student','somebody','someone'])) return {intent:'addMember'};
  // ---------- reads ----------
  if(P(nq,['quick view','quickview','quick dashboard','quick look','at a glance','glance','snapshot','overview','my gym right now'])) return {intent:'read',key:'quickview'};
  if(P(nq,['am i doing ok','doing okay','should i be worried','anything to worry','worried about anything','how are things','everything ok','anything i should know'])) return {intent:'read',key:'triage'};
  // -- console-section handoffs: deep config lives in the console; chat hands off with one tap --
  if(P(nq,['open settings','open the console','open console','open dashboard','open insights','show insights','open billing','open members','open marketing','marketing section','open leads','open belts','front desk','belt timeline','promotion timeline','open the shop','open inventory'])
    ||(P(nq,['change','edit','update','set up','configure'])&&P(nq,['price','prices','pricing','membership','memberships','plan','plans','belt timeline','class types','classes','settings','schedule']))) return {intent:'goto'};
  if(P(nq,['failed','overdue','outstanding','owes me','owe me','didnt pay',"didn't pay",'hasnt paid',"hasn't paid",'owes money','owe money'])&&!P(nq,['who is paying','paying me'])) return {intent:'read',key:'billing'};
  if(P(nq,['payment','payments','pay','due','renew','renewal','renewals','bill','paying'])&&P(nq,['coming','upcoming','week','soon','next','who','this month'])&&!P(nq,['promotion','promotions','stripe','belt'])) return {intent:'read',key:'renewals'};
  if(P(nq,["who's training",'whos training','who is training','training this week',"who's here",'whos here','who is here','on the mat','on the mats'])&&!P(nq,['risk','quit'])) return {intent:'read',key:'training'};
  if(P(nq,['at risk','churn','churning','quit','quitting','about to quit','leaving','leave us','win back','re engage','reengage','not been in','hasnt been','hasn\'t been','havent seen','haven\'t seen','a while','stopped coming','stopped showing','slacking','missed class','missed classes','been missing','absent','no show','no shows','skipping','fallen off','drop off','dropping off','going quiet','disappeared'])) return {intent:'read',key:'atrisk'};
  if(P(nq,['promotion','promotions','stripe','stripes','belt','belts','ready to grade','due for'])&&P(nq,['who','due','ready','close','list','show'])) return {intent:'read',key:'promotions'};
  if(P(nq,['most active','top student','top students','train the most','most attendance','most check ins','busiest member','hardest working'])) return {intent:'read',key:'mostactive'};
  if(P(nq,['revenue','mrr','income','earnings','profit','money coming in','my month','month looking','making more','making less','more or less than last month'])) return {intent:'read',key:'revenue'};
  if(P(nq,['busiest night','busiest day','busiest evening','busiest time'])) return {intent:'read',key:'busiest'};
  if(P(nq,['attendance','check ins','turnout','traffic','how busy'])) return {intent:'read',key:'attendance'};
  if(P(nq,['how many kids','kids vs','mix','breakdown','plans','adults vs'])) return {intent:'read',key:'mix'};
  // -- school profile: name / address / phone / contact — answered from cp_gym (Settings), not trained --
  if(P(nq,['my school','my gym','my academy','our school','our gym','our academy','the school','the gym','the academy','this school','this gym'])
     &&P(nq,['name','named','called','address','location','located','where','phone','email','contact','info','information','about','profile'])) return {intent:'read',key:'gym'};
  if(P(nq,['what am i called','who are we','what are we called'])) return {intent:'read',key:'gym'};
  // -- class times: "what time are my classes" / "when is class" (member-specific questions fall through) --
  if(!exactMem&&P(nq,['what time','when','times'])&&P(nq,['class','classes','open mat','training'])&&!P(nq,['who','due','pay','renew'])) return {intent:'read',key:'schedule'};
  // -- generic aggregate calculator: "how many / number of / total X" → computed from the data model.
  //    One rule covers the whole question class; adding nouns here beats training phrasings one by one. --
  if(!exactMem&&/\b(how many|number of|count of|total)\b/.test(nq)){
    if(P(nq,['instructor','instructors','coach','coaches','professor','professors','teacher','teachers'])) return {intent:'read',key:'instructors'};
    if(P(nq,['class','classes'])) return {intent:'read',key:'schedule'};
    if(P(nq,['trial','trials'])) return {intent:'read',key:'mix'};
    if(P(nq,['gi','gis','belt','belts','rashguard','rashguards','shirt','shirts','shorts','mouthguard','mouthguards','stock','inventory'])) return {intent:'read',key:'inventory'};
    if(P(nq,['failed','overdue','unpaid'])) return {intent:'read',key:'billing'};
    if(P(nq,['member','members','student','students','people','folks'])) return {intent:'read',key:'count'};
  }
  if(!exactMem&&P(nq,['how many','member count','total members','how big','active members'])) return {intent:'read',key:'count'};
  // -- the restock WIZARD: stock check → build the order (team pricing) → one confirm. "restock" = ordering; "add stock" = logging a delivery. --
  if(P(nq,['restock','reorder','re order','what should i reorder','top up stock','top up the shop','order low stock','place a gear order','order what we need','restock wizard'])&&!P(nq,['got a shipment','received a shipment','add stock'])) return {intent:'read',key:'restock'};
  if(P(nq,['marketplace','order gear','buy gear','order more','gear store','shop for gear','order gis','order belts'])) return {intent:'read',key:'marketplace'};
  if(P(nq,['add stock','got a shipment','received a shipment','new stock','add inventory','log a delivery'])) return {intent:'read',key:'addstock'};
  if(P(nq,['inventory','in stock','stock level','stock levels','low on stock','low stock','out of stock','gis in stock','how many gis','shop stock','pro shop','what do we have in the shop'])) return {intent:'read',key:'inventory'};
  if(P(nq,['checked in today','who checked in','who came in today','who scanned in','who is in today'])) return {intent:'read',key:'checkins'};
  if(P(nq,['classes today','classes tonight','on the schedule','schedule today','schedule tonight','whats on tonight','class schedule','todays classes'])) return {intent:'read',key:'schedule'};
  if(P(nq,['price','prices','pricing','membership cost','what do we charge','how much do we charge','how much is a membership','membership prices'])&&!P(nq,['change','edit','update'])) return {intent:'read',key:'pricing'};
  // -- look up a person --
  if(P(nq,['look up','lookup','profile','tell me about','info on','details on','how is','hows','pull up'])||(exactMem&&nq.split(' ').length<=4)){
    if(exactMem) return {intent:'lookup',member:exactMem};
    if(mem&&mem.conf==='fuzzy') return {intent:'confirm_person',member:mem.m,heard:mem.heard,then:'Look up'};
    if(P(nq,['trial one','trial girl','new girl','the trial'])){const t=memberList().find(x=>x.status==='Trial');if(t) return {intent:'confirm_person',member:t,heard:'that description',then:'Look up'};}
    return {intent:'lookup',member:null};
  }
  // trait-based person reference without a lookup verb ("that new girl, the trial one")
  if(P(nq,['trial one','trial girl','new girl','that new'])){const t=memberList().find(x=>x.status==='Trial');if(t) return {intent:'confirm_person',member:t,heard:'that description',then:'Look up'};}
  if(P(nq,['someone else','somebody else'])) return {intent:'lookup',member:null}; // "No, someone else" from a confirm chip
  if(P(nq,['weather','flight','flights','book a table','stocks','stock market','joke','recipe','news','sports'])) return {intent:'decline'};
  if((/\b(hi|hello|hey|yo|thanks|thank you)\b/.test(nq)&&nq.split(' ').length<=4)||P(nq,['what can you do','what can you','who are you','help me out','what do you do'])) return {intent:'greet'};
  if(mem&&mem.conf==='fuzzy'&&nq.split(' ').length<=4) return {intent:'confirm_person',member:mem.m,heard:mem.heard,then:'Look up'};
  return null;
}

/* ---- compound decomposition: split the RAW input (norm strips punctuation) on sentence breaks
   + connectors, parse each clause, merge related ones. ---- */
function parseInput(qRaw,ctx,pb){
  pb=pb||loadPB();
  const N=s=>canonicalize(norm(s),pb);
  const nqFull=N(qRaw);
  const parts=String(qRaw||'').split(/[.?!;]+\s*|\s+(?:and then|and also|then|also|plus)\s+|,\s+(?=(?:and\s+)?(?:then|also|please|can|could|add|put|sign|register|check|message|text|promote|record|get)\b)/i)
    .map(s=>s.trim()).filter(Boolean);
  const whole=parseClause(nqFull,ctx);
  if(parts.length<2) return whole;
  const parsed=parts.map(c=>parseClause(N(c),ctx)).filter(Boolean);
  if(parsed.length<2) return whole||parsed[0]||null;
  // The Johnny archetype: a past-visit claim + "add to drop-ins" → one composite drop-in-lead plan.
  const claim=parsed.find(p=>p.intent==='attendance_claim');
  const addl=parsed.find(p=>p.intent==='add_to_dropins');
  if(claim&&addl) return {intent:'dropInLead',person:claim.person||addl.person,known:claim.known||addl.known,time:claim.time||addl.time,cls:claim.cls||addl.cls,visit:true};
  // two simple actions → one combined plan with ONE confirm
  const simple=parsed.filter(p=>['promote','checkin','message','recordPayment','message_all'].includes(p.intent)&&(p.member||p.seg));
  if(simple.length>=2) return {intent:'multi',steps:simple};
  return whole||parsed[0];
}

/* ---- route a parsed intent to a response (also used by learned overrides + Lab replay) ---- */
function routeParsed(p,nq,ctx){
  if(!p) return null;
  if(p.intent==='read') return READS[p.key]?READS[p.key]():null;
  if(p.intent==='greet') return {text:`Hi ${OWNER}! I can pull up anything about your members, classes, payments, and belts — and take actions like messaging people or promoting students. Tap something below or just tell me what you need.`,follow:true,greet:true};
  if(p.intent==='decline') return {text:`That's outside what I do — I'm your ${GYM} assistant, so I stick to your gym: members, classes, payments, and belts. Here's what I'm good at:`,follow:true,decline:true};
  if(p.intent==='confirm_person') return {text:`Just to be safe — I heard “${p.heard}”. Did you mean ${p.member.n} (${rankLabel(p.member.belt,p.member.str)})? I never act on a name I'm not sure about.`,guesses:[p.then+' '+p.member.n,'No, someone else'],clarify:true};
  if(p.intent==='lookup'){
    if(p.member) return {text:`Here's ${p.member.n}:`,card:{type:'profile',m:p.member}};
    return {text:'Which member? Try their name — for example "look up Marcus Silva".',guesses:memberList().slice(0,3).map(m=>'Look up '+m.n),clarify:true};
  }
  if(p.intent==='promote'){
    if(p.member) return {action:{kind:'promote',member:p.member}};
    return {text:'Who would you like to promote?',guesses:PROMOS.map(x=>'Promote '+x.n),clarify:true};
  }
  if(p.intent==='checkin'){
    if(p.member) return {action:{kind:'checkin',member:p.member}};
    return {text:'Who should I check in?',guesses:memberList().filter(m=>m.status==='Active').slice(0,3).map(m=>'Check '+m.n.split(' ')[0]+' in'),clarify:true};
  }
  if(p.intent==='message'){
    if(p.member) return {action:{kind:'message',member:p.member}};
    return {text:'Who should I message?',guesses:atRiskMembers().slice(0,3).map(m=>'Message '+m.n),clarify:true};
  }
  if(p.intent==='message_all') return {action:{kind:'message_all',seg:p.seg,count:p.count}};
  if(p.intent==='addMember') return {action:{kind:'addMember'}};
  if(p.intent==='recordPayment'){
    if(p.member&&p.amt) return {action:{kind:'recordPayment',member:p.member,amt:p.amt,method:p.method}};
    return {text:'Sure — who paid, and how much? Say it like "Marcus paid me 165 cash".',guesses:['Marcus paid me 165 cash','Aisha paid me 200 card'],clarify:true};
  }
  if(p.intent==='updatePayment'){
    if(p.member) return {action:{kind:'updatePayment',member:p.member}};
    return {text:'Whose payment info should I update?',guesses:FAILED_PAY.slice(0,3).map(f=>'Update payment info for '+f.n),clarify:true};
  }
  if(p.intent==='attendance_claim'){
    // a claim alone: acknowledge + offer the smart next step (register the visit + funnel)
    const who=p.person||'they';
    return {text:`Got it — ${who} ${p.cls?('was in for '+p.cls):'came in'}${p.time?(' '+p.time):''}. ${p.known?'I\'ll note it on their profile.':'They\'re not in your system yet — want me to add them as a drop-in lead so the visit counts and the funnel can follow up?'}`,guesses:p.known?null:['Add '+(p.person||'them')+' to the drop in list','No thanks'],clarify:!p.known};
  }
  if(p.intent==='add_to_dropins'||p.intent==='dropInLead'){
    if(!p.person&&!p.known) return {text:'Who should I add to the drop-in list?',guesses:['Add Johnny to the drop in list'],clarify:true};
    return {action:{kind:'dropInLead',person:p.person,known:p.known,time:p.time,cls:p.cls,visit:p.visit||p.intent==='dropInLead'||!!p.time||!!p.cls}};
  }
  if(p.intent==='multi') return {action:{kind:'multi',steps:p.steps}};
  if(p.intent==='goto') return {text:'That lives in the console — same data, more knobs. One tap:',card:{type:'goto'}};
  if(p.intent==='createPost'){
    if(!p.topic&&!p.evt) return {text:'Happy to — what\'s the post about? Give me the gist and when.',guesses:['Make a post about open mat this Friday at 7pm','Post about our kids class on Instagram'],clarify:true};
    const c=postCopy(p.topic,p.evt);
    // the post WIZARD: pick a generated creative → edit caption → platform settings → preview → send
    return {text:'Let\'s build it — pick a look, tweak the caption, set the platforms, then send. Nothing goes out until the last tap.',
      card:{type:'postwizard',draft:{topic:p.topic,evt:p.evt,theme:c.theme,head:c.head,sub:c.sub,caption:c.caption,platforms:p.platforms,format:p.format}}};
  }
  if(p.intent==='boostPost'){
    const posts=extStore('cp_mkt_posts',POST_FALLBACK);
    return {action:{kind:'boostPost',post:posts[0],budget:p.budget}};
  }
  return null;
}

/* ---- learned-override router: grooming stores normalized-utterance → routeKey ---- */
function respondForKey(key,nq,ctx){
  if(key==='goto'||key==='read:goto') return routeParsed({intent:'goto'},nq,ctx);
  if(key.startsWith('read:')){
    const t=key.slice(5);
    const map={quickview:'quickview',atrisk:'atrisk',renewals:'renewals',billing:'billing',promotions:'promotions',attendance:'attendance',mix:'mix',revenue:'revenue',members:'training',inventory:'inventory',pricing:'pricing',schedule:'schedule',checkins:'checkins',gym:'gym',instructors:'instructors'};
    return READS[map[t]]?READS[map[t]]():null;
  }
  if(key==='decline') return routeParsed({intent:'decline'},nq,ctx);
  if(key==='greet') return routeParsed({intent:'greet'},nq,ctx);
  if(key.startsWith('action:')){
    const kind=key.slice(7);
    const mem=findMemberSmart(nq);const exact=mem&&mem.conf!=='fuzzy'?mem.m:null;
    if(kind==='dropInLead') return routeParsed({intent:'dropInLead',person:exact?exact.n:extractUnknownName(nq),known:exact,time:extractTime(nq),cls:extractClass(nq),visit:true},nq,ctx);
    if(kind==='promote') return routeParsed({intent:'promote',member:exact},nq,ctx);
    if(kind==='checkin') return exact?routeParsed({intent:'checkin',member:exact},nq,ctx):routeParsed({intent:'promote',member:null},nq,ctx);
    if(kind==='message') return routeParsed({intent:'message',member:exact},nq,ctx);
    if(kind==='message_all') return routeParsed(parseClause('message everyone',ctx)||{intent:'message_all',seg:'all members',count:AGG.active},nq,ctx);
    if(kind==='recordPayment'){const amt=(nq.match(/\$?(\d{2,5})\b/)||[])[1];return routeParsed({intent:'recordPayment',member:exact,amt:amt?parseInt(amt):null,method:'cash'},nq,ctx);}
    if(kind==='updatePayment') return routeParsed({intent:'updatePayment',member:exact},nq,ctx);
    if(kind==='addMember') return routeParsed({intent:'addMember'},nq,ctx);
    if(kind==='createPost') return routeParsed({intent:'createPost',platforms:['ig','fb'],format:P(nq,['story'])?'story':'feed',evt:extractEventTime(nq),topic:extractTopic(nq)||'training'},nq,ctx);
    if(kind==='boostPost') return routeParsed({intent:'boostPost',budget:25},nq,ctx);
    if(kind==='orderGear') return READS.restock();
  }
  return null;
}

/* ============================================================ KNOWLEDGE-CENTER CITATIONS ============================================================

const KC_ARTICLES=[

];
const KC_STOP=new Set(['the','a','an','do','does','did','i','if','is','are','was','for','to','of','in','on','at','my','our','me','we','us','how','can','could','would','should','know','want','need','get','see','find','check','somebody','someone','anyone','their','them','they','this','that','these','and','or','with','about','when','where','what','who','you','your']);
// fuzzy match a normalized question against the registry (token overlap + edit-distance-1 near-misses)
function kcFindArticle(nq){
  const words=nq.split(' ').filter(w=>w.length>2&&!KC_STOP.has(w));
  if(!words.length) return null;
  let best=null,bestScore=0;
  for(const a of KC_ARTICLES){
    const hw=norm(a.q+' '+a.ask.phrase+' '+a.tags.join(' ')).split(' ').filter(w=>w.length>2);
    const hset=new Set(hw);
    let score=0;
    for(const w of words){
      if(hset.has(w)){score+=2;continue;}
      for(const h of hw){if(h.length>3&&w.length>3&&lev(w,h)<=1){score+=1;break;}}
    }
    if(score>bestScore){bestScore=score;best=a;}
  }
  return bestScore>=2?best:null;
}
// KC route: fires on "how do I…" (cite the guide) or "open the learn hub" (pointer card). Returns null
// unless a real match — so the normal brain (and the golden set) is never intercepted.
function kcRoute(nq){
  if(/\b(learn hub|learning hub|open learn|knowledge base|knowledge center|knowledge centre|knowledge hub|help center|help centre|help articles|help hub|guides)\b/.test(nq)
     ||/^(help|open the guides|show me the guides|where do i learn)$/.test(nq)){
    return {text:'Every "how do I…" lives in your Learn hub — short, screen-by-screen guides, each with the one-line way to just ask me.',card:{type:'goto-learn'}};
  }
  if(/\bhow (do|can|would|should) i\b|\bhow to\b/.test(nq)){
    const a=kcFindArticle(nq);
    if(a) return {text:'Here\'s how — the quick way is to just ask me, or I can walk you through the screens. There\'s a full guide in your Learn hub too.',card:{type:'howto',article:a}};
  }
  return null;
}

/* ============================================================ DATA BRAIN — schema-grounded fallback ============================================================
   Pat's field report (2026-07-17): "questions that are strictly data" must never need per-utterance
   human training. This layer answers from the DATA MODEL: a registry of member attributes + generic
   aggregates + the school profile. One registry entry covers every phrasing of a question class.
   It runs AFTER the rule parser (so groomed/specific behaviors always win) and BEFORE the miss.
   This is the prototype stand-in for the M1 real brain (Claude + tools over Supabase), where the
   schema itself is the context and these answers come from tool calls — zero training either way. */
const MEMBER_ATTRS=[
  {k:'payment',ph:['payment','payments','card on file','credit card','card','billing','balance','owe','owes','paid','pay'],
   ans:m=>{const fp=FAILED_PAY.find(f=>f.n===m.n);
     return `${m.n} is on the ${m.plan} plan${m.due&&m.due!=='—'?`, next payment due ${m.due}`:''}.`+(fp?` Heads up — their last charge (${money(fp.amt)}) failed: ${fp.why.toLowerCase()}. Want me to send them a secure payment-update link?`:' Billing is in good standing.');},
   guesses:m=>FAILED_PAY.some(f=>f.n===m.n)?['Update payment info for '+m.n]:null},
  {k:'belt',ph:['belt','rank','stripe','stripes','graded'],ans:m=>`${m.n} is a ${rankLabel(m.belt,m.str)} (${m.prog}) — ${m.cur} of ${m.req} classes toward the next promotion.`},
  {k:'plan',ph:['plan','membership'],ans:m=>`${m.n} is on the ${m.plan} plan — status: ${m.status}.`},
  {k:'due',ph:['due','renew','renewal','next payment'],ans:m=>`${m.n}'s next payment is due ${m.due==='—'?'— nothing scheduled (free trial)':m.due}, on the ${m.plan} plan.`},
  {k:'attendance',ph:['attendance','classes','check ins','checkins','trained','been in','last in','come in','came in','come to class','showed up','seen','visit'],
   ans:m=>`${m.n} was last in ${m.last} — ${m.att.reduce((a,b)=>a+b,0)} check-ins in the last 30 days.${m.risk?' ⚠ '+m.risk+'.':''}`},
  {k:'contact',ph:['phone','email','number','contact','reach'],ans:m=>(m.phone||m.email)?`You can reach ${m.n} at ${[m.phone,m.email].filter(Boolean).join(' · ')}.`:`I don't have contact info on file for ${m.n} yet — you can add it from their profile.`},
];
function memberAttrAnswer(nq,ctx){
  const attr=MEMBER_ATTRS.find(a=>P(nq,a.ph));
  if(!attr) return null;
  const mem=findMemberSmart(nq);
  const m=(mem&&mem.conf!=='fuzzy')?mem.m:((PRONOUN_RX.test(nq)&&ctx&&ctx.lastMember)?ctx.lastMember:null);
  if(m){const r={text:attr.ans(m),card:{type:'profile',m}};const g=attr.guesses&&attr.guesses(m);if(g&&g.length)r.guesses=g;return r;}
  if(mem&&mem.conf==='fuzzy') return {text:`Just to be safe — I heard “${mem.heard}”. Did you mean ${mem.m.n}? I never act on a name I'm not sure about.`,guesses:['Look up '+mem.m.n,'No, someone else'],clarify:true};
  return null;
}
// A miss should still guess in the QUESTION'S TOPIC (Pat, 2026-07-17: "what time are my classes"
// answered with four unrelated chips = a relevancy fail). Topic keywords → asks that really resolve.
const MISS_TOPICS=[
  [['class','classes','schedule','time','times','tonight','session','sessions'],["What's on the schedule today?","How's attendance?"]],
  [['price','prices','cost','charge','fee','fees'],['Show me our pricing']],
  [['pay','payment','payments','card','billing','owe','owes','invoice'],['Payments coming up','Show failed payments','Record a payment']],
  [['belt','belts','stripe','stripes','promote','promotion','grading'],["Who's due for promotion?"]],
  [['member','members','student','students','roster','people'],['How many members do I have?','Look up a member']],
  [['post','instagram','facebook','tiktok','marketing','ad','ads'],['Make a post about open mat']],
  [['stock','inventory','gear','gi','gis','shop'],['Are we low on stock?','Help me restock the shop']],
  [['risk','quit','quitting','quiet','missing','absent'],['Show at-risk members']],
  [['school','gym','academy','address','name','phone','email'],['What is the name of my school?']],
  [['revenue','money','income','mrr','earnings'],["How's revenue?"]],
];
function relatedGuesses(nq){
  const out=[];
  for(const [ph,gs] of MISS_TOPICS){if(P(nq,ph))gs.forEach(g=>{if(out.length<4&&!out.includes(g))out.push(g);});}
  return out.length?out:null;
}

function respond(q,ctx){
  ctx=ctx||{};
  const raw=norm(q);
  const pb=loadPB();
  const nq=canonicalize(raw,pb);
  // 1) learned overrides first — the "instant learn" loop from grooming
  const ov=(pb.overrides||[]).find(o=>o.u===raw||o.u===nq);
  if(ov){
    // custom-groomed behavior: serve the owner's own ideal reply (+ card) verbatim
    if(ov.reply) return {text:ov.reply,card:ov.card?cardByKey(ov.card):null,via:'learned'};
    const r=respondForKey(ov.key,nq,ctx);if(r){r.via='learned';return r;}
  }
  // 1.5) knowledge-center citations — run BEFORE parsing so a "how do I…" question never trips a
  //      partial keyword (e.g. "…somebody paid…" → record-payment). Only fires on a real article match.
  const kc=kcRoute(nq);
  if(kc) return kc;
  // 2) parse (compound-aware; splitting happens on the raw string, before punctuation is stripped)
  const p=parseInput(q,ctx,pb);
  const r=routeParsed(p,nq,ctx);
  if(r) return r;
  // 2.5) DATA BRAIN — schema-grounded member-attribute fallback (answers from data, never trained)
  const da=memberAttrAnswer(nq,ctx);
  if(da) return da;
  // 3) MISS → tappable guesses (never a blank retry). Prefer guesses in the question's TOPIC;

function resolvedKey(r){
