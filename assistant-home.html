      const questionish=/\?\s*$/.test(t)||/^(how|what|who|whose|when|where|why|show me|do (i|we)|is there|are there|can i|how many|how much)\b/i.test(t);
      if(questionish){
        const r=respond(t,ctxRef.current);
        if(r&&r.card&&!r.action&&!r.guesses){
          const resolved=resolvedKey(r);
          logUtterance(t,source,'flow-detour:'+resolved,false);
          if(r.card.type==='profile')ctxRef.current.lastMember=r.card.m;
          pushBot({text:r.text,card:r.card,soft:r.soft,meta:{u:t,resolved,via:r.via}});
          logRecent(labelFor(t,r));
          const fl=flow;
          setTimeout(()=>reaskFlow(fl),450);
          return;
        }
      }
      logUtterance(t,source,'flow-answer',false);answerFlow(t);return;
    }
    // Wizard-of-Oz: pause the scripted brain, hand the utterance to the human operator.
    if(wozRef.current){setPendingWiz({text:t,source:source||'type',suggest:respond(t,ctxRef.current)});return;}
    const r=respond(t,ctxRef.current);
    // Capture for the real-world utterance corpus — misses (the "did you mean" path) are the gold.
    const resolved=resolvedKey(r);
    logUtterance(t,source,resolved,resolved==='MISS');
    // Pat's rule: EVERY miss auto-flags to the Lab review queue — no human filing required.
    if(resolved==='MISS') flagAdd(t,'MISS',r.text,'auto');
    // rephrase mining: a miss followed by a phrasing that lands = a synonym candidate for the phrasebook
    const prevMiss=ctxRef.current.lastMiss;
    if(prevMiss&&resolved!=='MISS'&&resolved!=='greet'&&resolved!=='clarify'){pbAddCandidate(prevMiss,t,resolved);}
    ctxRef.current.lastMiss=(resolved==='MISS')?t:null;
    // ASYNC CLAUDE BRAIN — rides BEHIND the parser (build-engine rule 5). Only a true parser miss,
    // and only when the cloud brain is configured + signed in, goes to the Edge Function; the miss
    // bookkeeping above already ran (a miss is training signal even when Claude saves it). Every
    // other path — parser hits, jsdom, offline, signed out — stays the exact synchronous behavior.
    if(resolved==='MISS'&&cloudBrainReady()){askCloudBrain(t,r,prevMiss);return;}
    if(r.action){
      if(r.action.member)ctxRef.current.lastMember=r.action.member;
      proposeAction(r.action,t);
    } else {
      if(r.card&&r.card.type==='profile')ctxRef.current.lastMember=r.card.m;
      pushBot({text:r.text,card:r.card,guesses:r.guesses,follow:r.follow,soft:r.soft,meta:{u:t,resolved,via:r.via}});
      logRecent(labelFor(t,r));
    }
  }
  // ---- the cloud brain (CP.data.brain → deployed Edge Function): the parser's async backstop ----
  function cloudBrainReady(){try{return !!(window.CP&&window.CP.data&&window.CP.data.brain&&window.CP.data.brain.available());}catch(e){return false;}}
  function askCloudBrain(t,missReply,prevMiss){
    // <100ms feedback: the typing dots go up synchronously, before the network round-trip starts.
    const tid='tb'+Date.now()+'-'+Math.floor(Math.random()*1e6);
    setMsgs(ms=>ms.concat([{role:'bot',typing:true,tid}]));
    let settled=false,slowTm=null,wd=null;
    const finish=reply=>{
      if(settled)return;settled=true;
      if(slowTm)clearTimeout(slowTm);
      if(wd)clearTimeout(wd);
      if(reply&&reply.text){
        let card=null;try{card=reply.cardKey?cardByKey(reply.cardKey):null;}catch(e){card=null;}
        const guesses=(Array.isArray(reply.guesses)&&reply.guesses.length)?reply.guesses:undefined;
        setMsgs(ms=>ms.map(x=>x.tid===tid?{role:'bot',text:reply.text,card:card||undefined,guesses,via:'claude',meta:{u:t,resolved:'claude',via:'claude'}}:x));
        logRecent(labelFor(t,{text:reply.text,card}));
      }else{
        // null = timeout / offline / any failure inside CP.data.brain.ask — serve the parser's own
        // miss reply (soft chips, related guesses, human escape). The owner never sees an error.
        setMsgs(ms=>ms.map(x=>x.tid===tid?{role:'bot',text:missReply.text,guesses:missReply.guesses,soft:missReply.soft,meta:{u:t,resolved:'MISS',via:missReply.via}}:x));
        logRecent(labelFor(t,missReply));
      }
    };
    // mid-wait reassurance: ~4s in, the dots gain a quiet "still checking your numbers…" line
    slowTm=setTimeout(()=>{setMsgs(ms=>ms.map(x=>x.tid===tid?Object.assign({},x,{slow:true}):x));},4000);
    // outer watchdog: even a hung getSession inside ask() can never leave the dots up forever
    wd=setTimeout(()=>finish(null),15000);
    let p=null;
    try{
      const lm=ctxRef.current.lastMember;
      const NAME=(lm&&(lm.name||lm.n))||null;
      p=window.CP.data.brain.ask({
        utterance:t,
        // BOTH ctx shapes — the Edge brain has read {lastMemberName} and {lastMember:{name}} across versions
        ctx:{lastMemberName:NAME,lastMember:{name:NAME},lastMiss:prevMiss||null},
        phrasebook:loadPB(),
        snapshot:buildSnapshot(),
      });
    }catch(e){p=null;}
    if(p&&typeof p.then==='function')p.then(finish,()=>finish(null));
    else finish(null); // ask() must return a promise; anything else falls back instantly — no hung dots
  }
  function send(text,source){const t=(text||'').trim();if(!t)return;
    // duplicate-send guard: an IDENTICAL text within 800ms of the previous user message is a
    // double-tap (chips especially) — one echo, one brain call, not two paid ones.
    const now=Date.now();
    if(t===lastSendRef.current.t&&now-lastSendRef.current.at<800)return;
    lastSendRef.current={t,at:now};
    // day-zero quest wiring + telemetry. track does NOT auto-truncate q — slice to 80 ourselves.
    try{
      Guide.track('ask',{source:source||'type',q:String(text).slice(0,80)});
      if(source==='chip') Guide.completeQuest('chip');           // tapped a suggested question = "First win"
      else if(source!=='link') Guide.completeQuest('ask');       // typed/voice = "Ask your own"; deep-link (?ask=) never counts
    }catch(e){}
    setQ('');pushUser(t);setTimeout(()=>handle(t,source||'type'),90);}

  // ---- action proposal → tiered safety ----
  function proposeAction(a,srcText){
    const plan=actionPlan(a);
    const meta=srcText?{u:srcText,resolved:'action:'+a.kind}:null;
    if(!plan){pushBot({text:"I can't do that one yet — but here's what I can help with:",follow:true,meta});return;}
    if(plan.tier==='form'){beginFlow(plan.flow);return;}
    if(plan.tier==='reversible'){
      const done=plan.run();
      pushBot({text:done,undo:plan.undo,receipt:true,meta});
      logRecent(plan.verb);
    } else { // commit → preview + confirm, nothing happens yet
      setPending({plan});
      pushBot({text:plan.planSteps?`Here's the plan — check it, then one tap does all of it.`:`Before I send this, here's exactly what will happen — check it, then tap Confirm.`,preview:plan.preview,planSteps:plan.planSteps,needsContact:plan.needsContact,commit:true,meta});
    }
  }
  function confirmPending(contact){const {plan}=pending;setPending(null);const done=plan.run(contact);pushBot({text:done,receipt:true});logRecent(plan.verb);}
  function cancelPending(){setPending(null);pushBot({text:'Cancelled — nothing was sent. 👍'});}
  // ---- Wizard-of-Oz handlers ----
  function wizSend(reply,cardKey){
    pushBot({text:reply,card:cardByKey(cardKey)});
    logUtterance(pendingWiz.text,pendingWiz.source,'woz'+(cardKey?(':'+cardKey):''),false);
    logWoz(pendingWiz.text,pendingWiz.source,reply,cardKey);
    logRecent(pendingWiz.text.length>32?pendingWiz.text.slice(0,30)+'…':pendingWiz.text);
    setPendingWiz(null);
  }
  function wizSkip(){logUtterance(pendingWiz.text,pendingWiz.source,'woz-skip',true);setPendingWiz(null);}

  // ---- add-member: two doors. Either staff takes the FULL signup down in chat, or the applicant
  // gets the self-serve signup wizard (member-signup.html) via link / QR / text-email — which is the
  // door that saves the desk all the typing, so the assistant pitches it first.
  const AM_FULL=[
    {k:'name',q:"What's the new member's name?",req:true},
    {k:'program',q:'Adults or Kids?',opts:['Adults','Kids']},
    {k:'plan',q:'Which plan?'},
    {k:'email',q:'Email address?',req:true},
    {k:'address',q:'Street address?',opts:['Skip']},
    {k:'city',q:'City?',opts:['Skip']},
    {k:'state',q:'State?',opts:['Skip']},
    {k:'zip',q:'ZIP code?',opts:['Skip']},
    {k:'payMethod',q:'How will they pay?',opts:['💳 Credit card','🏦 Bank account (ACH)']},
    {k:'payNum',q:'Card number?'},
    {k:'payExtra',q:'Expiry and CVC?'},
    {k:'terms',q:'Last one — the terms & conditions. Do they accept?',opts:['✓ Yes, they accept'],req:true},
  ];
  function beginFlow(kind){
    setFlow({kind:'addChoice',vals:{}});
    pushBot({text:"Let's get a new member set up. Two ways to do this — I take everything down right now, or we send them the signup wizard and they fill it all out themselves (a lot less work for you and the desk).",fieldOpts:["I'll add them myself",'Have them fill it out']});
  }
  // After a mid-flow detour answered a question, re-pose the flow's pending question so the
  // owner never loses their place. (fl is the flow captured at detour time — it hasn't advanced.)
  function reaskFlow(fl){
    if(!fl)return;
    if(fl.kind==='addChoice')pushBot({text:'Back to it — which one: you add them now, or they fill it out themselves?',fieldOpts:["I'll add them myself",'Have them fill it out']});
    else if(fl.kind==='signupContact')pushBot({text:'Back to it — what phone number or email should I send the signup link to?'});
    else if(fl.kind==='signupConfirm')pushBot({text:'Back to it — send the signup link?',fieldOpts:['📨 Send it','Cancel']});
    else if(fl.kind==='addFull')askFull(fl.idx,fl.vals);
  }
  function askFull(idx,vals){
    const f=AM_FULL[idx];
    const opts=f.k==='plan'?(vals.program==='Kids'?['Kids Unlimited','Kids 2×/week','Free Trial']:['Adult Unlimited','10-Class Pack','Free Trial']):f.opts;
    const bank=/bank/i.test(vals.payMethod||'');
    const q=f.k==='payNum'?(bank?'Account number?':'Card number?')
           :f.k==='payExtra'?(bank?'Routing number?':'Expiry and CVC?')
           :f.q;
    pushBot({text:q,fieldOpts:opts});
  }
  function answerFlow(val){
    const v=(val||'').trim();
    // door choice
    if(flow.kind==='addChoice'){
      if(/fill it out|have them|themselves|send|link|wizard|qr/i.test(v)&&!/myself/i.test(v)){setFlow(null);pushBot({text:'Good call — the wizard walks them through everything (their details, plan, payment, waiver) in about 2 minutes on their phone. Have them scan this right off your screen, or grab the link:',qrUrl:SIGNUP_URL,signupShare:true});return;}
      if(/myself|^me$|i'?ll|i will|now|type|enter|add/i.test(v)){setFlow({kind:'addFull',vals:{},idx:0});pushBot({text:'OK — the full signup, about ten quick questions.'});setTimeout(()=>askFull(0,{}),120);return;}
      pushBot({text:'Which one — you add them now, or they fill it out themselves?',fieldOpts:["I'll add them myself",'Have them fill it out']});return;
    }
    // "text / email them the link" mini-flow — the sent link is PERSONALIZED (?phone= / ?email=)
    // so the wizard opens with that field pre-filled and the applicant never retypes it.
    if(flow.kind==='signupContact'){
      if(!v){pushBot({text:'I need a phone number or email to send it to.'});return;}
      const isEmail=/@/.test(v);
      setFlow({kind:'signupConfirm',vals:{contact:v,isEmail}});
      pushBot({text:`I'll ${isEmail?'email':'text'} ${v} their personal signup link — the wizard opens with their ${isEmail?'email':'number'} already filled in, so they don't type it twice.`,fieldOpts:['📨 Send it','Cancel']});return;
    }
    if(flow.kind==='signupConfirm'){
      const {contact,isEmail}=flow.vals;setFlow(null);
      if(/cancel|no\b/i.test(v)){pushBot({text:'Cancelled — nothing was sent. 👍'});return;}
      pushBot({text:`📨 Sent — ${contact} has their personal signup link (their ${isEmail?'email':'number'} is pre-filled in the wizard). I'll give you a heads-up when they finish.`,receipt:true});logRecent('Send signup link');return;
    }
    if(flow.kind!=='addFull'){setFlow(null);return;}
    // staff-entry door: the full signup, one field at a time
    const f=AM_FULL[flow.idx];
    if(f.req&&!v){pushBot({text:`I do need that one — ${f.q.toLowerCase()}`});return;}
    if(f.k==='terms'&&!/✓|yes|accept|agree|ok|sure/i.test(v)){pushBot({text:"That's the one box I can't skip — no accepted terms, no signup. Do they accept?",fieldOpts:['✓ Yes, they accept']});return;}
    const vals=Object.assign({},flow.vals,{[f.k]:v==='Skip'?'':v});const idx=flow.idx+1;
    if(idx<AM_FULL.length){setFlow({kind:'addFull',vals,idx});askFull(idx,vals);}
    else{
      setFlow(null);const name=vals.name;
      const d=(vals.payNum||'').replace(/\D/g,'');
      const pay=(/bank/i.test(vals.payMethod||'')?'bank acct':'card')+(d?' …'+d.slice(-4):'');
      const addr=[vals.address,vals.city,vals.state,vals.zip].filter(Boolean).join(', ');
      pushBot({text:`Added ${name} — ${vals.plan||'Free Trial'} · ${vals.program||'Adults'} ✓\nOn file: ${vals.email}${addr?' · '+addr:''} · ${pay} · terms accepted.`,undo:()=>`Removed ${name} again — nothing saved.`,receipt:true});
      logRecent('Add a new member');
    }
  }

  function onCardAct(kind,payload){
    // signup-wizard hand-off (QR + link show by default; the share options stay attached)
    if(kind==='signupCopy'){const can=navigator.clipboard&&navigator.clipboard.writeText;if(can)navigator.clipboard.writeText(SIGNUP_URL).catch(()=>{});
      pushBot({text:(can?'Link copied ✓ — paste it into any text or email:\n':'Here’s the link — copy it from here:\n')+SIGNUP_URL,signupShare:true});logRecent('Send signup link');return;}
    if(kind==='signupSend'){setFlow({kind:'signupContact',vals:{}});pushBot({text:"What's their phone number or email? I'll send them a personal signup link — it opens pre-filled so they don't retype it."});return;}
    if(kind==='open'){onGoDashboard(payload.view);return;}
    if(kind==='ask'){send(payload.q,'chip');return;}
    if(kind==='receipt'){pushBot({text:payload.text,receipt:true});logRecent(payload.label||'Done');return;}
    if(kind==='message'){send('Message '+payload.member.n);return;}
    if(kind==='message_all'){proposeAction({kind:'message_all',seg:payload.seg,count:payload.count});return;}
    if(kind==='promote'){proposeAction({kind:'promote',member:payload.member});return;}
  }

  // ---- voice: a true TOGGLE (tap on / tap off), continuous listening with the live transcript
  //      shown in the input; ends automatically only after 3s of silence, then sends. ----
  const recRef=useRef(null);      // the active recognition instance (so stop actually stops)
  const vBufRef=useRef('');       // finalized speech so far
  const vSilenceRef=useRef(null); // the 3s no-speech timer
  function vFinalize(){
    const t=vBufRef.current.replace(/\s+/g,' ').trim();
    vBufRef.current='';
    if(vSilenceRef.current){clearTimeout(vSilenceRef.current);vSilenceRef.current=null;}
    recRef.current=null;
    setListening(false);
    if(t){setQ('');send(t,'voice');}
  }
  function vResetSilence(){ // any heard speech restarts the 3s silence window
    if(vSilenceRef.current)clearTimeout(vSilenceRef.current);
    vSilenceRef.current=setTimeout(()=>{try{recRef.current&&recRef.current.stop();}catch(e){vFinalize();}},3000);
  }
  function toggleMic(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){setMicErr('Voice needs Chrome or Edge — you can type instead.');inputRef.current&&inputRef.current.focus();return;}
    if(listening){ // toggle OFF → send whatever was heard
      try{recRef.current?recRef.current.stop():vFinalize();}catch(e){vFinalize();}
      return;
    }
    const rec=new SR();recRef.current=rec;vBufRef.current='';
    rec.lang='en-US';rec.continuous=true;rec.interimResults=true;
    rec.onresult=e=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        const r=e.results[i];
        if(r.isFinal)vBufRef.current+=r[0].transcript+' ';
        else interim+=r[0].transcript;
      }
      setQ((vBufRef.current+interim).replace(/\s+/g,' ').trimStart()); // live transcript in the box
      vResetSilence();
    };
    rec.onerror=ev=>{
      if(ev&&(ev.error==='no-speech'||ev.error==='aborted'))return; // onend finalizes
      setMicErr('Mic hiccup — try again or type.');
    };
    rec.onend=()=>vFinalize(); // manual stop, 3s silence, or browser end — all funnel here
    setMicErr('');setListening(true);
    try{rec.start();vResetSilence();}catch(e){setListening(false);recRef.current=null;}
  }

  const chips=dynamicChips();
  // Day-zero "First win": while signed-up and the chip quest is still open, show the SAME real
  // suggestion strips the empty state uses — even though the seeded welcome makes started===true —
  // so the owner sees genuine variety, not one canned button. Taps route through send(...,'chip').
  const dayZeroFirstWin=(()=>{try{return Guide.active()&&!Guide.state().quests.chip;}catch(e){return false;}})();
  // Focus mode: spotlight the active quest's target, mute the rest (Pat: "make it clear WHERE to interact").
  const nextQuest=useNextQuest();
  const spotChips=nextQuest==='chip'&&dayZeroFirstWin;   // ring around the suggested-question strips
  const spotAsk=nextQuest==='ask';                        // ring around the composer
  const day0FocusDash=nextQuest==='drill'||nextQuest==='pricing'; // the action is over in the rail — mute the chat's inputs
  // A card stays LIVE until newer interactive content replaces it — the receipts a card posts about
  // its own actions must not freeze it (Pat's field report: cards felt one-time-use — add stock once,
  // the card died). A new question, card, or confirm still freezes everything older (stale-data safety).
  const lastLiveIdx=(()=>{for(let i=msgs.length-1;i>=0;i--){const m=msgs[i];if(m.role==='user'||m.card||m.commit||m.fieldOpts||m.signupShare||m.onboardWin||m.follow||m.guesses)return i;}return msgs.length-1;})();
  const InputBar=(
    <div className="w-full">
      <div className="flex items-center gap-2 bg-mist rounded-2xl px-3 py-2 shadow-card border border-white/10 focus-within:border-crimson/50 transition">
        <button onClick={toggleMic} title={listening?'Listening — tap to stop (auto-stops after 3s of quiet)':'Talk to me — tap to start'} className={"w-11 h-11 rounded-xl grid place-items-center shrink-0 text-lg transition "+(listening?'bg-crimson text-white miclive':'bg-white/5 hover:bg-white/10')}>🎤</button>
        <input ref={inputRef} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')send(q);}}
          placeholder={listening?'Listening — tap 🎤 to stop · sends after 3s of quiet':(flow?'Type your answer…':'Ask me anything — members, classes, payments, reminders…')}
          className="flex-1 bg-transparent border-0 outline-none text-[15px] px-1 py-2"/>
        <button onClick={()=>send(q)} disabled={!q.trim()} className="w-11 h-11 rounded-xl grid place-items-center shrink-0 bg-crimson text-white disabled:opacity-30 text-lg">➤</button>
      </div>
      {micErr && <div className="text-[12px] text-gold mt-1.5 px-1">{micErr}</div>}
    </div>
  );

  return <div className="flex-1 min-w-0 flex flex-col h-screen">
    {!started ? (
      /* -------- EMPTY STATE: logo + centered input + chips -------- */
      <div className="flex-1 overflow-y-auto flex flex-col items-center justify-center px-6">
        <img src="favicon.png" alt="Cia Paulista" className="w-40 h-40 object-contain mb-8 opacity-95" onError={e=>{e.target.style.display='none';}}/>
        <div className="w-full max-w-2xl">{InputBar}</div>
        <div className="w-full max-w-2xl mt-5">
          {chips.length>0 && <div className="mb-2 text-[12px] text-slate uppercase tracking-wide px-1">Needs your attention today</div>}
          <div className="flex flex-wrap gap-2 mb-4">{chips.map((c,i)=><button key={i} onClick={()=>send(c.q,'chip')} className="text-[13px] bg-crimson/12 text-crimson border border-crimson/30 rounded-full px-3.5 py-2 font-semibold hover:bg-crimson/20">{c.t}</button>)}</div>
          <div className="text-[12px] text-slate uppercase tracking-wide px-1 mb-2">Or start something</div>
          <div className="flex flex-wrap gap-2">{STATIC_CHIPS.map(s=><button key={s} onClick={()=>send(s,'chip')} className="text-[13px] bg-white/5 border border-white/10 rounded-full px-3.5 py-2 hover:border-white/30">{s}</button>)}</div>
        </div>
      </div>
    ) : (
      /* -------- CONVERSATION -------- */
      <div ref={scrollRef} className="flex-1 overflow-y-auto px-4 md:px-6 pb-8 pt-16 md:pt-8">
        <div className="max-w-2xl mx-auto space-y-4">
          {msgs.map((m,i)=><Bubble key={i} m={m} last={i===msgs.length-1} cardLive={i===lastLiveIdx} onSend={send} onCardAct={onCardAct}
            onConfirm={confirmPending} onCancel={cancelPending} pending={pending}
            onUndo={m.undo} labOn={lab} onVote={dir=>voteMsg(i,dir)}/>)}
        </div>
        {dayZeroFirstWin && <div className={"max-w-2xl mx-auto mt-6"+(spotChips?" day0-spot p-3":"")}>
          {spotChips && <span className="day0-tag">👆 Tap any suggested question</span>}
          {chips.length>0 && <div className="mb-2 text-[12px] text-slate uppercase tracking-wide px-1">Needs your attention today</div>}
          <div className="flex flex-wrap gap-2 mb-4">{chips.map((c,i)=><button key={i} onClick={()=>send(c.q,'chip')} className="text-[13px] bg-crimson/12 text-crimson border border-crimson/30 rounded-full px-3.5 py-2 font-semibold hover:bg-crimson/20">{c.t}</button>)}</div>
          <div className="text-[12px] text-slate uppercase tracking-wide px-1 mb-2">Or start something</div>
          <div className="flex flex-wrap gap-2">{STATIC_CHIPS.map(s=><button key={s} onClick={()=>send(s,'chip')} className="text-[13px] bg-white/5 border border-white/10 rounded-full px-3.5 py-2 hover:border-white/30">{s}</button>)}</div>
        </div>}
      </div>
    )}
    {started && !pendingWiz && <div className="px-3 md:px-6 pb-3 md:pb-6 safe-b">
      <div className={"max-w-2xl mx-auto"+(spotAsk?" day0-spot":"")+((spotChips||day0FocusDash)?" day0-dim":"")}>
        {spotAsk && <span className="day0-tag">⌨️ Type anything about your gym</span>}
        {InputBar}
      </div>
    </div>}
    {/* ☁ owner sign-in: calm cloud state + one-tap magic-link panel. Never nags, never blocks. */}
    <CloudChip labAllowed={labAllowed} onFlash={flash}/>
    {/* Wizard-of-Oz operator controls */}
    <button onClick={()=>setWoz(w=>!w)} title="Wizard-of-Oz: a human types the replies" className={"fixed top-4 right-5 z-40 text-[11px] px-3 py-1.5 rounded-full transition "+(woz?'bg-gold text-ink font-bold':'bg-white/5 border border-white/15 text-slate hover:text-white')}>🎭 {woz?'Wizard ON — stop':'Wizard'}</button>
    {pendingWiz && <WozConsole pending={pendingWiz} onSend={wizSend} onSkip={wizSkip}/>}
    {/* Training Lab (gated: ?lab=1 or ah_lab_dev) — dev/product workspace, never in the client build */}
    {labAllowed && <button onClick={()=>setLab(v=>!v)} title="Training Lab: votes, grooming sessions, golden dataset (internal only)" className={"fixed top-4 right-[7.5rem] z-40 text-[11px] px-3 py-1.5 rounded-full transition "+(lab?'bg-teal text-ink font-bold':'bg-white/5 border border-white/15 text-slate hover:text-white')}>🧪 {lab?'Lab ON':'Lab'}</button>}
    {lab && <div className="fixed top-0 left-0 lg:left-[280px] right-0 z-30 bg-[#0d2530] border-b border-teal/40 px-4 py-1.5 text-center text-[11px] text-teal font-semibold">
      TRAINING LAB — internal workspace · 👍 golden set · 👎 grooming · 🚩 live 👎s + every miss auto-file to Flagged
      {syncEnabled()?<span className="text-good"> · ☁ cloud sync ON</span>:<span className="text-gold"> · ⚠ local-only — connect sync in Dataset</span>}
      &nbsp;<button onClick={()=>setDrawer(true)} className="underline font-bold">Open dataset →</button>
    </div>}
    {groom && <GroomPanel g={groom} onClose={()=>setGroom(null)} onSave={(key,ideal,cardKey,note,custom)=>groomSave(groom,key,ideal,cardKey,note,custom)}/>}
    {drawer && <DatasetDrawer onClose={()=>setDrawer(false)} onFlash={flash} onGroom={f=>{setDrawer(false);setGroom({u:f.u,resolved:f.resolved||'MISS',reply:f.reply||''});}}/>}
    {tip && <TipDialog tip={tip} onHow={tipHow} onNotNow={tipNotNow} onDismiss={tipDismiss}/>}
    {toast && <div className="fixed bottom-24 left-1/2 -translate-x-1/2 z-[70] bg-white text-sm font-semibold px-4 py-2.5 rounded-xl shadow-card fadeup">{toast}</div>}
  </div>;

  // Bubble is defined inline to close over send/handlers
}

// A single message. Freezes to read-only once newer interactive content replaces it (scrollback safety).
// Cards use cardLive (receipts they emit don't freeze them — they stay reusable); everything else
// (confirm buttons, chips, form inputs) still freezes as soon as it's not the newest message.
function Bubble({m,last,cardLive,onSend,onCardAct,onConfirm,onCancel,pending,onUndo,labOn,onVote}){
  const [undone,setUndone]=useState(false);
  const [contact,setContact]=useState('');
  if(m.role==='user') return <div className="text-right"><div className="inline-block max-w-[85%] bg-navy rounded-2xl rounded-br-md px-4 py-2.5 text-[15px] text-left">{m.text}</div></div>;
  // The cloud brain is thinking — animated dots (plus "thinking…" for screen readers). Replaced
  // in place by the reply (or the parser's fallback), so it can never linger.
  if(m.typing) return <div className="fadeup"><div className="max-w-[95%]">
    <div className="inline-flex items-center gap-1.5 bg-mist border border-white/10 rounded-2xl rounded-bl-md px-4 py-3.5" role="status">
      <span className="typing-dot"></span><span className="typing-dot"></span><span className="typing-dot"></span>
      {m.slow && <span className="text-[12px] text-slate ml-1.5">still checking your numbers…</span>}
      <span className="sr-only">thinking…</span>
    </div>
  </div></div>;
  const frozen=!last; // only the newest bot message keeps live controls
  return <div className="fadeup">
    <div className="max-w-[95%]">
      <div className="text-[15px] leading-relaxed whitespace-pre-wrap">{m.text}</div>
      {m.card && <div className={cardLive?'':'opacity-90 pointer-events-none'}><ChatCard card={m.card} onAct={onCardAct}/></div>}

      {/* onboarding first-win chip */}
      {m.onboardWin && !frozen && <div className="mt-3"><button onClick={()=>onSend("Who's training this week?",'chip')} className="bg-crimson text-white rounded-lg px-4 py-2 text-sm font-semibold">Yes, show me who's training →</button></div>}

      {/* guided-flow answers: tap the obvious choice (freeform still available below) */}
      {m.fieldOpts && !frozen && <div className="mt-3 flex flex-wrap items-center gap-2">
        {m.fieldOpts.map(o=><button key={o} onClick={()=>onSend(o,'chip')} className="text-[14px] bg-crimson/12 text-crimson border border-crimson/40 rounded-xl px-4 py-2.5 font-semibold hover:bg-crimson/20 active:scale-95 transition">{o}</button>)}
        <span className="text-[12px] text-slate ml-1">or type your own below</span>
      </div>}

      {/* signup-wizard hand-off: QR + link up front, text/email as the secondary option */}
      {m.qrUrl && <div className="mt-3 bg-white rounded-2xl p-3 w-[220px] shadow-card">
        <div dangerouslySetInnerHTML={{__html:qrSvgFor(m.qrUrl)}}/>
        <div className="text-[11px] text-center mt-1.5 font-semibold" style={{color:'#0B1F3A'}}>Member signup · {GYM}</div>
        <div className="text-[10px] text-center mt-1 break-all leading-snug" style={{color:'#46586B'}}>{m.qrUrl}</div>
      </div>}
      {m.signupShare && !frozen && <div className="mt-3 flex flex-wrap items-center gap-2">
        {[['signupCopy','🔗 Copy the link'],['signupSend','✉️ Text / email it instead']].map(([k,l])=>
          <button key={k} onClick={()=>onCardAct(k,{})} className="text-[14px] bg-crimson/12 text-crimson border border-crimson/40 rounded-xl px-4 py-2.5 font-semibold hover:bg-crimson/20 active:scale-95 transition">{l}</button>)}
      </div>}

      {/* commit-tier preview + confirm (message preview OR a multi-step plan) */}
      {m.commit && (m.preview||m.planSteps) && <div className="mt-2 bg-white rounded-2xl p-4 shadow-card border border-crimson/25">
        {m.planSteps ? <div>
          <div className="text-[11px] text-slate uppercase tracking-wide mb-2">The plan — nothing happens until you confirm</div>
          <div className="space-y-2">{m.planSteps.map((s,i)=><div key={i} className="flex items-start gap-2.5">
            <span className="w-5 h-5 shrink-0 rounded-full bg-crimson/15 text-crimson grid place-items-center text-[11px] font-bold mt-0.5">{i+1}</span>
            <div className="min-w-0"><div className="text-sm font-semibold">{s.t}</div>{s.d && <div className="text-[12px] text-slate">{s.d}</div>}</div>
          </div>)}</div>
          {m.needsContact && !frozen && <input value={contact} onChange={e=>setContact(e.target.value)} placeholder="Phone or email (optional — it's what the funnel runs on)" className="mt-3 w-full rounded-lg border border-white/15 px-3 py-2 text-sm"/>}
        </div> : <div>
          <div className="text-[11px] text-slate uppercase tracking-wide mb-1">About to send · {m.preview.channel}</div>
          <div className="text-sm mb-2"><span className="text-slate">To: </span><span className="font-semibold">{m.preview.to.length<=3?m.preview.to.join(', '):(m.preview.to.slice(0,3).join(', ')+' +'+(m.preview.to.length-3)+' more')}</span></div>
          <div className="text-[13px] bg-mist rounded-lg p-3 border border-white/10 whitespace-pre-wrap">{m.preview.draft}</div>
        </div>}
        {!frozen ? <div className="mt-3 flex gap-2">
          <button onClick={()=>onConfirm(contact)} className="bg-crimson text-white rounded-lg px-4 py-2 text-sm font-semibold">{m.planSteps?'Confirm — do it':'Confirm & send'}</button>
          <button onClick={onCancel} className="border border-white/15 rounded-lg px-4 py-2 text-sm font-semibold">Cancel</button>
        </div> : <div className="mt-2 text-[12px] text-slate italic">— resolved —</div>}
      </div>}

      {/* reversible receipt → undo */}
      {m.receipt && m.undo && !undone && <button onClick={()=>setUndone(true)} className="mt-2 text-[13px] text-slate underline hover:text-navy">Undo</button>}
      {undone && <div className="mt-1 text-[13px] text-gold">{typeof m.undo==='function'?m.undo():'Undone.'}</div>}

      {/* follow-up / failure guesses */}
      {(m.follow||m.guesses) && !frozen && <div className="mt-3 flex flex-wrap gap-2">
        {(m.guesses||STATIC_CHIPS).map(s=><button key={s} onClick={()=>onSend(s,'chip')} className="text-[13px] bg-white/5 border border-white/10 rounded-full px-3 py-1.5 hover:border-white/30">{s}</button>)}
        {m.soft && <button onClick={()=>onSend('__human__','chip')} className="text-[13px] text-slate underline px-2 py-1.5">Still stuck? Message a human →</button>}
      </div>}

      {/* Feedback on any brain-produced reply (works on scrollback too). LIVE: owners react and a 👎
          auto-files into the Lab's review queue. LAB: 👍 = golden case, 👎 = grooming session. */}
      {m.meta && <div className="mt-2 flex items-center gap-1.5">
        <button onClick={()=>onVote('up')} title={labOn?'Good — save this behavior to the golden set':'Good answer'} className={"text-[13px] px-2 py-0.5 rounded-lg border transition "+(m.voted==='up'?'border-good/60 bg-good/10':'border-white/10 opacity-60 hover:opacity-100 hover:border-white/30')}>👍</button>
        <button onClick={()=>onVote('down')} title={labOn?'Wrong — start a grooming session':'Not what I wanted — flag it for review'} className={"text-[13px] px-2 py-0.5 rounded-lg border transition "+(m.voted==='down'?'border-crimson/60 bg-crimson/10':'border-white/10 opacity-60 hover:opacity-100 hover:border-white/30')}>👎</button>
        {labOn
          ? <span className="text-[11px] text-slate/70">{m.voted==='up'?'saved to golden set ✓':m.voted==='down'?'flagged — groom it below':m.meta.resolved}{m.meta.via==='learned'?<span className="text-teal"> · 🧠 learned</span>:m.meta.via==='claude'?<span className="text-teal"> · ✨ assistant</span>:null}</span>
          : <span className="text-[11px] text-slate/70">{m.voted==='up'?'thanks ✓':m.voted==='down'?'flagged for review ✓ — this trains your assistant':null}</span>}
      </div>}
    </div>
  </div>;
}

/* ============================================================ ☁ CLOUD CHIP — owner sign-in (CP.data / data.js) ============================================================
   Three calm states: "☁ device only" (dim — everything still works right here), "☁ synced"
   (signed in, queue drained), "⚠ N waiting" (signed in, writes queued — calm amber; they flush
   themselves). Tap → a compact panel: one friendly sentence + magic-link sign-in via
   CP.data.auth.signInMagic. Never a modal, never a nag. (The Lab's ☁ Sync tab — training-data
   sync — is a separate, untouched system.) */
function CloudChip({labAllowed,onFlash}){
  const has=!!(window.CP&&window.CP.data);
  const [st,setSt]=useState(()=>{try{return has?window.CP.data.status():null;}catch(e){return null;}});
  const [open,setOpen]=useState(false);
  const [email,setEmail]=useState('');
  const [phase,setPhase]=useState('idle'); // idle | working | sent | error
  const [err,setErr]=useState('');
  const chipRef=useRef(null);
  const panelRef=useRef(null);
  useEffect(()=>{
    if(!has)return;
    let off=null;try{off=window.CP.data.onStatus(s=>setSt(s));}catch(e){}
    const tm=setInterval(()=>{try{setSt(window.CP.data.status());}catch(e){}},5000);
    return ()=>{if(off)try{off();}catch(e){}clearInterval(tm);};
  },[]);
  // Hello moment: the first time sign-in lands (user falsy→truthy), greet once — same
  // cp_cloud_hello guard the console uses; sign-out clears it so the NEXT sign-in greets again.
  const prevUserRef=useRef(undefined);
  useEffect(()=>{
    if(!st)return;
    const had=prevUserRef.current;const hasU=!!st.user;prevUserRef.current=hasU;
    if(hasU&&had===false){
      let seen=false;try{seen=!!localStorage.getItem('cp_cloud_hello');}catch(e){}
      if(!seen){try{localStorage.setItem('cp_cloud_hello','1');}catch(e){}if(onFlash)onFlash('✓ Signed in — your gym now syncs to the cloud');}
    }
  },[st]);
  // Dismissal: outside click AND Escape both close the panel (the chip keeps its own toggle).
  useEffect(()=>{
    if(!open)return;
    const down=e=>{const t=e.target;
      if(panelRef.current&&panelRef.current.contains(t))return;
      if(chipRef.current&&chipRef.current.contains(t))return;
      setOpen(false);};
    const key=e=>{if(e.key==='Escape')setOpen(false);};
    document.addEventListener('mousedown',down);
    document.addEventListener('keydown',key);
    return ()=>{document.removeEventListener('mousedown',down);document.removeEventListener('keydown',key);};
  },[open]);
  if(!has)return null;
  const s=st||{};
  const cloud=!!(s.configured&&s.user);
  // amber ONLY when truly offline with work queued — a queued beat during a normal online write is not a warning
  const waiting=s.online===false&&(s.queued||0)>0;
  const label=waiting?('⚠ offline — '+s.queued+' waiting'):cloud?'☁ synced':'☁ device only';
  const cls=waiting?'border-gold/40 text-gold bg-gold/10'
    :cloud?'border-white/15 text-slate hover:text-white'
    :'border-white/10 text-slate/60 hover:text-slate';
  const sendLink=()=>{
    if(phase==='working')return;
    const em=email.trim();
    if(!em){setPhase('error');setErr('Type your email first.');return;}
    setPhase('working');setErr('');
    let p=null;try{p=window.CP.data.auth.signInMagic(em);}catch(e){p=null;}
    Promise.resolve(p).then(r=>{
      if(r&&r.ok)setPhase('sent');
      else{setPhase('error');setErr((r&&r.error)||'Could not send the link just now — try again in a minute.');}
    }).catch(()=>{setPhase('error');setErr('Could not send the link just now — try again in a minute.');});
  };
  const signOut=()=>{
    try{localStorage.removeItem('cp_cloud_hello');}catch(e){}
    let p=null;try{p=window.CP.data.auth.signOut();}catch(e){}
    Promise.resolve(p).then(()=>{try{setSt(window.CP.data.status());}catch(e){}}).catch(()=>{});
  };
  return <React.Fragment>
    <button ref={chipRef} onClick={()=>setOpen(o=>!o)} title="Cloud account — your data on every device"
      className={"fixed top-4 z-40 text-[11px] px-3 py-1.5 rounded-full border transition "+cls+" "+(labAllowed?'right-[13.5rem]':'right-[7.5rem]')}>{label}</button>
    {open && <div ref={panelRef} className="fixed top-12 right-5 z-50 w-80 max-w-[calc(100vw-2rem)] bg-surface border border-white/12 rounded-2xl shadow-card p-4 fadeup">
      <div className="flex items-center gap-2 mb-1.5">
        <div className="text-[13px] font-bold flex-1">☁ Your gym, on every device</div>
        <button onClick={()=>setOpen(false)} title="Close" className="w-6 h-6 grid place-items-center rounded-lg text-slate hover:text-white">✕</button>
      </div>
      {!s.configured
        ? <div className="text-[12.5px] text-slate leading-relaxed">Cloud isn't switched on for this copy of the app yet — everything still saves right here.</div>
        : cloud
        ? <div className="text-[12.5px] text-slate leading-relaxed">
          <div>Signed in as <span className="text-white/85 font-semibold">{s.user.email}</span>. Everything you do here saves to the cloud as you go.</div>
          {s.online===false&&(s.queued||0)>0 && <div className="mt-1.5 text-gold">{s.queued} change{s.queued===1?'':'s'} waiting to send — they'll go out on their own once you're back online.</div>}
          <button onClick={signOut} className="mt-2 text-[12px] text-slate underline hover:text-white">Sign out</button>
        </div>
        : <div>
          <div className="text-[12.5px] text-slate leading-relaxed mb-2.5">Everything works right here on this device. Sign in once and your data — and your assistant's smarts — follow you to every device.</div>
          <input value={email} onChange={e=>{setEmail(e.target.value);if(phase==='error')setPhase('idle');}} onKeyDown={e=>{if(e.key==='Enter')sendLink();}} type="email" placeholder="you@email.com" className="w-full rounded-lg border border-white/15 px-3 py-2 text-sm mb-2"/>
          {phase==='sent'
            ? <div>
              <div className="text-[12.5px] text-good font-semibold">✓ Sent — open the email on this device and tap the link. This page will sign in on its own.</div>
              <button onClick={sendLink} className="mt-1.5 text-[12px] text-slate underline hover:text-white">Send it again</button>
            </div>
            : <button onClick={sendLink} disabled={phase==='working'} className="w-full bg-crimson text-white rounded-lg px-3 py-2 text-sm font-semibold disabled:opacity-60">{phase==='working'?'Sending your link…':'Email me a sign-in link'}</button>}
          {phase==='error' && <div className="text-[12px] text-gold mt-1.5">{err}</div>}
        </div>}
    </div>}
  </React.Fragment>;
}

/* ---- Flag queue: the Lab's REVIEW INBOX. Pat's rule (2026-07-17): every miss ("I didn't quite
   catch that") is flagged AUTOMATICALLY, and every live 👎 too — no human has to remember to file
   anything. Flags sync to Supabase with the rest of the training data and surface in
   Dataset › Flagged, where auto-triage (AI first, human decision) turns them into golden cases,
   grooming sessions, or build requests. ---- */
function loadFlags(){try{return JSON.parse(localStorage.getItem('ah_flags')||'[]');}catch(e){return [];}}
function saveFlags(f){try{localStorage.setItem('ah_flags',JSON.stringify(f.slice(-200)));}catch(e){}pushLabState();}
function flagAdd(u,resolved,reply,from){
  const f=loadFlags();const key=norm(u);
  const ex=f.find(x=>norm(x.u)===key&&x.status==='new');
  if(ex){ex.count=(ex.count||1)+1;ex.ts=new Date().toISOString();if(from==='live')ex.from='live';} // repeat = louder signal, not a duplicate row
  else f.push({u,resolved:resolved||'MISS',reply:String(reply||'').slice(0,220),from:from||'auto',status:'new',count:1,ts:new Date().toISOString()});
  saveFlags(f);syncEvent('flag',{u,resolved:resolved||'MISS',from:from||'auto'});
}
function flagSetStatus(u,status){const f=loadFlags();let hit=false;f.forEach(x=>{if(norm(x.u)===norm(u)&&x.status==='new'){x.status=status;hit=true;}});if(hit)saveFlags(f);}
// AI auto-triage — the first reviewer of every flag. Prototype heuristic; at M1 this is an LLM job
// that runs server-side over synced flags. Same three outcomes either way.
function autoTriage(u){
  let got='MISS';try{got=resolvedKey(respond(u,{}));}catch(e){}
  if(got!=='MISS') return {kind:'covered',got}; // the brain handles it NOW (upgrade or learned) → promote to golden + resolve
  const nq=norm(u);
  if(/^(what|whats|when|where|who|whos|how many|how much|is|are|do|does|did|show)\b/.test(nq)||findMemberSmart(nq)) return {kind:'data'}; // data-shaped → a schema/tool gap, not a training gap
  return {kind:'capability'}; // reads like a new feature → groom → build request
}

// ---- Utterance capture: harvest the real corpus from live use. Misses (soft=true) are the gold. ----
function logUtterance(text,source,resolved,miss){
  try{const log=JSON.parse(localStorage.getItem('ah_utterances')||'[]');
    log.push({text,source:source||'type',resolved,miss:!!miss,ts:new Date().toISOString()});
    localStorage.setItem('ah_utterances',JSON.stringify(log.slice(-500)));
  }catch(e){}
  syncEvent('utterance',{text,source:source||'type',resolved,miss:!!miss});
}
function utteranceStats(){try{const l=JSON.parse(localStorage.getItem('ah_utterances')||'[]');return {total:l.length,miss:l.filter(x=>x.miss).length};}catch(e){return {total:0,miss:0};}}
function exportUtterances(){
  let log=[];try{log=JSON.parse(localStorage.getItem('ah_utterances')||'[]');}catch(e){}
  const esc=s=>'"'+String(s).replace(/"/g,'""')+'"';
  const csv=['text,source,resolved,miss,ts'].concat(log.map(r=>[esc(r.text),r.source,r.resolved,r.miss,r.ts].join(','))).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='utterances-'+new Date().toISOString().slice(0,10)+'.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
  return log.length;
}
window.exportUtterances=exportUtterances;
// ---- Wizard-of-Oz: a human types the assistant's reply live; we capture utterance → ideal-response PAIRS. ----
function cardByKey(k){
  // the Edge brain's CARD_KEYS whitelist offers 'quickview' and 'members' too — cover every key it can send
  if(k==='quickview')return {type:'quickview'};
  if(k==='members')return cardByKey('active');
  if(k==='atrisk')return {type:'atrisk',rows:atRiskMembers()};
  if(k==='promotions')return {type:'promotions',rows:PROMOS};
  if(k==='renewals')return {type:'renewals',rows:upcomingRenewals()};
  if(k==='billing')return {type:'billing',rows:FAILED_PAY};
  if(k==='attendance')return {type:'attendance'};
  if(k==='mix')return {type:'mix'};
  if(k==='revenue')return {type:'revenue'};
  if(k==='active')return {type:'members',title:'Active members',rows:memberList().filter(m=>m.status==='Active').slice(0,6),total:AGG.active,sub:m=>m.last==='today'?'in today':('last in '+m.last)};
  if(k==='inventory')return READS.inventory().card;
  if(k==='marketplace')return READS.marketplace().card;
  if(k==='restockwizard')return READS.restock().card;
  if(k==='pricing')return READS.pricing().card;
  if(k==='schedule')return READS.schedule().card;
  if(k==='gym')return READS.gym().card;
  if(k==='instructors')return READS.instructors().card;
  if(k==='goto')return {type:'goto'};
  if(k==='postwizard'){const c=postCopy('open mat','this friday');return {type:'postwizard',draft:{topic:'open mat',evt:'this friday',theme:c.theme,head:c.head,sub:c.sub,caption:c.caption,platforms:['ig','fb'],format:'feed'}};}
  return null;
}
// Attach-card options, GROUPED for scanning (Pat 2026-07-18: the flat list was build-order = read as
// random). Order inside each group = most-reached-for first. WOZ_CARDS stays the flat list for code
// that only needs the keys; both dropdowns render WOZ_CARD_GROUPS with <optgroup> headers.
const WOZ_CARD_GROUPS=[
  ['',[['','No card']]],
  ['People & belts',[['atrisk','At-risk members'],['active','Active members'],['promotions','Promotions due']]],
  ['Money',[['renewals','Payments coming up'],['billing','Failed payments'],['pricing','Membership pricing'],['revenue','Revenue']]],
  ['Insights',[['attendance','Attendance chart'],['mix','Membership mix']]],
  ['Gym & schedule',[['schedule','Today\'s classes'],['gym','School profile'],['instructors','Instructors']]],
  ['Pro-shop',[['inventory','Pro-shop stock'],['marketplace','Marketplace']]],
  ['Wizards',[['postwizard','Marketing post wizard'],['restockwizard','Restock wizard (stock → order)']]],
  ['Console',[['goto','Open-console button']]],
];
const WOZ_CARDS=WOZ_CARD_GROUPS.flatMap(g=>g[1]);
const WozCardOptions=()=>WOZ_CARD_GROUPS.map(([g,items])=>g
  ?<optgroup key={g} label={g}>{items.map(([k,l])=><option key={k} value={k}>{l}</option>)}</optgroup>
  :items.map(([k,l])=><option key={k} value={k}>{l}</option>));
function logWoz(text,source,reply,cardKey){
  try{const l=JSON.parse(localStorage.getItem('ah_woz')||'[]');
    l.push({utterance:text,source:source||'type',ideal_reply:reply,card:cardKey||null,ts:new Date().toISOString()});
    localStorage.setItem('ah_woz',JSON.stringify(l.slice(-500)));
  }catch(e){}
  syncEvent('woz_pair',{utterance:text,source:source||'type',ideal_reply:reply,card:cardKey||null});
}
function exportWoz(){
  let l=[];try{l=JSON.parse(localStorage.getItem('ah_woz')||'[]');}catch(e){}

// into the assistant SPEAKING to the requester ("On it — I'll pull up the three best options, and
// you can pick one…"). Rule-based here; the M1 LLM does this rewrite properly — same intent.
function assistantVoice(desc){
  let t=String(desc||'').trim().replace(/\s+/g,' ');
  // strip spec-style lead-ins — the description frames the system, the reply must not
  t=t.replace(/^(this|it)\s+(should|needs?\s+to|will|would|must)\s+/i,'')
     .replace(/^(the\s+)?(system|assistant|app|bot|ai|chatbot)\s+(should|needs?\s+to|will|would|must)\s+/i,'')
     .replace(/^i\s+(want|would\s+like)\s+(it|this|the\s+(system|assistant|app|bot|ai))\s+to\s+/i,'')
     .replace(/^(please\s+)?should\s+/i,'');
  // third person → speaking directly TO the person asking
  t=t.replace(/\b(the|a)\s+user'?s\b/gi,'your')
     .replace(/\b(the|a)\s+(user|requester|customer|owner)\b/gi,'you')
     .replace(/\byou can (select|choose)\b/gi,'you can pick')
     .replace(/\bthey can (select|choose|pick)\b/gi,'you can pick')
     .replace(/\ballows? you to\b/gi,'so you can')
     .replace(/\blets? you\b/gi,'so you can');
  t=t.replace(/\s+/g,' ').trim().replace(/^[,.\s]+/,'');
  // lead with the assistant owning the action
  if(/^(pull|show|open|display|list|bring|find|give|send|create|make|add|build|offer|suggest|recommend|generate|set|run|start|book|order|post|message|text|check|log|record|draft|schedule|track|remind|update|search|look)\b/i.test(t)){
    t='I\'ll '+t.charAt(0).toLowerCase()+t.slice(1);

    t='I\'ll take care of it — '+t.charAt(0).toLowerCase()+t.slice(1);
  } else {
    t=t.charAt(0).toUpperCase()+t.slice(1);
  }
  return 'On it — '+t.replace(/\.+$/,'')+'.';
}

// ☁ Sync settings: connect the Lab (and every device) to the Supabase project so training work is never lost.
function SyncPanel({onFlash,refresh}){
  // Practice copy: the whole cloud path is switched off (it would read and write the real gym's
  // training data), so show the reason instead of a form that can only fail.
  if(syncOff()) return <div className="rounded-lg px-3 py-3 border border-white/10 bg-white/[.03] text-[12.5px] leading-relaxed">

  </div>;
  const cfg=syncCfg()||{};
  const [url,setUrl]=useState(cfg.url||'');
  const [key,setKey]=useState(cfg.key||'');
  const [busy,setBusy]=useState(false);
  const [tick,setTick]=useState(0);
  const on=syncEnabled();
  let qlen=0;try{qlen=JSON.parse(localStorage.getItem('cp_sync_queue')||'[]').length;}catch(e){}
  const saveAndTest=()=>{
    if(!url.trim()||!key.trim()){onFlash('Paste both the Project URL and the anon public key');return;}
    setBusy(true);
    const cleanUrl=normalizeSbUrl(url);
    setUrl(cleanUrl);
    try{localStorage.setItem('cp_sync',JSON.stringify({url:cleanUrl,key:key.trim(),on:true}));}catch(e){}
    sbFetch('lab_state?select=key&limit=1',{method:'GET'}).then(r=>{
      if(!r.ok)throw new Error('HTTP '+r.status+(r.status===404?' — URL should look like https://xxxx.supabase.co (Settings → Data API), and the SQL setup must have run':r.status===401||r.status===403?' — wrong key? Use the Publishable (anon) key':''));
      setBusy(false);setTick(t=>t+1);onFlash('☁ Connected — every learning event now syncs to Supabase ✓');
      flushSyncQueue();
      pullLabState().then(ch=>{if(ch){onFlash('☁ Pulled training data from other devices ✓');refresh&&refresh();}pushLabState();}); // pull, then push the merged state up
    }).catch(e=>{setBusy(false);try{const c=syncCfg();c.on=false;localStorage.setItem('cp_sync',JSON.stringify(c));}catch(x){}setTick(t=>t+1);
      onFlash('Connection failed: '+(e&&e.message||e)+'. Check docs/supabase-sync-setup.md.');});
  };
  const toggle=()=>{const c=syncCfg();if(!c)return;c.on=!(c.on!==false);try{localStorage.setItem('cp_sync',JSON.stringify(c));}catch(e){}setTick(t=>t+1);};

      {on?<span><span className="text-good font-bold">● Syncing</span> to <span className="text-white/80">{String(cfg.url||'').replace(/^https?:\/\//,'').split('.')[0]}</span> · device <span className="text-white/60">{deviceId()}</span>{qlen?<span className="text-gold"> · {qlen} queued offline</span>:null}</span>
        :<span><span className="text-slate font-bold">○ Not syncing</span> — training data lives only in this browser until you connect.</span>}
      {cfg.url && <button onClick={toggle} className="ml-2 text-[11px] underline text-slate hover:text-white">{on?'pause':'resume'}</button>}
    </div>
    <div className="text-[11px] text-slate mb-2">Connect your <span className="text-white/70">Supabase</span> project (setup guide: <span className="text-white/70">docs/supabase-sync-setup.md</span> — 5 minutes, one SQL paste). Use the <span className="text-teal">anon public</span> key — never the service_role key.</div>

    <input value={key} onChange={e=>setKey(e.target.value)} placeholder="anon public key  (Settings → API)" className="w-full rounded-lg border border-white/15 px-3 py-2 text-sm mb-2"/>
    <button onClick={saveAndTest} disabled={busy} className="w-full bg-teal text-ink rounded-lg px-3 py-2.5 text-sm font-bold disabled:opacity-40">{busy?'Testing…':'Save & test connection'}</button>
    <div className="mt-3 text-[11px] text-slate leading-relaxed">
      <div className="text-white/70 font-semibold mb-1">What syncs (append-only, nothing ever deleted):</div>
      every utterance + hit/miss · 👍/👎 votes · grooming sessions (golden cases, ideal replies) · phrasebook (learned phrasings, mined candidates, 🛠 build requests) · WOZ pairs · published posts.<br/>
      <span className="text-white/70">Cross-device:</span> the golden set + phrasebook merge down to every connected device on load — teach it on the laptop, it knows on the iPad.<br/>

    </div>
  </div>;
}

function Rail({recents,onPick,onGoDashboard,overlay,onClose,focus}){

  const railDim=focus==='chip'||focus==='ask'||focus==='drill'||focus==='pricing'||focus==='learn';
  const dashSpot=focus==='drill'||focus==='pricing';

  function startDrag(e){

  // phones AND tablet portrait — at 768 a fixed 280px rail ate a third of the screen (fix wave 2026-07-22).
  return <aside className={(overlay?"fixed inset-y-0 left-0 z-50 w-[280px] max-w-[85vw] ":"w-[280px] hidden lg:flex ")+"bg-ink border-r border-white/10 flex flex-col shrink-0 h-screen"}>
    <div className="px-5 py-5 border-b border-white/10 flex items-center justify-between"><div className="font-bold text-[15px]">Actions</div>{overlay && <button onClick={onClose} className="w-8 h-8 grid place-items-center rounded-lg text-slate hover:text-white text-lg" title="Close">✕</button>}</div>
    <div ref={midRef} className={"flex-1 min-h-0 flex flex-col"+(railDim?" day0-dim":"")}>
      {/* Suggested actions — intelligent, ranked by urgency × impact */}
      <div style={{flexBasis:(split*100)+'%'}} className="grow-0 shrink-0 min-h-0 overflow-y-auto px-4 py-3">
        <div className="text-[11px] text-slate uppercase tracking-wide mb-2 px-1">Suggested actions</div>
        {suggested.map((s,i)=><button key={i} onClick={()=>onPick(s.q)} title={s.t} className="w-full text-left text-[13.5px] text-white/80 hover:text-white hover:bg-white/5 rounded-lg px-3 py-2 flex items-center gap-2">
          <span className="w-1.5 h-1.5 rounded-full shrink-0" style={{background:UCOL[s.u]}}></span><span className="flex-1 truncate">{s.t}</span></button>)}
      </div>
      {/* Draggable divider */}
      <div onMouseDown={startDrag} title="Drag to resize" className="h-2.5 shrink-0 cursor-row-resize relative group">
        <div className="absolute inset-x-3 top-1/2 -translate-y-1/2 h-px bg-white/10 group-hover:bg-crimson/50 transition-colors"></div>
        <div className="absolute left-1/2 -translate-x-1/2 top-1/2 -translate-y-1/2 w-8 h-1 rounded-full bg-white/15 group-hover:bg-crimson/60 transition-colors"></div>
      </div>
      {/* Recent */}
      <div className="flex-1 min-h-0 overflow-y-auto px-4 py-3">
        <div className="text-[11px] text-slate uppercase tracking-wide mb-2 px-1">Recent</div>
        {recents.length?recents.map((p,i)=><button key={i} onClick={()=>onPick(p)} className="w-full text-left text-[13.5px] text-white/60 hover:text-white hover:bg-white/5 rounded-lg px-3 py-2 truncate">↩ {p}</button>):<div className="text-[13px] text-slate px-3 py-2">Nothing yet — ask me something.</div>}
      </div>
    </div>
    <button onClick={onGoDashboard} className={"m-3 flex items-center gap-2 px-3 py-2.5 rounded-lg border text-sm "+(dashSpot?"day0-spot border-crimson/60":"border-white/10 hover:bg-white/5")}>
      {dashSpot && <span className="day0-tag">📊 Next: open Dashboard view</span>}
      <span className="text-lg">🗂️</span><span className="font-semibold">Dashboard view</span></button>
    <div className="px-4 py-3 border-t border-white/10 flex items-center gap-2">
      <div className="w-8 h-8 rounded-full bg-crimson grid place-items-center text-xs font-bold">PM</div>
      <div className="text-xs flex-1"><div className="font-semibold">Prof. Marcelo</div><div className="text-slate">Owner</div></div>
      {/* Learn hub: deliberately discreet (reference material, rarely needed) — the day-zero
          spotlight shows the owner where it lives, then it stays out of the way. */}
      <a href="learn.html" title="Learn hub — step-by-step guides & videos" className={"relative w-7 h-7 grid place-items-center rounded-lg text-sm "+(learnSpot?"day0-spot":"opacity-60 hover:opacity-100 hover:bg-white/5")}>
        {learnSpot && <span className="day0-tag" style={{left:'auto',right:0}}>🎓 The Learn hub lives here</span>}🎓</a>
      <button onClick={()=>{exportUtterances();exportWoz();}} title="Export captured utterances (CSV) + Wizard-of-Oz pairs (JSON)" className="text-slate/40 hover:text-slate text-xs">⬇</button>
    </div>
  </aside>;
}

/* ============================================================ DASHBOARD VIEW = the full Owner Console (embedded) ============================================================
   Per direction: "Dashboard view is the entire Owner's Console — side nav and all."
   We embed the real, complete console (owner-console.html) rather than a stripped-down copy,
   and overlay the return-to-chat toggle + the capped underuse nudge. */
function Dashboard(){
  const [loaded,setLoaded]=useState(false);
  // The old capped underuse nudge (ah_nudges) has been removed — path-learning is now handled by
  // guide.js's telemetry-driven tip 'ask-instead', surfaced in the assistant, not the dashboard.
  return <div className="fixed inset-0 bg-ink">
    {!loaded && <div className="absolute inset-0 grid place-items-center text-slate text-sm z-0"><div className="flex flex-col items-center gap-3"><div style={{width:30,height:30,border:'3px solid rgba(255,255,255,.12)',borderTopColor:'#E11D2A',borderRadius:'50%',animation:'__spin .8s linear infinite'}}></div>Opening your console…</div></div>}
    <iframe src="owner-console.html" title="Cia Paulista — Owner Console" onLoad={()=>setLoaded(true)} className="relative z-0 w-full h-full border-0"/>
    {/* Return to the assistant now lives INSIDE the console's own nav (matched look/feel), which
        posts a message up to us — see the listener in App. No overlay here, so the console's
        user profile is never covered. */}
  </div>;
}

/* ============================================================ DAY-ZERO QUEST HUD + CELEBRATION ============================================================
   A floating, collapsible getting-started checklist driven entirely by guide.js state. It reflects
   quest completions from THIS window (guide:change / guide:quest events) AND from the embedded console
   iframe (a separate window → the same-origin 'storage' event fires here). When all six are done it
   hands off to a one-time celebration, then unmounts forever. */
function QuestRing({done,total,size=34}){
  const r=(size-6)/2, c=2*Math.PI*r, off=c*(1-(total?done/total:0));
  return <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="shrink-0">
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,.14)" strokeWidth="3"/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E11D2A" strokeWidth="3" strokeLinecap="round"
      strokeDasharray={c} strokeDashoffset={off} transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'stroke-dashoffset .5s ease'}}/>
    <text x="50%" y="53%" dominantBaseline="middle" textAnchor="middle" fontSize="10" fontWeight="800" fill="#F3F3F5">{done}</text>
  </svg>;
}
function QuestHUD({onDone,onQuest,compact}){
  const [s,setS]=useState(()=>Guide.state());
  const [celebrating,setCelebrating]=useState(false);
  const [expanded,setExpanded]=useState(false); // compact (Dashboard view) mode: pill by default, tap to expand
  const bottomOff=compact?'8rem':'6rem';        // dashboard: clear the console's copilot FAB; assistant: clear the composer
  useEffect(()=>{
    const check=()=>{const st=Guide.state();setS(st);if(st.completedAt&&!st.celebrated)setCelebrating(true);};
    window.addEventListener('guide:change',check);
    window.addEventListener('guide:quest',check);
    window.addEventListener('storage',check); // console iframe completes drill/pricing in a separate window
    check();
    return ()=>{window.removeEventListener('guide:change',check);window.removeEventListener('guide:quest',check);window.removeEventListener('storage',check);};
  },[]);
  const quests=(Guide.QUESTS&&Guide.QUESTS.length)?Guide.QUESTS:[];
  const total=quests.length||6;
  const done=quests.filter(qq=>s.quests&&s.quests[qq.id]).length;
  // 1) the celebration takes over once, when all six are complete
  if(celebrating){
    const gym=s.gymName||GYM;
    // dismiss also returns the owner to the assistant (a no-op if already there — matters when the 6th
    // quest lands while they're in Dashboard view and the celebration takes over there).
    const dismiss=()=>{try{Guide.save({celebrated:true});}catch(e){}setCelebrating(false);setS(Guide.state());if(onDone)onDone();};
    return <div className="fixed inset-0 z-[80] bg-black/85 grid place-items-center p-6 fadeup">
      <div className="max-w-md w-full text-center">
        <img src="media/gs-complete.jpg" alt="" className="w-full max-h-64 object-cover rounded-2xl mb-6 shadow-card" onError={e=>{e.target.style.display='none';}}/>
        <div className="text-2xl font-extrabold mb-2">That's the whole system. 🥋</div>
        <div className="text-sm text-slate mb-6">You've earned your white belt in {gym} ops — everything else is just reps.</div>
        <button onClick={dismiss} className="w-full bg-crimson text-white rounded-xl px-4 py-3 text-sm font-bold mb-3">Back to my assistant</button>
        <div><a href="learn.html" className="text-[13px] text-teal hover:underline font-semibold">Go deeper in the Learn hub →</a></div>
      </div>
    </div>;
  }
  // 2) not a signed-up day-zero user, or already finished (and acknowledged) → the HUD is gone
  if(!s.signedUp||s.completedAt) return null;
  // 3) collapsed pill — the owner skipped (persistent), or compact mode (Dashboard view: the
  // coach-marks lead in there, so the checklist stays out of the way and never covers a tour
  // tooltip or the sidebar — Pat's field report). Bottom-RIGHT, off the content.
  if(s.skipped||(compact&&!expanded)){
    return <button onClick={()=>{if(s.skipped){try{Guide.resume();}catch(e){}setS(Guide.state());}else setExpanded(true);}} title="Getting-started checklist"
      className="fixed right-4 z-40 flex items-center gap-2 bg-surface border border-white/12 rounded-full pl-1.5 pr-3 py-1.5 shadow-card hover:border-crimson/50 transition"
      style={{bottom:'calc(env(safe-area-inset-bottom,0px) + '+bottomOff+')'}}>
      <QuestRing done={done} total={total} size={30}/><span className="text-[12px] font-semibold">{done}/{total}</span>
    </button>;
  }
  // 4) the full checklist card — the first not-yet-done quest is highlighted as "Next"
  const nextIdx=quests.findIndex(qq=>!(s.quests&&s.quests[qq.id]));
  return <div className="fixed right-4 z-40 w-64 max-w-[calc(100vw-2rem)] bg-surface border border-white/12 rounded-2xl shadow-card overflow-hidden"
    style={{bottom:'calc(env(safe-area-inset-bottom,0px) + '+bottomOff+')'}}>
    <div className="flex items-center gap-2.5 px-3 py-2.5 border-b border-white/8">
      <QuestRing done={done} total={total}/>
      <div className="min-w-0 flex-1"><div className="text-[13px] font-bold leading-tight">Getting started</div><div className="text-[11px] text-slate">{done} of {total} done</div></div>
      <button onClick={()=>{if(compact){setExpanded(false);return;}try{Guide.skip();}catch(e){}setS(Guide.state());}} title="Minimize" className="w-6 h-6 grid place-items-center rounded-lg text-slate hover:text-white text-lg leading-none shrink-0">–</button>
    </div>
    <div className="py-1 max-h-[42vh] overflow-y-auto">
      {quests.map((qq,i)=>{const d=!!(s.quests&&s.quests[qq.id]);const isNext=i===nextIdx;
        // Incomplete rows with somewhere to go are tappable; done rows and 'roundtrip' (hint-only) stay inert.
        const actionable=!d && qq.id!=='roundtrip' && !!onQuest;
        const act=actionable?()=>onQuest(qq.id):undefined;
        return <div key={qq.id} onClick={act} role={actionable?'button':undefined} tabIndex={actionable?0:undefined}
          className={"flex items-center gap-2.5 px-3 py-1.5 "+(isNext?(qq.id==='learn'?'day0-rowpulse ':'bg-crimson/10 '):'')+(actionable?'cursor-pointer hover:bg-white/5':'')}>
          <span className={"w-5 h-5 shrink-0 rounded-full grid place-items-center text-[11px] "+(d?'bg-good/20 text-good':'bg-white/8 text-slate')}>{d?'✓':qq.icon}</span>
          <div className="min-w-0 flex-1">
            <div className={"text-[12.5px] font-semibold leading-tight "+(d?'text-slate line-through':'')}>{qq.title}</div>
            {isNext && (qq.id==='learn'
              ? <a href="learn.html" onClick={e=>e.stopPropagation()} className="inline-block mt-1 bg-crimson text-white text-[11px] font-bold rounded-md px-2 py-1">Open the Learn hub →</a>
              : <div className="text-[11px] text-crimson leading-tight">{qq.hint}</div>)}
          </div>
          {isNext ? <span className="text-[9px] font-bold text-crimson uppercase tracking-wide shrink-0">Next</span>
                  : (actionable && <span aria-hidden="true" className="text-slate/50 text-sm shrink-0 leading-none">›</span>)}
        </div>;})}
    </div>
  </div>;
}
/* Path-learning tip dialog — reuses the IntroModal visual style. Calls Guide.tipShown() the moment it
   renders (that's what enforces the 1/session + 3-shows-per-tip caps), regardless of which button the
   owner taps next. */
function TipDialog({tip,onHow,onNotNow,onDismiss}){
  useEffect(()=>{try{Guide.tipShown(tip.id);}catch(e){}},[]);
  return <div className="fixed inset-0 z-[70] bg-black/60 grid place-items-center p-4 fadeup">
    <div className="bg-white rounded-2xl shadow-card w-full max-w-lg overflow-hidden flex flex-col sm:flex-row">
      <div className="sm:w-2/5 bg-gradient-to-br from-[#141620] to-[#0b0b0d] grid place-items-center p-5 min-h-[140px]">
        <img src="media/tip-spark.jpg" alt="" className="w-28 h-28 object-contain rounded-xl" onError={e=>{e.target.style.display='none';}}/>
      </div>
      <div className="sm:w-3/5 p-5">
        <div className="text-[11px] text-crimson font-semibold uppercase tracking-wide mb-1">💡 A faster way</div>
        <h2 className="text-lg font-bold mb-1.5">{tip.title}</h2>
        <p className="text-[13px] text-slate mb-4">{tip.body}</p>
        <div className="flex gap-2">
          <button onClick={onHow} className="bg-crimson text-white rounded-lg px-4 py-2 text-sm font-semibold">{tip.cta||'Show me how'}</button>
          <button onClick={onNotNow} className="border border-white/15 rounded-lg px-4 py-2 text-sm font-semibold">Not now</button>
        </div>
        <button onClick={onDismiss} className="mt-3 text-[12px] text-slate/70 underline hover:text-slate">Don't suggest this again</button>
      </div>
    </div>
  </div>;
}

/* ============================================================ APP SHELL ============================================================ */
function App(){
  const [view,setView]=useState(()=>{try{return localStorage.getItem('ah_view')||'assistant';}catch(e){return 'assistant';}});
  const [nudge,setNudge]=useState(null);      // {q} handed from dashboard → assistant
  const [recents,setRecents]=useState(loadRecents());
  const nextQuest=useNextQuest();             // day-zero focus mode (spotlight/mute routing for the rail + ☰)
  useEffect(()=>{try{Guide.init({app:'assistant'});}catch(e){}},[]); // logs a day-zero 'session' event once per load
  useEffect(()=>{try{localStorage.setItem('ah_view',view);}catch(e){}try{Guide.track('nav',{to:view});}catch(e){}},[view]);
  // The embedded console's "Assistant view" button posts this up to switch back to chat.
  // Coming back after having drilled into Billing completes the 'roundtrip' quest.
  useEffect(()=>{const onMsg=e=>{if(e&&e.data==='ah:go-assistant'){setView('assistant');try{if(Guide.state().quests.drill)Guide.completeQuest('roundtrip');}catch(e2){}}};window.addEventListener('message',onMsg);return ()=>window.removeEventListener('message',onMsg);},[]);
  // keep the rail's recents in sync with what the assistant logs
  useEffect(()=>{const t=setInterval(()=>{const r=loadRecents();setRecents(prev=>JSON.stringify(prev)===JSON.stringify(r)?prev:r);},700);return ()=>clearInterval(t);},[]);

  const [intro,setIntro]=useState(null); // pending first-time view intro, e.g. 'dashboard'
  const [railOpen,setRailOpen]=useState(false); // phone: Actions rail as a slide-over drawer
  // First switch into Dashboard → show the intro (unless dismissed before). Day-zero users skip it —
  // the guided drill quest explains the dashboard itself, so the generic intro would just be in the way.
  const goDashboard=()=>{try{if(!Guide.active()&&!localStorage.getItem('ah_intro_dashboard')){setIntro('dashboard');return;}}catch(e){}setView('dashboard');};
  const introContinue=dontShow=>{if(dontShow){try{localStorage.setItem('ah_intro_'+intro,'1');}catch(e){}}setView(intro);setIntro(null);};
  // Tapping an incomplete QuestHUD row takes the owner to where that quest happens.
  const questAction=id=>{
    if(id==='drill'||id==='pricing'){goDashboard();return;}                 // dashboard drill / pricing tour
    if(id==='learn'){try{location.href='learn.html';}catch(e){}return;}       // the Learn hub
    if(id==='chip'||id==='ask'){setView('assistant');setTimeout(()=>{try{window.dispatchEvent(new CustomEvent('ah:focus-input'));}catch(e){}},60);return;}
    // 'roundtrip' is a hint only — no navigable surface
  };

  const modal=intro?<IntroModal cfg={INTRO[intro]} onContinue={introContinue} onCancel={()=>setIntro(null)}/>:null;
  if(view==='dashboard') return <div className="flex">{modal}<Dashboard/><QuestHUD compact onDone={()=>setView('assistant')} onQuest={questAction}/></div>;
  return <div className="flex">
    {modal}
    {/* phone + tablet portrait: open the Actions rail as a drawer */}
    <button onClick={()=>setRailOpen(true)} title="Actions" className={"lg:hidden fixed top-3 left-3 z-40 w-10 h-10 grid place-items-center rounded-xl bg-white/5 border border-white/15 text-lg text-slate hover:text-white"+((nextQuest==='drill'||nextQuest==='pricing'||nextQuest==='learn')?" day0-spot":"")}>☰</button>
    <Rail recents={recents} onPick={q=>{setNudge({q,id:Date.now()});}} onGoDashboard={goDashboard} focus={nextQuest}/>
    {railOpen && <React.Fragment>
      <div className="fixed inset-0 z-40 bg-black/60 lg:hidden" onClick={()=>setRailOpen(false)}></div>
      <Rail overlay onClose={()=>setRailOpen(false)} recents={recents} onPick={q=>{setNudge({q,id:Date.now()});setRailOpen(false);}} onGoDashboard={()=>{setRailOpen(false);goDashboard();}} focus={nextQuest}/>
    </React.Fragment>}
    <Assistant onGoDashboard={goDashboard} seedNudge={nudge} onClearNudge={()=>setNudge(null)}/>
    <QuestHUD onDone={()=>setView('assistant')} onQuest={questAction}/>
  </div>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err){if(window.__showFatal)window.__showFatal('The app crashed',(err&&err.stack)||String(err));}
  render(){return this.state.err?null:this.props.children;}
}
try{ ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>); }
catch(e){ if(window.__showFatal) window.__showFatal('Failed to start',(e&&e.stack)||String(e)); else throw e; }
