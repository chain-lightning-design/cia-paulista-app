// ---------- cloud seam (CP.data — fail-soft; the app runs identically without it) ----------
function hasCloud(){ return !!(window.CP&&window.CP.data&&window.CP.data.member); }
// A device is "bound" when a claim link (?m=<token>) validated against the cloud.
// The canonical member record then becomes a first-class profile in this app.
// Cloud-derived text is sanitized at the SOURCE (strips tag characters) so every
// downstream template-string sink inherits safety; esc() stays for full escaping.
function deTag(s){ return String(s==null?'':s).replace(/[<>]/g,''); }
function boundProfile(){
  if(!hasCloud()) return null;
  let m=null; try{ m=CP.data.member.current(); }catch(e){}
  if(!m) return null;
  const kind=m.program==='Kids'?'kid':'adult';
  let since='—'; try{ if(m.joined_at) since=new Date(m.joined_at).toLocaleString('en-US',{month:'short',year:'numeric'}); }catch(e){}
  const safeName=deTag(m.name||'Member'), safeBelt=deTag(m.belt||'White');
  return { id:'__bound__', bound:true, cloudId:m.id, name:safeName,
    first:safeName.split(' ')[0], kind:kind, program:m.program==='Kids'?'Kids':'Adults',
    belt:safeBelt, bcolor:TBELT[safeBelt]||'#ECEEF1', str:+m.stripes||0,
    plan:deTag(m.plan)||(kind==='kid'?'Kids Unlimited':'Adult Unlimited'), price:kind==='kid'?130:165,
    req:kind==='kid'?30:40, since:since,
    timeline:[['🟢','Joined the gym',since]] };
}

  return ` <span id="clouddot" class="text-[9px] font-normal ${cls}" title="${tip}">☁</span>`;
}
// Live attendance for the bound member (progress screen). Cached ~30s; fail-soft

let ATT_LIVE={state:'idle',data:null,at:0,seq:0};
function attCache(){ try{ const c=JSON.parse(localStorage.getItem('cp_member_att')); if(c&&c.data) return c; }catch(e){} return null; }
function relTime(ts){ const m=Math.floor(Math.max(0,Date.now()-ts)/60000);
  if(m<1) return 'just now'; if(m<60) return m+'m ago';
  const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
function fetchLiveAttendance(){
  const seq=++ATT_LIVE.seq;
  if(!hasCloud()){ ATT_LIVE={state:'fail',data:null,at:Date.now(),seq:seq}; return; }
  ATT_LIVE.state='loading'; ATT_LIVE.at=Date.now();
  const done=r=>{ if(seq!==ATT_LIVE.seq) return;
    ATT_LIVE={state:r?'ok':'fail',data:r||null,at:Date.now(),seq:seq};

}
// ---------- claim-link binding moment (?m=<token>) ----------
let LINK=null; // {phase:'linking'|'success'|'fail', member, token}
let LINK_SEQ=0;
function cleanTokenUrl(){ try{ const u=new URL(location.href); if(u.searchParams.has('m')){ u.searchParams.delete('m'); history.replaceState(null,'',u.pathname+(u.searchParams.toString()?'?'+u.searchParams.toString():'')+u.hash); } }catch(e){} }
function startBind(tok){
  // Re-opening a link this phone ALREADY claimed: no round-trip. The phone works,
  // so a slow/hung/offline RPC must never gate it behind "No connection" or
  // "didn't work" — the success screen reads naturally as confirmation.
  if(hasCloud()){ let t=null,cur=null; try{ t=CP.data.member.token(); cur=CP.data.member.current(); }catch(e){}
    if(t===tok&&cur){ LINK_SEQ++; cleanTokenUrl(); LINK={phase:'success',member:cur,token:tok}; render(); return; } }
  const seq=++LINK_SEQ;
  LINK={phase:'linking',token:tok};
  const minHold=new Promise(r=>setTimeout(r,700)); // let the moment breathe — no sub-100ms flash
  // Watchdog: a hung RPC (captive portal, dead radio) must not spin forever —
  // after 10s land on the offline-fail copy ("your link is still good — try again").
  let timedOut=false;
  const watchdog=new Promise(r=>setTimeout(()=>{ timedOut=true; r(null); },10000));
  const attempt=hasCloud()?Promise.race([CP.data.member.bind(tok),watchdog]):Promise.resolve(null);
  attempt.then(m=>minHold.then(()=>m),()=>minHold.then(()=>null)).then(m=>{
    if(seq!==LINK_SEQ||!LINK) return; // superseded by a retry or dismissed
    if(m){ cleanTokenUrl(); LINK={phase:'success',member:m,token:tok}; }
    else LINK={phase:'fail',token:tok,off:timedOut||undefined};
    render();
  });
  render();
}
function scrLink(){

  if(LINK.phase==='success'){ const m=LINK.member;
    return `${statusbar()}<div class="body px-6 pt-14 text-center fade">
    <div class="w-20 h-20 rounded-full bg-good text-white grid place-items-center text-4xl mx-auto">✓</div>

    <button data-act="linkdone" class="pressable w-full mt-8 bg-navy text-white rounded-xl py-3 text-sm font-bold">Continue</button></div>`; }
  // No data layer at all counts as "offline" — a good claim link must never be
  // reported as a dead link just because scripts failed to load. A watchdog
  // timeout (LINK.off) is a stall, not a bad token — same offline copy.
  const _off=(()=>{try{return LINK.off===true||!hasCloud()||CP.data.member.lastError==='offline';}catch(e){return true;}})();
  // On a configured (real) device, "Continue" lands on the locked sign-in gate —
  // so no "keep using the app" promise, and the button says where it really goes
  // (the gate, prefilled with this token so retrying is one tap). Demo keeps the
  // original copy: continuing there really does open the app.
  const _demo=demoMode();
  return `${statusbar()}<div class="body px-6 pt-14 text-center fade">
    <div class="w-16 h-16 rounded-full bg-mist grid place-items-center text-3xl mx-auto">${_off?'📶':'🔗'}</div>
    <div class="mt-5 font-bold text-navy text-lg">${_off?'No connection right now':'That link didn’t work'}</div>
    <div class="text-[13px] text-slate mt-2 leading-relaxed">${_off?'Your link is still good — check the internet and tap Try again.':'Ask the gym to send a fresh one.'}${_demo?'<br>You can keep using the app in the meantime.':''}</div>
    ${LINK.token?`<button data-act="linkretry" class="pressable w-full mt-8 border border-slate/25 rounded-xl py-3 text-sm font-semibold">Try again</button>`:''}
    <button data-act="linkskip" class="pressable w-full mt-3 bg-navy text-white rounded-xl py-3 text-sm font-bold">${_demo?'Continue to the app':'Enter the code instead'}</button></div>`;
}

// ---------- invite acceptance (?invite=<token>) ----------
// Frozen Wave-3 contract (docs/superpowers/specs/2026-07-22-auth-system-design.md): accept()
// creates the real account + links members.user_id server-side, but "never mints a session
// itself" — so success here is NOT signed in yet. The next screen hands off into the same
// email OTP machinery as the sign-in gate (scrEmailSignin below), prefilled with the email
// the function confirmed. Failure (expired/revoked/bad token) is calm and permanent — no
// retry, since retrying the same bad token can't help; a connectivity failure (no server
// error string, just a reason) DOES offer Try again, same distinction scrLink already makes.
let INVITE=null; // {phase:'accepting'|'success'|'fail', token, email, error, reason}
let INVITE_SEQ=0;
function hasInvitesApi(){ try{ return !!(window.CP&&CP.data&&CP.data.invites&&CP.data.invites.accept); }catch(e){ return false; } }
function cleanInviteUrl(){ try{ const u=new URL(location.href); if(u.searchParams.has('invite')){ u.searchParams.delete('invite'); history.replaceState(null,'',u.pathname+(u.searchParams.toString()?'?'+u.searchParams.toString():'')+u.hash); } }catch(e){} }
function startInviteAccept(tok){
  const seq=++INVITE_SEQ;
  INVITE={phase:'accepting',token:tok,email:null,error:null,reason:null};
  render();
  const minHold=new Promise(r=>setTimeout(r,700)); // let the moment breathe — no sub-100ms flash
  let timedOut=false;
  const watchdog=new Promise(r=>setTimeout(()=>{ timedOut=true; r({ok:false,reason:'offline'}); },10000));
  const attempt=hasInvitesApi()?Promise.race([CP.data.invites.accept(tok),watchdog]):Promise.resolve({ok:false,reason:'unconfigured'});

const DEMO_PARAM=(()=>{ try{ return new URLSearchParams(location.search).has('demo'); }catch(e){ return false; } })();
function cloudConfigured(){ try{ return !!(window.CP&&CP.data&&CP.data.configured()); }catch(e){ return false; } }

// Staging is the owner's private preview build: env.js reports CP.env.isStaging and the

// paste. The sign-in must therefore let him straight in — one trivial code or one tap on
// "Use a demo member". LIVE (cloud configured) never takes this path: the real invite-code
// gate is untouched there, and this code never appears in it.
const STAGE_CODE='1111111';
function stagingMode(){ try{ return !!(window.CP&&window.CP.env&&window.CP.env.isStaging)&&!cloudConfigured(); }catch(e){ return false; } }

// The demo's fictions (fake booking, fake billing, fake family, seeded announcements)

// honest "not yet" note. Demo mode (?demo=1 / unconfigured) keeps every fiction.

// Announcements: the seeded demo items never show to a real member — real

function gateNeeded(){
  if(demoMode()) return false;      // explicit demo, or no cloud on this device
  if(boundProfile()) return false;  // bound device -> straight into the app (fail-soft cache)
  try{ if(new URLSearchParams(location.search).has('m')) return false; }catch(e){} // claim link runs its own flow
  return true;                      // configured + unbound -> member sign-in gate
}
// Accepts a pasted invite link (…?invite=<token>), a legacy claim link (…?m=<token>), an
// "invite=<token>" / "m=<token>" fragment, or a bare token of either kind — then tells them
// APART by shape, so a member who pastes their real Wave-3 invite link (exactly what the
// kiosk's "copy this link and send it yourself" fallback hands the front desk to text/read
// out) never gets routed into the legacy claim RPC and wrongly blamed for a "bad code".
// Wave-3 invite tokens: 32 random bytes, base64url-encoded, no padding — 43 chars, charset
// A-Za-z0-9_- (supabase/functions/invite/index.ts genToken()). Legacy qr_tokens: a uuid with
// the dashes stripped — exactly 32 lowercase hex chars (0001_core.sql). That length+charset
// gap is what disambiguates a BARE paste with no query-param wrapper; a wrapped `invite=` or
// `m=` param is unambiguous either way, so it's checked first.
function stripPastePunct(t){ return t.replace(/[.,;:!?)\]}>"'»›’”…]+$/,''); }
function classifyPaste(raw){
  var s=String(raw==null?'':raw).trim();
  if(!s) return {kind:null,token:''};
  var mi=s.match(/[?&#]invite=([^&#\s]+)/)||s.match(/^invite=([^&#\s]+)$/);
  if(mi){ var ti; try{ ti=decodeURIComponent(mi[1]); }catch(e){ ti=mi[1]; } return {kind:'invite',token:stripPastePunct(ti)}; }
  var mm=s.match(/[?&#]m=([^&#\s]+)/)||s.match(/^m=([^&#\s]+)$/);
  if(mm){ var tm; try{ tm=decodeURIComponent(mm[1]); }catch(e){ tm=mm[1]; } return {kind:'legacy',token:stripPastePunct(tm).toLowerCase()}; }
  // Bare paste, no recognizable query wrapper — classify by shape.
  var t=stripPastePunct(s.replace(/\s+/g,''));
  if(/^[0-9a-f]{32}$/i.test(t)) return {kind:'legacy',token:t.toLowerCase()};
  if(/^[A-Za-z0-9_-]{30,50}$/.test(t)) return {kind:'invite',token:t};
  // Unrecognized shape — fall through to the legacy attempt (same failure copy as before
  // this change; never a behavior regression for whatever this actually was).
  return {kind:'legacy',token:t};
}

function doGateBind(){
  if(GATE.busy) return;
  const inp=document.getElementById('gatetok');
  if(inp) GATE.val=inp.value;
  const parsed=classifyPaste(GATE.val);
  if(!parsed.token){ GATE.err='Paste the invite link or code from your gym first.'; render(); return; }
  // A real Wave-3 invite link/token pasted here hands straight off to the SAME accept flow
  // ?invite=<token> in the URL runs (startInviteAccept -> scrInvite) — its own accepting/
  // success/fail states already cover this, including the honest expired/revoked/bad-token
  // copy that must NOT be confused with the legacy "That code didn't match" message below.
  if(parsed.kind==='invite'){ GATE.val=''; GATE.err=null; startInviteAccept(parsed.token); return; }
  const tok=parsed.token;
  GATE.busy=true; GATE.err=null; render(); // working state shows synchronously (<100ms)
  const seq=++GATE_SEQ;
  const minHold=new Promise(r=>setTimeout(r,450)); // no sub-100ms flash
  let timedOut=false;
  const watchdog=new Promise(r=>setTimeout(()=>{ timedOut=true; r(null); },12000)); // hung RPC ≠ forever spinner
  const attempt=hasCloud()?Promise.race([CP.data.member.bind(tok),watchdog]):Promise.resolve(null);
  attempt.then(m=>minHold.then(()=>m),()=>minHold.then(()=>null)).then(m=>{
    if(seq!==GATE_SEQ) return;
    GATE.busy=false;
    if(m){ GATE.err=null; GATE.val='';
      S.loggedIn=true; S.mode='member'; S.active='__bound__'; S.tab='home'; S.stack=[]; save();
      render(); toast('Welcome, <b>'+esc(prof().first)+'</b> 🥋'); return; }
    let err=null; try{ err=CP.data.member.lastError; }catch(e){}
    if(timedOut) err='offline';
    // 'bad-token' → wrong code; 'server' → the RPC answered with an error (their
    // side, not the member's connection); 'offline' or anything unknown → the
    // connection copy (backward-compatible default).
    GATE.err = err==='bad-token'
      ? 'That code didn’t match. Check the invite from your gym and try again.'
      : err==='server'
      ? 'Something went wrong on our side — ask the front desk to resend your invite.'
      : 'Can’t reach the gym’s system right now. Check your internet connection and try again.';
    render();
  });
}

function fauxQR(){ let s=''; for(let r=0;r<13;r++){ for(let c=0;c<13;c++){ const on=((r*c+r+c)%3===0)||((r+c)%5===0)||(r<3&&c<3)||(r<3&&c>9)||(r>9&&c<3); s+=`<div class="${on?'bg-ink':''}"></div>`; } } return `<div class="grid bg-white p-2 rounded-xl" style="grid-template-columns:repeat(13,1fr);width:170px;height:170px;gap:2px">${s}</div>`; }
// Real, scannable member QR. The kiosk camera decodes this exact payload (see kiosk.html parseQR).
// Compact pipe format ON PURPOSE: fewer chars -> version-3 QR (29 modules) instead of v6 (41) ->
// bigger modules on screen -> decodes through a fixed-focus iPad front camera. JSON didn't.
// `x` (base36 30s bucket) rotates so the code visibly refreshes like a live pass.
const QR_ROTATE_S=30;

function qrPayload(p){ const b36=Math.floor(Date.now()/(QR_ROTATE_S*1000)).toString(36); const ak=p.program==='Kids'?'K':'A';

  if(p.bound&&p.cloudId) return ['CP2',String(p.cloudId).replace(/-/g,'').slice(0,10),nm,p.belt,p.str,ak,b36].join('|');

// ---------- render ----------
const SCREENS={home:scrHome,schedule:scrSchedule,checkin:scrCheckin,progress:scrProgress,more:scrMore};
const SUB={billing:scrBilling,family:scrFamily,profile:scrProfile,notifs:scrNotifs,announcements:scrAnnounce,classdetail:scrClassDetail,bill_card:scrBillCard,bill_pay:scrBillPay,bill_freeze:scrBillFreeze,bill_cancel:scrBillCancel,bill_receipts:scrBillReceipts,bill_receipt:scrBillReceipt,waiver:scrWaiver,install:scrInstall};
function render(){
  const app=document.getElementById('app');
  if(INVITE){ app.innerHTML=scrInvite(); return; }
  if(LINK){ app.innerHTML=scrLink(); return; }
  if(gateNeeded()){
    // "Signed in but no member match yet" (ESI.step==='nomatch') must win over the plain
    // gate even though gateNeeded() is still true (boundProfile() is still null) — otherwise
    // a person who just verified their email would be shown "paste your invite link" again,
    // which reads as if the sign-in never happened.
    if(ESI.active){ app.innerHTML=scrEmailSignin(); return; }
    app.innerHTML=scrGate(); return; // real app, unbound -> member sign-in
  }
  // Real bound mode is single-person: state persisted from an earlier demo session
  // (fake Carlos active, teaching mode) must never leak a demo identity into the
  // real app — snap back to the bound member.
  if(realBound()&&(S.active!=='__bound__'||S.mode==='teaching')){ S.active='__bound__'; S.mode='member'; save(); }
  if(!S.loggedIn){
    // A bound device is already signed in by definition — never show it the demo login.
    if(boundProfile()){ S.loggedIn=true; S.mode='member'; S.active='__bound__'; save(); }
    else { app.innerHTML=scrLogin(); return; }
  }
  if(S.mode==='teaching'){ app.innerHTML=statusbar()+scrTeaching(); return; }
  const top=S.stack[S.stack.length-1];
  let content;
  if(top){ const fn=SUB[top.screen]; content=statusbar()+ (fn?fn(top.data):scrHome()); }
  else content=statusbar()+ (SCREENS[S.tab]?SCREENS[S.tab]():scrHome());
  const tabbar=`<div class="border-t border-slate/10 flex bg-white safe-b">${TABS.map(([id,ic,l])=>`<div id="tab-${id}" class="tab ${(!top&&S.tab===id)?'on':''}" data-go="${id}"><span class="ic">${ic}</span>${l}</div>`).join('')}</div>`;
  app.innerHTML=content+tabbar;
  maybeOnboard();
}

function successOverlay(){ const p=prof(); S.attended[p.id]=(S.attended[p.id]||0)+1; save();
  const app=document.getElementById('app'); const ov=document.createElement('div'); ov.className='absolute inset-0 bg-white z-40 grid place-items-center text-center p-8 fade';
  ov.innerHTML=`<div><div class="w-24 h-24 rounded-full bg-good text-white grid place-items-center text-5xl mx-auto mb-4">✓</div><div class="text-2xl font-extrabold text-navy">Checked in, ${p.first}! 🥋</div><div class="text-slate mt-2 text-sm">See you on the mat</div><div class="text-[12px] text-good mt-3">+1 toward your next stripe (${S.attended[p.id]}/${p.req})</div><div class="text-[11px] text-slate/50 mt-6">Tap to continue</div></div>`;
  ov.addEventListener('click',()=>{ ov.remove(); render(); }); app.appendChild(ov); setTimeout(()=>{ if(ov.parentNode){ov.remove(); render();} },3000);
}
// Cloud status changes patch the tiny ☁ dot in place (no full re-render, overlays survive).
try{ if(window.CP&&CP.data&&CP.data.onStatus) CP.data.onStatus(function(){ try{
  const el=document.getElementById('clouddot'); if(!el) return;
  const p=prof(); if(!p.bound){ el.remove(); return; }
  const t=document.createElement('template'); t.innerHTML=cloudDot(p).trim();
  if(t.content&&t.content.firstChild) el.replaceWith(t.content.firstChild);
}catch(e){} }); }catch(e){}
// DEMO chip — mounted only in demo mode (?demo=1 or no cloud config) so the demo
// is never mistaken for the real app. The real app never shows it.
try{ if(demoMode()){ const c=document.createElement('div'); c.className='demochip'; c.textContent='DEMO'; document.querySelector('.phone').appendChild(c); } }catch(e){}
// Enter submits the member sign-in gate (same path as the button) — real gate and staging.
document.getElementById('app').addEventListener('keydown',e=>{ if(e.key!=='Enter'||!e.target) return;
  if(e.target.id==='gatetok'){ e.preventDefault(); doGateBind(); return; }
  if(e.target.id==='stagecode'){ e.preventDefault(); doStageIn(); return; }
  if(e.target.id==='esiemail'){ e.preventDefault(); doEsiSend(false); return; }
  if(e.target.id==='esicode'){ e.preventDefault(); doEsiVerify(); } });
// PWA install: capture Chrome's deferred prompt for the in-app "Install" affordances.
window.addEventListener('beforeinstallprompt',e=>{ try{ e.preventDefault(); }catch(_e){} BIP=e; });
window.addEventListener('appinstalled',()=>{ BIP=null; try{ localStorage.setItem('cp_install_done','1'); }catch(e){} try{ render(); }catch(e){} });
// Service worker (offline + installable). LIVE only, https only — never file://, never
// jsdom, and never in staging: the staging build runs inside the preview shell's iframe,
// where a cached SW would serve stale staging files back over the live app.
try{ var _live=!!(window.CP&&window.CP.env&&window.CP.env.isLive);
  if(_live&&'serviceWorker' in navigator&&location.protocol==='https:'&&!/jsdom/i.test(navigator.userAgent||'')) navigator.serviceWorker.register('sw.js'); }catch(e){}
// Staging reset: the preview shell's "⟲ Reset login" button posts this in, so the whole
// member journey (sign-in → app) can be replayed from scratch. Staging only — a live
// member's phone must never have its link wiped by a stray postMessage.
window.addEventListener('message',function(e){
  try{
    var d=e&&e.data; if(!d||d.type!=='cp-staging-reset') return;
    if(!(window.CP&&window.CP.env&&window.CP.env.isStaging)) return;
    ['cp_member_token','cp_member_rec','cp_member_att','cp_stage_member','cp_memberapp_v3','cp_onb_member','cp_install_hide','cp_install_done']
      .forEach(function(k){ try{ localStorage.removeItem(k); }catch(_e){} });
    try{ location.reload(); }catch(_e){}
  }catch(_e){}
});
// Claim link: ?m=<token> runs the linking moment before anything else shows. Byte-for-byte
// unchanged for legacy (un-migrated) members — this path never touches invites at all.
try{ const _tok=new URLSearchParams(location.search).get('m'); if(_tok) startBind(_tok); }catch(e){}
// Invite link: ?invite=<token> runs the invite-acceptance moment before anything else shows.
// Mirrors the ?m= handler above (always attempts; startInviteAccept itself treats no cloud /
// no CP.data.invites as a calm connectivity-style failure rather than silently ignoring it).
try{ const _inv=new URLSearchParams(location.search).get('invite'); if(_inv) startInviteAccept(_inv); }catch(e){}
render();
</script>
