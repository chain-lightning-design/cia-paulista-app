// generate upcoming dated sessions (next ~12 days)
function upcomingSessions(filterProg){
  const now=new Date(); const out=[]; let id=0;
  for(let d=0; d<13 && out.length<60; d++){
    const day=new Date(now.getFullYear(),now.getMonth(),now.getDate()+d);
    const dow=day.getDay();
    WEEK.filter(w=>w.dow===dow).forEach(w=>{
      // deterministic-ish spots: vary base by day offset
      let spots=Math.max(0, w.base + ((d*3 + w.dow*2)%7) - 3);
      if(w.base===0 || w.full) spots=0; // popular classes that run full → surface the waitlist path
      const [h,m]=w.t.split(':').map(Number);
      // skip sessions already passed today
      if(d===0 && (h<now.getHours() || (h===now.getHours()&&m<=now.getMinutes()))) return;
      const s={id:'s'+(id++), date:day, dow, t:w.t, dur:w.dur, name:w.name, prog:w.prog, coach:w.coach, level:w.level, cap:w.cap, spots, dayoff:d};
      if(!filterProg || filterProg==='all' || matchProg(w.prog,filterProg)) out.push(s);
    });
  }
  return out;
}
function matchProg(prog,filter){
  if(filter==='all') return true;
  if(filter==='adults') return prog==='adult-gi'||prog==='adult-nogi'||prog==='competition';
  if(filter==='kids') return prog==='kids';

/* ============================== FREE-TRIAL FUNNEL ============================== */
const SOURCES=['Google search','Instagram','Facebook','Friend / referral','Drove by','Yelp','Other'];
const EXP=['Total beginner','Trained a little','Experienced'];
let F=null; // funnel state
function openFunnel(prefill={}){
  F={ step:0, prog:prefill.prog||'', sessionId:prefill.sessionId||'', flexible:false,
      name:'',phone:'',email:'', isKid:false, child:'', childAge:'', guardianRel:'Parent',
      source:'', exp:'', notes:'', waiver:false, errors:{} };
  if(F.prog){ F.isKid=(F.prog==='kids'); F.step=1; }
  if(prefill.sessionId){ F.step=2; const s=sessionById(prefill.sessionId); F.waitlist=!!(s&&s.spots<=0); }
  renderFunnel();
}
function sessionById(id){ return upcomingSessions('all').find(x=>x.id===id); }
function closeFunnel(){ F=null; overlay.innerHTML=''; }
function funnelSessions(){ return upcomingSessions(F.isKid?'kids':(F.prog||'all')); }
function progLabel(id){ const p=programById(id); return p?p.name:'—'; }
function stepValid(){
  F.errors={};
  if(F.step===0 && !F.prog) F.errors.prog='Pick a program to continue.';
  if(F.step===1 && !F.sessionId && !F.flexible) F.errors.session='Choose a class time, or pick “I’m flexible”.';
  if(F.step===2){
    if(!F.name.trim()) F.errors.name='Please enter your name.';
    if(digits(F.phone).length<10) F.errors.phone='Enter a valid 10-digit phone.';
    if(!validEmail(F.email)) F.errors.email='Enter a valid email.';
    if(F.isKid){ if(!F.child.trim()) F.errors.child='Enter your child’s name.'; if(!F.childAge||+F.childAge<4||+F.childAge>13) F.errors.childAge='Age must be 4–13.'; }
  }
  if(F.step===3){ if(!F.source) F.errors.source='Let us know how you found us.'; if(!F.waiver) F.errors.waiver='Please acknowledge the waiver to continue.'; }
  return Object.keys(F.errors).length===0;
}
function next(){ if(!stepValid()){ renderFunnel(); return; } F.step++; renderFunnel(); }
function back(){ if(F.step>0){ F.step--; F.errors={}; F.submitting=false; renderFunnel(); } }
function sessionLabelById(id){ const s=funnelSessions().find(x=>x.id===id)||upcomingSessions('all').find(x=>x.id===id); if(!s) return ''; return s.name+' · '+dateLabel(s.date,s.dayoff)+' · '+fmtTime(s.t)+' (w/ '+s.coach+')'; }

function submitTrial(){
  const p=programById(F.prog);
  const created=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
  const sessLabel = F.flexible? 'Flexible — gym to confirm a time' : (sessionLabelById(F.sessionId)+(F.waitlist?' · waitlist':''));
  const lead={ id:'web'+Date.now(), name:F.name.trim(), phone:F.phone.trim(), email:F.email.trim(),
    source:'Website', interest:p?p.interest:'', interestOther:'', stage:'New', created, waitlist:!!F.waitlist,
    child:F.isKid?F.child.trim():'', childAge:F.isKid?F.childAge:'', guardianRel:F.isKid?F.guardianRel:'',
    exp:F.exp, foundVia:F.source, notes:F.notes.trim(), session:sessLabel };
  S.leads.push(lead); save(); refreshStgCount();
  // Remember the real start time (if any) so the confirmation can offer a genuine .ics.
  const picked = F.flexible ? null : sessionById(F.sessionId);
  if(picked){ const [hh,mm]=picked.t.split(':').map(Number);
    F.doneStart = new Date(picked.date.getFullYear(),picked.date.getMonth(),picked.date.getDate(),hh,mm).toISOString();
    F.doneDur = picked.dur || 60;
  } else { F.doneStart=null; }
  // hand the lead to the shared data layer: CP.data.leads.add mirrors it into
  // cp_leads_inbox (the owner-console bridge, exactly as before) AND queues the
  // cloud insert — works anonymously, no sign-in needed. If data.js ever failed
  // to load, fall back to the legacy direct push so the lead is never lost.
  try{
    if(window.CP && CP.data && CP.data.leads){ CP.data.leads.add(lead); }
    else { const q=JSON.parse(localStorage.getItem('cp_leads_inbox')||'[]'); q.push(lead); localStorage.setItem('cp_leads_inbox',JSON.stringify(q)); }
  }catch(e){}
  F.done=lead; F.step=5; renderFunnel();
}

function renderFunnel(){
  if(!F){ overlay.innerHTML=''; return; }
  const steps=['Program','Class','Your info','Confirm','Review'];
  const pct = F.step>=5?100:Math.round((F.step/4)*100);
  let inner='';
  if(F.step===5){ inner=confirmScreen(); }

/* ============================== calendar file (real, no backend) ==============================
   "Add to calendar" used to relabel itself and toast a success for a file it never produced.
   It now writes a genuine .ics the browser downloads — and it is only offered when there is an
   actual date and time to add (never for a flexible request or a waitlist spot). */
function icsDownload(start, mins, title, where){
  const p=n=>(n<10?'0':'')+n;
  const z=d=>d.getUTCFullYear()+p(d.getUTCMonth()+1)+p(d.getUTCDate())+'T'+p(d.getUTCHours())+p(d.getUTCMinutes())+'00Z';
  const end=new Date(start.getTime()+(mins||60)*60000);
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Cia Paulista Jiu-Jitsu//Free trial//EN','BEGIN:VEVENT',
    'UID:'+Date.now()+'@ciapaulistajj.com','DTSTAMP:'+z(new Date()),'DTSTART:'+z(start),'DTEND:'+z(end),
    'SUMMARY:'+title,'LOCATION:'+where,'DESCRIPTION:Arrive 15 minutes early to meet your coach and sign the waiver.',
    'END:VEVENT','END:VCALENDAR'].join('\r\n');
  const a=document.createElement('a');
  a.href='data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);
  a.download='cia-paulista-trial.ics';
  document.body.appendChild(a); a.click(); a.remove();
}

/* ============================== event wiring (delegation) ============================== */
function smoothTo(sel){ const t=$(sel,site); if(t) t.scrollIntoView({behavior:'smooth',block:'start'}); }

document.addEventListener('click',e=>{
  const t=e.target.closest('[data-scroll],[data-trial],[data-trialprog],[data-trialplan],[data-prog],[data-booksession],[data-filter],[data-bill],[data-faq],[data-dot],[data-social],[data-member],[data-fclose],[data-fback],[data-fnext],[data-fbackdrop],[data-fgoto],[data-fanother],[data-addcal],[data-pickprog],[data-picksession],[data-flexible],[data-source],[data-exp],[data-mclose],[data-trialprog],[data-leadsboard],[data-funnelreset]');
  // site controls (the mobile nav lives in the site itself)
  if(e.target.closest('#hamb')){ const m=$('#mobnav'); if(m) m.classList.toggle('hidden'); return; }
  if(e.target.closest('#revPrev')){ renderReview(revIdx-1); return; }
  if(e.target.closest('#revNext')){ renderReview(revIdx+1); return; }

  if(!t) return;
  const d=t.dataset;

  // navigation / scroll
  if(d.scroll){ smoothTo(d.scroll); const m=$('#mobnav'); if(m)m.classList.add('hidden'); if(d.mclose) overlay.innerHTML=''; if(t.hasAttribute('data-mclose')) overlay.innerHTML=''; return; }

  // open funnel variants
  if(d.trial!==undefined){ openFunnel(); return; }
  if(d.trialprog!==undefined){ openFunnel({prog:d.trialprog}); return; }
  if(d.trialplan!==undefined){ const map={kids:'kids',unlimited:'adult-gi','2x':'adult-gi'}; openFunnel({prog:map[d.trialplan]||''}); return; }
  if(d.booksession!==undefined){ openFunnel({prog:d.prog,sessionId:d.booksession}); return; }

  // program card → modal (but inner Try-free handled above via data-trialprog)
  if(d.prog!==undefined && t.classList.contains('prog-card')){ programModal(d.prog); return; }

  // schedule filter
  if(d.filter!==undefined){ $$('.filterbtn').forEach(b=>{const on=b.dataset.filter===d.filter;b.className='filterbtn px-4 py-2 rounded-lg text-sm font-semibold '+(on?'bg-navy text-white':'bg-white text-slate border border-slate/15');}); $('#schedGrid').innerHTML=schedCards(d.filter); return; }

  // pricing toggle
  if(d.bill!==undefined){ $$('.billbtn').forEach(b=>{const on=b.dataset.bill===d.bill;b.className='billbtn px-4 py-2 rounded-md '+(on?'bg-white shadow text-navy':'text-slate');}); $('#planGrid').innerHTML=planCards(d.bill); return; }

  // FAQ accordion
  if(d.faq!==undefined){ const body=$('#faq-'+d.faq); const ic=t.querySelector('.faq-ic'); const open=body.classList.toggle('open'); ic.textContent=open?'−':'+'; ic.style.transform=open?'rotate(180deg)':''; return; }

  // reviews dots
  if(d.dot!==undefined){ renderReview(+d.dot); return; }

  // social links — only rendered off-live (no real accounts are connected yet)
  if(d.social!==undefined){ infoModal(d.social, `Cia Paulista’s <b>${esc(d.social)}</b> page isn’t connected yet, so this link has nowhere to go. <span class="text-slate/60">Staging preview — on the real site the row is hidden until the accounts are linked.</span>`); return; }

  // footer / inline info links — real content only
  if(d.member!==undefined){
    if(d.member==='privacy'){ infoModal('How we use your details', PRIVACY_HTML); return; }
    if(d.member==='waiver'){ infoModal('The waiver — what it says', WAIVER_HTML); return; }
    return;
  }

  // staging tools (rendered only when IS_STAGING)
  if(d.leadsboard!==undefined){ leadsBoardModal(); return; }
  if(d.funnelreset!==undefined){ resetFunnelDemo(); return; }

  // ---- modal close ---- close on an explicit close button (e.target===t), or a click on the backdrop itself (also e.target===t) — never on inner children
  if(d.mclose!==undefined && e.target===t){ overlay.innerHTML=''; return; }

  // ---- funnel controls ----
  if(d.fbackdrop!==undefined && e.target===t){ overlay.innerHTML=''; F=null; return; }
  if(d.fclose!==undefined){ closeFunnel(); return; }
  if(d.fback!==undefined){ back(); return; }
  if(d.fnext!==undefined){ next(); return; }
  if(d.fgoto!==undefined){ F.step=+d.fgoto; F.errors={}; F.submitting=false; renderFunnel(); return; }
  if(d.fanother!==undefined){ openFunnel(); return; }
  if(d.addcal!==undefined){
    if(!F || !F.doneStart){ return; }
    icsDownload(new Date(F.doneStart), F.doneDur, 'Free trial — '+(progLabel(F.prog)||'Cia Paulista'), '819 S Myrtle Ave, Monrovia, CA 91016');
    t.textContent='✓ Calendar file saved'; t.classList.add('bg-good'); t.classList.remove('bg-navy');
    toast('🗓 Saved cia-paulista-trial.ics — open it to add the class'); return;
  }
  if(d.pickprog!==undefined){ F.prog=d.pickprog; F.isKid=(d.pickprog==='kids'); F.sessionId=''; F.flexible=false; F.errors={}; renderFunnel(); return; }
  if(d.picksession!==undefined){ F.sessionId=d.picksession; F.flexible=false; F.errors={}; renderFunnel(); return; }
  if(d.flexible!==undefined){ F.flexible=!F.flexible; if(F.flexible)F.sessionId=''; F.errors={}; renderFunnel(); return; }
  if(d.source!==undefined){ F.source=d.source; F.errors={}; renderFunnel(); return; }
  if(d.exp!==undefined){ F.exp=(F.exp===d.exp?'':d.exp); renderFunnel(); return; }
});

// capture funnel field edits before re-render (on input)
document.addEventListener('input',e=>{
  if(!F) {
    if(e.target.id==='newsEmail'){ /* handled on submit */ }
    return;
  }
  const id=e.target.id; if(!id||!id.startsWith('f_')) return;
  const v=e.target.type==='checkbox'?e.target.checked:e.target.value;
  if(id==='f_name')F.name=v; else if(id==='f_phone')F.phone=v; else if(id==='f_email')F.email=v;
  else if(id==='f_child')F.child=v; else if(id==='f_childage')F.childAge=v; else if(id==='f_rel')F.guardianRel=v;
  else if(id==='f_notes')F.notes=v; else if(id==='f_waiver')F.waiver=v;
  else if(id==='f_iskid'){ F.isKid=v; renderFunnel(); /* reveal child fields */ }
});

// confirm on review step is the same data-fnext; intercept to submit.
// Capture is instant, but the tap still gets an acknowledged working state (~300ms
// pressed/spinner) so the jump to the success screen never feels like a dead click.
const _next=next;
next=function(){
  if(F.step===4){
    if(!stepValid()){ renderFunnel(); return; }
    if(F.submitting) return;                       // ignore double-taps while acknowledging
    F.submitting=true;
    const btn=document.querySelector('#funnelShell [data-fnext]');
    if(btn){ btn.disabled=true; btn.classList.add('opacity-80'); btn.innerHTML='<span class="spin mr-2"></span>'+(F.waitlist?'Adding you to the waitlist…':'Booking your spot…'); }
    // ALWAYS clear submitting when the beat lands — Back during the 300ms used to
    // strand submitting=true and brick every later Confirm. Submit only if the
    // user is still sitting on Review mid-submit (Back/goto cancel via submitting=false).
    setTimeout(()=>{ if(!F) return; const go=F.submitting&&F.step===4; F.submitting=false; if(go) submitTrial(); },300);
    return;
  }
  _next();
};

// newsletter form
document.addEventListener('submit',e=>{
  if(e.target.id==='newsForm'){ e.preventDefault(); const v=$('#newsEmail').value.trim(); const msg=$('#newsMsg');
    if(!validEmail(v)){ msg.className='text-xs mt-2 text-crimson'; msg.textContent='Please enter a valid email.'; return; }
    S.news.push(v); save();
    // There is no mailing-list provider wired, so "you're on the list" would be a fake
    // success. What IS real: hand the address to the gym the same way a trial request is
    // handed over, and say that's what happened.
    try{
      const created=(()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
      const rec={id:'news'+Date.now(), name:v.split('@')[0]||'Newsletter signup', phone:'', email:v, source:'Website',
        interest:'Weekly schedule email', stage:'New', created, waitlist:false, child:'', childAge:'', guardianRel:'',
        exp:'', foundVia:'Newsletter box', notes:'Asked for the weekly schedule + offers by email', session:''};
      if(window.CP && CP.data && CP.data.leads){ CP.data.leads.add(rec); }
      else { const q=JSON.parse(localStorage.getItem('cp_leads_inbox')||'[]'); q.push(rec); localStorage.setItem('cp_leads_inbox',JSON.stringify(q)); }
    }catch(e){}
    msg.className='text-xs mt-2 text-good'; msg.textContent='✓ Got it — the academy has your email and will send you the weekly schedule.'; $('#newsEmail').value=''; toast('📩 Thanks — your email is with the front desk'); }
});

// esc closes overlay
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ overlay.innerHTML=''; F=null; } });

/* ============================== go ============================== */
mount();

/* ============================== onboarding (additive; never breaks boot) ============================== */
if(window.Onboarding){
  Onboarding.init({
    key:'cp_onb_funnel',
    accent:'#E11D2A',
    title:"New here? Here's how it works",
    subtitle:'From first visit to first class in minutes.',
    bullets:[
      'Browse programs & the weekly schedule',
      'Start a free trial in about 2 minutes',
      "Pick a plan whenever you're ready"
    ],
    tour:[
      {sel:'#programs', title:'Explore the programs', body:'Gi, no-gi, kids, privates and the comp team — tap any card to learn more or start a free trial.', place:'bottom'},
      {sel:'#schedule', title:'Check the weekly schedule', body:'See the next several days of classes and pick a time. Full classes can still be joined via the waitlist.', place:'top'},
      {sel:'#pricing', title:'See simple pricing', body:'Month-to-month, no contracts. But every plan starts with a free trial — no card needed.', place:'top'},
      {sel:'[data-trial="hero"]', title:'Book your free trial', body:'Ready? This kicks off a ~2-minute form to claim your first free class.', place:'bottom'}
    ],
    helpLabel:'How it works',
    helpPosition:'bottom-left'
  });
}
</script>
